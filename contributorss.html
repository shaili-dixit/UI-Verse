!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contributors — UIverse</title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- UIverse Modular CSS Architecture -->
  <link rel="stylesheet" href="css/main.css">

  <!-- CSS -->
  <link rel="stylesheet" href="contributors.css">

</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">

    <div class="logo">
      ⬡ UIverse
    </div>

    <div class="nav-right">

      <button class="nav-btn outline-btn">
        Documentation
      </button>

      <button href="https://github.com/Tushar-sonawane06/UI-Verse"  class="nav-btn primary-btn">
        GitHub Project
      </button>

    </div>

  </header>

  <!-- MAIN -->
  <main class="contributors-main">

    <!-- HERO -->
    <section class="contributors-hero">

      <div class="hero-badge">
        <i class="fa-solid fa-code-branch"></i>
        Open Source Community
      </div>

      <h1 class="hero-title">
        Project <span>Contributors</span>
      </h1>

      <p class="hero-desc">
        Meet the amazing contributors helping build and improve
        the project through open source collaboration.
      </p>

    </section>

    <!-- CONTRIBUTORS -->
    <section class="contributors-section">

      <div class="section-head">

        <span class="section-tag">
          CONTRIBUTORS
        </span>

        <h2>
          Core Contributors
        </h2>

      </div>

      <div class="contributors-grid" id="contributorsGrid">

        <!-- JS CARDS -->

      </div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="footer-content">

      <h2>
        ⬡ UIverse
      </h2>

      <p>
        Built with ❤️ by open source contributors.
      </p>

    </div>

  </footer>

  <!-- JS -->
  <script src="contributors.js"></script>

</body>

</html>
