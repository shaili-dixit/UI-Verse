<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification Component</title>

  <link rel="stylesheet" href="noti.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <div class="toast-container">

    <!-- Success Toast -->
    <div class="toast success">
      <i class="fa-solid fa-circle-check"></i>

      <div class="toast-content">
        <h4>Success</h4>
        <p>Your action was completed.</p>
      </div>
    </div>

    <!-- Error Toast -->
    <div class="toast error">
      <i class="fa-solid fa-circle-xmark"></i>

      <div class="toast-content">
        <h4>Error</h4>
        <p>Something went wrong.</p>
      </div>
    </div>

    <!-- Warning Toast -->
    <div class="toast warning">
      <i class="fa-solid fa-triangle-exclamation"></i>

      <div class="toast-content">
        <h4>Warning</h4>
        <p>Please check your input.</p>
      </div>
    </div>

  </div>

</body>
</html>
