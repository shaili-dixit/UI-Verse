<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Board UI</title>
  <link rel="stylesheet" href="task.css">
</head>
<body>

<div class="container">
  <h1>Task Board</h1>

  <div class="board">

    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
      <h2>To Do</h2>

      <div class="task" draggable="true" ondragstart="drag(event)" id="task1">
        Design Landing Page
      </div>

      <div class="task" draggable="true" ondragstart="drag(event)" id="task2">
        Fix Navbar UI
      </div>
    </div>

    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
      <h2>In Progress</h2>

      <div class="task" draggable="true" ondragstart="drag(event)" id="task3">
        Build Dashboard
      </div>
    </div>

    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
      <h2>Done</h2>

      <div class="task" draggable="true" ondragstart="drag(event)" id="task4">
        Setup Project
      </div>
    </div>

  </div>
</div>

<script src="task.js"></script>
</body>
</html>
