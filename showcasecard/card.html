<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Team Showcase Cards UI</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      min-height:100vh;
      color:white;
      padding:50px 20px;
    }

    .team-container{
      max-width:1300px;
      margin:auto;
      text-align:center;
    }

    .team-container h1{
      font-size:3rem;
      margin-bottom:50px;
      letter-spacing:2px;
    }

    .team-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:30px;
    }

    .team-card{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px;
      padding:30px 20px;
      transition:0.4s ease;
      position:relative;
      overflow:hidden;
    }

    .team-card:hover{
      transform:translateY(-10px) scale(1.03);
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
    }

    .team-card::before{
      content:"";
      position:absolute;
      width:200px;
      height:200px;
      background:rgba(255,255,255,0.08);
      border-radius:50%;
      top:-120px;
      right:-100px;
    }

    .profile-image{
      width:110px;
      height:110px;
      border-radius:50%;
      margin:0 auto 20px;
      background:linear-gradient(135deg,#38bdf8,#6366f1);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.2rem;
      font-weight:bold;
      color:white;
      border:4px solid rgba(255,255,255,0.2);
    }

    .team-card h2{
      font-size:1.5rem;
      margin-bottom:10px;
    }

    .team-card p{
      color:#cbd5e1;
      margin-bottom:20px;
      font-size:0.95rem;
    }

    .social-icons{
      display:flex;
      justify-content:center;
      gap:15px;
    }

    .social-icons a{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      background:rgba(255,255,255,0.12);
      color:white;
      font-size:1.1rem;
      transition:0.3s;
    }

    .social-icons a:hover{
      background:#38bdf8;
      transform:scale(1.1);
    }

  </style>

</head>
<body>

  <div class="team-container">

    <h1>Our Team</h1>
