<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">

  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes' sha256-WLdT3MoRekI/NXIVkexcu4h7gdgp0/Fusq4S/oMMOQQ=; style-src-attr 'unsafe-hashes' sha256-WLdT3MoRekI/NXIVkexcu4h7gdgp0/Fusq4S/oMMOQQ=">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Meet our talented development team featuring frontend, backend, mobile, DevOps, data, and security professionals."
  >
  <meta name="theme-color" content="#0f172a">

  <title>Team Showcase Cards UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg-1:#0f172a;
      --bg-2:#1e293b;
      --accent:#38bdf8;
      --text:#ffffff;
      --muted:#cbd5e1;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,var(--bg-1),var(--bg-2));
      min-height:100vh;
      color:var(--text);
      padding:50px 20px;
      line-height:1.5;
    }

    .skip-link{
      position:absolute;
      left:-9999px;
      top:auto;
    }

    .skip-link:focus{
      left:1rem;
      top:1rem;
      background:#fff;
      color:#000;
      padding:.75rem 1rem;
      z-index:1000;
      border-radius:8px;
    }

    .team-container{
      max-width:1300px;
      margin:auto;
      text-align:center;
    }

    .team-container h1{
      font-size:clamp(2rem,5vw,3rem);
      margin-bottom:50px;
      letter-spacing:2px;
    }

    .team-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:30px;
    }

    .team-card{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px;
      padding:30px 20px;
      position:relative;
      overflow:hidden;
      transition:
        transform .3s ease,
        box-shadow .3s ease;
    }

    .team-card:hover,
    .team-card:focus-within{
      transform:translateY(-10px);
      box-shadow:0 15px 40px rgba(0,0,0,.4);
    }

    .team-card::before{
      content:"";
      position:absolute;
      width:200px;
      height:200px;
      background:rgba(255,255,255,.08);
      border-radius:50%;
      top:-120px;
      right:-100px;
    }

    .profile-image{
      width:110px;
      height:110px;
      border-radius:50%;
      margin:0 auto 20px;
      background:linear-gradient(135deg,#38bdf8,#6366f1);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.2rem;
      font-weight:bold;
      color:white;
      border:4px solid rgba(255,255,255,.2);
    }

    .team-card h2{
      font-size:1.5rem;
      margin-bottom:10px;
    }

    .team-card p{
      color:var(--muted);
      margin-bottom:20px;
      font-size:.95rem;
    }

    .social-icons{
      display:flex;
      justify-content:center;
      gap:15px;
    }

    .social-icons a{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      background:rgba(255,255,255,.12);
      color:white;
      font-size:1.1rem;
      transition:
        transform .3s ease,
        background .3s ease;
    }

    .social-icons a:hover,
    .social-icons a:focus-visible{
      background:var(--accent);
      transform:scale(1.1);
      outline:2px solid white;
      outline-offset:2px;
    }

    @media (prefers-reduced-motion: reduce){
      *,
      *::before,
      *::after{
        animation:none !important;
        transition:none !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>

<body>

<a class="skip-link" href="#main-content">
  Skip to main content
</a>

<main id="main-content">
  <section
    class="team-container"
    aria-labelledby="team-heading"
  >
    <h1 id="team-heading">Our Team</h1>

    <div
      class="team-grid"
      role="list"
      aria-label="Team members"
    >

      <article class="team-card" role="listitem">
        <div class="profile-image" aria-hidden="true">ST</div>
        <h2>Saiteja</h2>
        <p>Frontend Developer</p>

        <nav class="social-icons" aria-label="Saiteja social links">
          <a href="/" aria-label="Portfolio">🌐</a>
          <a href="/" aria-label="LinkedIn profile">💼</a>
          <a href="mailto:saiteja@example.com" aria-label="Email">📧</a>
        </nav>
      </article>

      <article class="team-card" role="listitem">
        <div class="profile-image" aria-hidden="true">RA</div>
        <h2>Rahul</h2>
        <p>UI Designer</p>

        <nav class="social-icons" aria-label="Rahul social links">
          <a href="/" aria-label="Portfolio">🌐</a>
          <a href="/" aria-label="LinkedIn profile">💼</a>
          <a href="mailto:rahul@example.com" aria-label="Email">📧</a>
        </nav>
      </article>

      <!-- Repeat remaining cards using the same structure -->

    </div>
  </section>
</main>

<script src="../dist/shared.js"></script>
</body>
</html>
