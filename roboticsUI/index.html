<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robotics Control Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🤖 Robotics Control Panel</h1>
  </header>

  <main class="dashboard">

    <!-- Robot Status -->
    <section class="card">
      <h2>Robot Status</h2>

      <div class="status-grid">
        <div class="status online">ONLINE</div>
        <div class="status active">ACTIVE</div>
        <div class="status charging">CHARGING</div>
      </div>
    </section>

    <!-- Battery & Sensors -->
    <section class="card">
      <h2>Battery & Sensors</h2>

      <div class="monitor">
        <p>Battery</p>
        <div class="progress">
          <div class="battery-level"></div>
        </div>

        <p>Sensor Accuracy</p>
        <div class="progress">
          <div class="sensor-level"></div>
        </div>
      </div>
    </section>

    <!-- Movement Controls -->
    <section class="card controls">
      <h2>Movement Controls</h2>

      <div class="joystick">
        <button>⬆</button>

        <div class="middle">
          <button>⬅</button>
          <button>⏺</button>
          <button>➡</button>
        </div>

        <button>⬇</button>
      </div>
    </section>

    <!-- Commands -->
    <section class="card">
      <h2>Commands</h2>

      <div class="commands">
        <button class="cmd">Start Scan</button>
        <button class="cmd">Shutdown</button>
        <button class="cmd">Restart</button>
      </div>
    </section>

    <!-- Activity Logs -->
    <section class="card">
      <h2>Activity Logs</h2>

      <div class="logs" id="logs">
        <p>System initialized...</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
