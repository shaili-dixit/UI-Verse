<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search Interface</title>
  <link rel="stylesheet" href="ms.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


<div class="container">

  <h1>Movie Search</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search movies..." data-a11y-remediation="label-needed">
    <button id="searchBtn">Search</button>
  </div>

  <div class="movie-container" id="movieContainer">

    <div class="movie-card" data-title="inception">
      <img src="https://picsum.photos/300/400?random=1" alt="Movie Poster">
      <div class="movie-info">
        <h2>Inception</h2>
        <p>⭐ 8.8 IMDb</p>
      </div>
    </div>

    <div class="movie-card" data-title="interstellar">
      <img src="https://picsum.photos/300/400?random=2" alt="Movie Poster">
      <div class="movie-info">
        <h2>Interstellar</h2>
        <p>⭐ 8.6 IMDb</p>
      </div>
    </div>

  </div>

</div>

<script src="ms.js"></script>
      <script src="../dist/shared.js"></script>
</body>

</html>
