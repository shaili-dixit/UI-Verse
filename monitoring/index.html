

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPU/RAM Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🖥 CPU/RAM Monitoring Dashboard</h1>
  </header>

  <main class="container">

    <!-- CPU Usage -->
    <section class="card">
      <h2>CPU Usage</h2>

      <div class="circle">
        <div class="inner-circle">
          <span id="cpuValue">72%</span>
        </div>
      </div>
    </section>

    <!-- RAM Usage -->
    <section class="card">
      <h2>RAM Usage</h2>

      <div class="circle ram-circle">
        <div class="inner-circle">
          <span id="ramValue">58%</span>
        </div>
      </div>
    </section>

    <!-- System Info -->
    <section class="card">
      <h2>System Information</h2>

      <div class="info-box">
        <p><strong>OS:</strong> Windows 11</p>
        <p><strong>Processor:</strong> Intel i7</p>
        <p><strong>Storage:</strong> 512GB SSD</p>
        <p><strong>GPU:</strong> NVIDIA RTX</p>
      </div>
    </section>

    <!-- Live Graph -->
    <section class="card">
      <h2>Live Activity</h2>

      <div class="graph">
        <div class="line"></div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
