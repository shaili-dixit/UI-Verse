<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Explorer UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="explorer">

    <aside class="sidebar">
      <h2>Explorer</h2>

      <ul>
        <li class="active">📁 Documents</li>
        <li>📁 Downloads</li>
        <li>📁 Projects</li>
        <li>📁 Pictures</li>
        <li>📁 Videos</li>
      </ul>
    </aside>

    <main class="content">

      <div class="topbar">
        <h1>My Files</h1>

        <input type="text" placeholder="Search files...">
      </div>

      <div class="files-grid">

        <div class="file-card">
          <span>📄</span>
          <h3>Resume.pdf</h3>
          <p>2.1 MB</p>
        </div>

        <div class="file-card">
          <span>🖼️</span>
          <h3>Design.png</h3>
          <p>4.5 MB</p>
        </div>

        <div class="file-card">
          <span>🎵</span>
          <h3>Music.mp3</h3>
          <p>6.8 MB</p>
        </div>

        <div class="file-card">
          <span>🎬</span>
          <h3>Video.mp4</h3>
          <p>18 MB</p>
        </div>

        <div class="file-card">
          <span>📁</span>
          <h3>Frontend Project</h3>
          <p>Folder</p>
        </div>

        <div class="file-card">
          <span>📄</span>
          <h3>Notes.txt</h3>
          <p>500 KB</p>
        </div>

      </div>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
