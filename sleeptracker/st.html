<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Tracking Dashboard</title>
  <link rel="stylesheet" href="st.css">
</head>
<body>

  <div class="dashboard">

    <div class="top-section">

      <div class="card sleep-card">
        <h3>Last Night Sleep</h3>
        <h1>7h 45m</h1>
      </div>

      <div class="card quality-card">
        <h3>Sleep Quality</h3>
        <h2>85%</h2>
      </div>

      <div class="card bedtime-card">
        <h3>Bedtime</h3>
        <h2>10:30 PM</h2>
      </div>

    </div>

    <div class="bottom-section">

      <div class="analytics-card">

        <h2>Weekly Sleep Analytics</h2>

        <div class="chart">

          <div class="bar" style="height: 70%;">
            <span>Mon</span>
          </div>

          <div class="bar" style="height: 85%;">
            <span>Tue</span>
          </div>

          <div class="bar" style="height: 60%;">
            <span>Wed</span>
          </div>

          <div class="bar" style="height: 90%;">
            <span>Thu</span>
          </div>

          <div class="bar" style="height: 75%;">
            <span>Fri</span>
          </div>

          <div class="bar" style="height: 95%;">
            <span>Sat</span>
          </div>

          <div class="bar" style="height: 80%;">
            <span>Sun</span>
          </div>

        </div>

      </div>

      <div class="reminder-card">

        <h2>Bedtime Reminder</h2>

        <p>
          Set a reminder to maintain a healthy sleep routine.
        </p>

        <input type="time" id="bedtimeInput">

        <button id="setReminderBtn">
          Set Reminder
        </button>

        <div id="message"></div>

      </div>

    </div>

  </div>

  <script src="st.js"></script>
</body>
</html>
