<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Mirror Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="dashboard">

    <div class="card clock-card">
      <h2 id="time">00:00:00</h2>
      <p id="date">Loading date...</p>
    </div>

    <div class="card weather-card">
      <h3>Weather</h3>
      <div class="weather-info">
        <h1>28°C</h1>
        <p>Cloudy</p>
      </div>
    </div>

    <div class="card schedule-card">
      <h3>Today's Schedule</h3>

      <div class="task">
        <span>9:00 AM</span>
        <p>Team Meeting</p>
      </div>

      <div class="task">
        <span>1:00 PM</span>
        <p>Project Work</p>
      </div>

      <div class="task">
        <span>6:00 PM</span>
        <p>Workout Session</p>
      </div>
    </div>

    <div class="card quote-card">
      <h3>Daily Quote</h3>
      <p>
        “Success is built through consistency and discipline.”
      </p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
