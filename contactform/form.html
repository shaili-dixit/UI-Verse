<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https:;
    base-uri 'self';
    frame-ancestors 'none';
    object-src 'none';
    connect-src 'self' https:;
    img-src 'self' data: https:;
    font-src 'self' data: https:;
    script-src 'self' 'unsafe-inline';
    style-src 'self' https: 'unsafe-inline'">

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form UI</title>

  </head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="bg"></div>

  <div class="container">

    <form class="contact-form" id="contactForm">
      <h2>Contact Us</h2>
      <p class="subtitle">We’d love to hear from you 👋</p>

      <div class="input-box">
        <input type="text" id="name" required data-a11y-remediation="label-needed">
        <label>Your Name</label>
      </div>

      <div class="input-box">
        <input type="email" id="email" required>
        <label>Your Email</label>
      </div>

      <div class="input-box">
        <textarea id="message" required></textarea>
        <label>Your Message</label>
      </div>

      <button type="submit">Send Message</button>

      <div class="toast" id="toast">Message sent successfully 🚀</div>
    </form>

  </div>

  <script src="form.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
