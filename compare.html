<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes' sha256-FyBi1uSLpmZDEoheD8kSbPjycd1pDJkfZABMqzuind0=; style-src-attr 'unsafe-hashes' sha256-FyBi1uSLpmZDEoheD8kSbPjycd1pDJkfZABMqzuind0=">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Component Compare — UI-Verse</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="compare.css">
  <link rel="stylesheet" href="shared-sidebar.css">
</head>
<body>
  <div class="toolbar">
    <label>
      Left:
      <select id="leftSelect" class="select"></select>
    </label>

    <label>
      Right:
      <select id="rightSelect" class="select"></select>
    </label>

    <div class="controls">
      <button id="swapBtn">Swap</button>
      <label class="muted"><input type="checkbox" id="syncScroll"> Sync scroll</label>
      <button id="openBoth">Open Both in New Tabs</button>
    </div>
  </div>

  <div class="layout">
    <div class="pane">
      <header><strong id="leftTitle">Left</strong></header>
      <div class="view"><iframe id="leftFrame" title="Left preview"></iframe></div>
    </div>

    <div class="pane">
      <header><strong id="rightTitle">Right</strong></header>
      <div class="view"><iframe id="rightFrame" title="Right preview"></iframe></div>
    </div>
  </div>

  <script src="js/features/compare.js"></script>
</body>
</html>
