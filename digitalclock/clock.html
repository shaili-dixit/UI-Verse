<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'"
  >
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Digital Clock & Calendar UI</title>

  <link rel="stylesheet" href="clock.css">
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="dashboard">

    <!-- CLOCK -->
    <div class="clock-container">

      <h1>Digital Clock</h1>

      <div class="clock" id="clock">
        00:00:00
      </div>

      <div class="date" id="date">
        Monday, January 1, 2026
      </div>

    </div>

    <!-- CALENDAR -->
    <div class="calendar-container">

      <div class="calendar-header">

        <button id="prevMonth">&#10094;</button>

        <h2 id="monthYear">January 2026</h2>

        <button id="nextMonth">&#10095;</button>

      </div>

      <div class="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
      </div>

      <div class="calendar-days" id="calendarDays"></div>

    </div>

    <!-- EVENTS -->
    <div class="events-container">

      <h2>Upcoming Events</h2>

      <div class="event-card">
        <span class="event-date">12</span>
        <div>
          <h4>Project Meeting</h4>
          <p>10:00 AM</p>
        </div>
      </div>

      <div class="event-card">
        <span class="event-date">18</span>
        <div>
          <h4>UI Workshop</h4>
          <p>02:30 PM</p>
        </div>
      </div>

      <div class="event-card">
        <span class="event-date">25</span>
        <div>
          <h4>Hackathon</h4>
          <p>09:00 AM</p>
        </div>
      </div>

    </div>

  </div>

  <script src="clock.js"></script>

      <script src="../dist/shared.js"></script>
</body>
</html>
