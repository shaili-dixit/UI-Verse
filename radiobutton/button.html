<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Button Styles</title>

  <link rel="stylesheet" href="button.css">
</head>

<body>

  <div class="container">

    <h2>Select Your Plan</h2>

    <label class="radio-card">

      <input type="radio" name="plan" checked>

      <span class="custom-radio"></span>

      <div class="content">
        <h3>Basic Plan</h3>
        <p>Good for beginners</p>
      </div>

    </label>

    <label class="radio-card">

      <input type="radio" name="plan">

      <span class="custom-radio"></span>

      <div class="content">
        <h3>Standard Plan</h3>
        <p>Perfect for regular users</p>
      </div>

    </label>

    <label class="radio-card">

      <input type="radio" name="plan">

      <span class="custom-radio"></span>

      <div class="content">
        <h3>Premium Plan</h3>
        <p>Best for professionals</p>
      </div>

    </label>

  </div>

</body>
</html>
