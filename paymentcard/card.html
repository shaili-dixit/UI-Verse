<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Card UI</title>
  <link rel="stylesheet" href="card.css">
</head>
<body>

  <div class="card-container">

    <div class="payment-card">

      <div class="card-top">

        <div class="chip"></div>

        <div class="card-type">
          VISA
        </div>

      </div>

      <div class="card-number">
        1234 5678 9012 3456
      </div>

      <div class="card-details">

        <div>
          <span>Card Holder</span>
          <h3>Saiteja</h3>
        </div>

        <div>
          <span>Expires</span>
          <h3>12/29</h3>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
