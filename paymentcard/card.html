<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Payment Card UI</title>
  <link rel="stylesheet" href="card.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="bg"></div>

  <div class="card-container">
    <div class="payment-card">

      <div class="top">
        <div class="chip"></div>
        <div class="brand">VISA</div>
      </div>

      <div class="number">1234 5678 9012 3456</div>

      <div class="bottom">
        <div class="holder">
          <span>Card Holder</span>
          <h3>Saiteja</h3>
        </div>

        <div class="expiry">
          <span>Expires</span>
          <h3>12/29</h3>
        </div>
      </div>

    </div>
  </div>

      <script src="../dist/shared.js"></script>
</body>
</html>
