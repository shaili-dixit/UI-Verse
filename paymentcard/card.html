<html lang="en">
<head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="bg"></div>

  <div class="card-container">
    <div class="payment-card">

      <div class="top">
        <div class="chip"></div>
        <div class="brand">VISA</div>
      </div>

      <div class="number">1234 5678 9012 3456</div>

      <div class="bottom">
        <div class="holder">
          <span>Card Holder</span>
          <h3>Saiteja</h3>
        </div>

        <div class="expiry">
          <span>Expires</span>
          <h3>12/29</h3>
        </div>
      </div>

    </div>
  </div>
  <div class="card-container">
  <div class="payment-card">

    <div class="card-shine"></div>

    <div class="top">
      <div class="bank-name">Premium Bank</div>

      <div class="card-icons">
        <div class="contactless">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="brand">VISA</div>
      </div>
    </div>

    <div class="chip"></div>

    <div class="number">1234 •••• •••• 3456</div>

    <div class="bottom">
      <div class="holder">
        <span>Card Holder</span>
        <h3>Saiteja</h3>
      </div>

      <div class="expiry">
        <span>Expires</span>
        <h3>12/29</h3>
