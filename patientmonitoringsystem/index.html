

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Patient Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🏥 Patient Monitoring Dashboard</h1>
  </header>

  <main class="container">

    <!-- Patient Status -->
    <section class="card">
      <h2>Patient Status</h2>

      <div class="patients">

        <div class="patient stable">
          <h3>John Doe</h3>
          <p>Status: Stable</p>
        </div>

        <div class="patient critical">
          <h3>Emma Smith</h3>
          <p>Status: Critical</p>
        </div>

      </div>
    </section>

    <!-- Heart Rate -->
    <section class="card">
      <h2>Heart Rate</h2>

      <div class="chart">
        <div class="pulse"></div>
      </div>

      <p id="heartRate">78 BPM</p>
    </section>

    <!-- Oxygen Level -->
    <section class="card">
      <h2>Oxygen Level</h2>

      <div class="oxygen-bar">
        <div class="oxygen-fill"></div>
      </div>

      <p>96%</p>
    </section>

    <!-- Emergency Alerts -->
    <section class="card">
      <h2>Emergency Alerts</h2>

      <div class="alert-box" id="alertBox">
        No emergency alerts.
      </div>
    </section>

    <!-- Patient Records -->
    <section class="card">
      <h2>Patient Records</h2>

      <table>
        <tr>
          <th>Name</th>
          <th>Room</th>
          <th>Status</th>
        </tr>

        <tr>
          <td>John Doe</td>
          <td>101</td>
          <td>Stable</td>
        </tr>

        <tr>
          <td>Emma Smith</td>
          <td>204</td>
          <td>Critical</td>
        </tr>
      </table>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
