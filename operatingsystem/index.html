<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoOS — Sci-Fi Desktop</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- Top Bar -->
  <nav class="navbar">
    <div class="logo">⚡ NeoOS</div>

    <ul class="nav-links">
      <li>Dashboard</li>
      <li>Terminal</li>
      <li>Apps</li>
      <li>Settings</li>
    </ul>

    <div class="status">
      🟢 Online
    </div>
  </nav>

  <!-- Desktop -->
  <main class="desktop">

    <!-- Left Widget Panel -->
    <aside class="sidebar">
      <h3>System Monitor</h3>

      <div class="card">
        <p>CPU Usage</p>
        <div class="bar"><span style="width:72%"></span></div>
      </div>

      <div class="card">
        <p>RAM Usage</p>
        <div class="bar"><span style="width:61%"></span></div>
      </div>

      <div class="card">
        <p>Network</p>
        <span class="tag">Stable ⚡</span>
      </div>

      <div class="card">
        <p>Uptime</p>
        <span class="tag">12h 34m</span>
      </div>
    </aside>

    <!-- Floating Window -->
    <section class="window" id="window">

      <div class="window-header" id="dragArea">
        <div class="controls">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>

        <span class="title">Terminal.exe</span>
      </div>

      <div class="terminal" id="terminal">
        <p>> Boot sequence initiated...</p>
        <p>> Loading modules...</p>
        <p>> System ready ✔</p>
        <p class="cursor">_</p>
      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
