<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sci-Fi Operating System UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h1>⚡ NeoOS</h1>

    <ul>
      <li>Dashboard</li>
      <li>Terminal</li>
      <li>Settings</li>
    </ul>
  </nav>

  <!-- Desktop -->
  <main class="desktop">

    <!-- Widget -->
    <section class="widget">
      <h2>System Status</h2>

      <div class="status-card">
        <p>CPU Usage: 72%</p>
        <p>RAM Usage: 61%</p>
        <p>Network: Stable</p>
      </div>
    </section>

    <!-- Draggable Window -->
    <section class="window" id="window">
      <div class="window-header" id="dragArea">
        <span>Terminal.exe</span>
      </div>

      <div class="terminal" id="terminal">
        <p>> Initializing system...</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
