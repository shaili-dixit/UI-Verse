<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>

  <link rel="stylesheet" href="card.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <div class="profile-card">

    <img src="https://i.pravatar.cc/150?img=12" alt="Profile Image" srcset="https://i.pravatar.cc/40?img=12 40w, https://i.pravatar.cc/80?img=12 80w, https://i.pravatar.cc/150?img=12 150w, https://i.pravatar.cc/300?img=12 300w" sizes="(max-width: 768px) 96px, 160px" loading="lazy" decoding="async">

    <h2>John Doe</h2>

    <p class="role">Frontend Developer</p>

    <p class="description">
      Passionate about building clean and modern user interfaces with responsive design.
    </p>

    <div class="social-icons">

      <a href="#"><i class="fa-brands fa-github"></i></a>

      <a href="#"><i class="fa-brands fa-linkedin"></i></a>

      <a href="#"><i class="fa-brands fa-twitter"></i></a>

    </div>

    <button>Follow</button>

  </div>

</body>
</html>
