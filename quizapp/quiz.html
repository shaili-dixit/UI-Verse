<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>QuizMaster UI</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="quiz.css" />
</head>

<body>
  <!-- Animated Background -->
  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>

  <div class="quiz-wrapper">

    <!-- Top Bar -->
    <div class="top-bar">

      <div class="logo">
        <span>⚡</span>
        QuizMaster
      </div>

      <div class="quiz-info">

        <div class="info-box">
          <small>Question</small>
          <strong>01/10</strong>
        </div>

        <div class="info-box">
          <small>Time</small>
          <strong id="timer">30s</strong>
        </div>

      </div>

    </div>

    <!-- Quiz Card -->
    <div class="quiz-card">

      <!-- Progress -->
      <div class="progress-area">

        <div class="progress-text">
          <span>Progress</span>
          <span>10%</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>

      </div>

      <!-- Category -->
      <div class="category-badge">
        Web Development
      </div>

      <!-- Question -->
      <h1 id="question">
        What does HTML stand for?
      </h1>

      <!-- Options -->
      <div class="options">

        <button class="option-btn">
          <span>A.</span>
          Hyper Text Markup Language
        </button>

        <button class="option-btn">
          <span>B.</span>
          High Transfer Machine Language
        </button>

        <button class="option-btn">
          <span>C.</span>
          Hyper Transfer Markup Level
        </button>

        <button class="option-btn">
          <span>D.</span>
          Home Tool Markup Language
        </button>

      </div>

      <!-- Bottom Controls -->
      <div class="bottom-controls">

        <div class="score-card">
          🏆 Score:
          <span id="score">0</span>
        </div>

        <button id="nextBtn">
          Next Question →
        </button>

      </div>

    </div>

  </div>

  <script src="quiz.js"></script>

      <script src="../dist/shared.js"></script>
</body>
</html>
