<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Recommendation Dashboard</title>
  <link rel="stylesheet" href="recipe.css">
</head>
<body>

  <div class="dashboard">

    <header class="top-bar">

      <h1>Recipe Recommendations</h1>

      <div class="search-box">
        <input type="text" placeholder="Search recipes...">
      </div>

    </header>

    <div class="filter-section">

      <button class="active">All</button>
      <button>Breakfast</button>
      <button>Lunch</button>
      <button>Dinner</button>
      <button>Desserts</button>

    </div>

    <div class="recipe-grid">

      <div class="recipe-card">

        <img
          src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c"
          alt="Salad"
        >

        <div class="recipe-content">

          <h2>Healthy Salad Bowl</h2>

          <p>
            Fresh vegetables with healthy dressing and toppings.
          </p>

          <div class="recipe-footer">

            <span>20 mins</span>

            <button class="fav-btn">
              ♡
            </button>

          </div>

        </div>

      </div>

      <div class="recipe-card">

        <img
          src="https://images.unsplash.com/photo-1513104890138-7c749659a591"
          alt="Pizza"
        >

        <div class="recipe-content">

          <h2>Cheese Pizza</h2>

          <p>
            Crispy pizza topped with extra cheese and herbs.
          </p>

          <div class="recipe-footer">

            <span>30 mins</span>

            <button class="fav-btn">
              ♡
            </button>

          </div>

        </div>

      </div>

      <div class="recipe-card">

        <img
          src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"
          alt="Burger"
        >

        <div class="recipe-content">

          <h2>Classic Burger</h2>

          <p>
            Juicy burger served with crispy fries and sauces.
          </p>

          <div class="recipe-footer">

            <span>25 mins</span>

            <button class="fav-btn">
              ♡
            </button>

          </div>

        </div>

      </div>

    </div>

  <script src="recipe.js"></script>
</body>
</html>
