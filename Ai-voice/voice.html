<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AI Voice Translator UI</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="voice.css" />
</head>

<body>

  <!-- Background Glow -->
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="translator-container">

    <div class="translator-card">

      <!-- Top -->
      <div class="top-section">

        <div>
          <span class="badge">
            AI Powered
          </span>

          <h1>
            AI Voice Translator
          </h1>

          <p>
            Speak naturally and translate your voice instantly into any language with futuristic AI technology.
          </p>
        </div>

        <button class="theme-btn">
          <i class="fa-solid fa-moon"></i>
        </button>

      </div>

      <!-- Languages -->
      <div class="language-section">

        <div class="language-card">

          <label>
            From
          </label>

          <select id="fromLanguage">
            <option>English</option>
            <option>Hindi</option>
            <option>Spanish</option>
            <option>French</option>
            <option>Japanese</option>
            <option>German</option>
          </select>

        </div>

        <button class="swap-btn">
          <i class="fa-solid fa-right-left"></i>
        </button>

        <div class="language-card">

          <label>
            To
          </label>

          <select id="toLanguage">
            <option>Hindi</option>
            <option>English</option>
            <option>Spanish</option>
            <option>French</option>
            <option>Japanese</option>
            <option>German</option>
          </select>

        </div>

      </div>

      <!-- Voice Animation -->
      <div class="voice-wave">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

      </div>

      <!-- Mic -->
      <div class="mic-section">

        <button id="micBtn">
          <i class="fa-solid fa-microphone"></i>
        </button>

        <h3>
          Tap To Speak
        </h3>

        <p id="status">
          Tap microphone to start speaking
        </p>

      </div>

      <!-- Translation -->
      <div class="translation-box">

        <div class="input-card card">

          <div class="card-top">

            <h3>
              <i class="fa-solid fa-wave-square"></i>
              Input
            </h3>

            <button>
              <i class="fa-regular fa-copy"></i>
            </button>

          </div>

          <p id="inputText">
            Hello, how are you?
          </p>

        </div>

        <div class="output-card card">

          <div class="card-top">

            <h3>
              <i class="fa-solid fa-language"></i>
              Translated
            </h3>

            <button>
              <i class="fa-solid fa-volume-high"></i>
            </button>

          </div>

          <p id="translatedText">
            नमस्ते, आप कैसे हैं?
          </p>

        </div>

      </div>

      <!-- Bottom Buttons -->
      <div class="bottom-actions">

        <button class="history-btn">
          <i class="fa-solid fa-clock-rotate-left"></i>
          History
        </button>

        <button class="translate-btn">
          <i class="fa-solid fa-bolt"></i>
          Translate Now
        </button>

      </div>

    </div>

  </div>

  <script src="voice.js"></script>

</body>
</html>
