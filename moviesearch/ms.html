<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search Interface</title>
  <link rel="stylesheet" href="ms.css">
</head>
<body>

<div class="container">

  <h1>Movie Search</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search movies...">
    <button onclick="searchMovie()">Search</button>
  </div>

  <div class="movie-container" id="movieContainer">

    <div class="movie-card">
      <img src="https://picsum.photos/300/400?random=1" alt="Movie Poster">

      <div class="movie-info">
        <h2>Inception</h2>
        <p>⭐ 8.8 IMDb</p>
      </div>
    </div>

    <div class="movie-card">
      <img src="https://picsum.photos/300/400?random=2" alt="Movie Poster">

      <div class="movie-info">
        <h2>Interstellar</h2>
        <p>⭐ 8.6 IMDb</p>
      </div>
    </div>

  </div>

</div>

<script src="ms.js"></script>
</body>
</html>
