<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Status Widget UI</title>
  <link rel="stylesheet" href="battery.css">
</head>
<body>

  <div class="battery-widget">

    <h1>Battery Status</h1>

    <div class="battery-container">

      <div class="battery">

        <div
          class="battery-level"
          id="batteryLevel"
        ></div>

      </div>

      <div class="battery-tip"></div>

    </div>

    <div class="battery-info">

      <h2 id="batteryPercentage">
        80%
      </h2>

      <p id="batteryStatus">
        Charging
      </p>

    </div>

    <button id="toggleBtn">
      Toggle Charging
    </button>

  </div>

  <script src="battery.js"></script>
</body>
</html>
