<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Classroom UI</title>
  <link rel="stylesheet" href="vc.css">
</head>
<body>

  <div class="classroom-dashboard">

    <aside class="sidebar">

      <h2>EduClass</h2>

      <ul>
        <li class="active">Live Class</li>
        <li>Assignments</li>
        <li>Schedule</li>
        <li>Participants</li>
        <li>Settings</li>
      </ul>

    </aside>

    <main class="main-content">

      <div class="video-section">

        <div class="video-screen">

          <h1>Web Development Class</h1>

          <p>Live Session in Progress</p>

        </div>

        <div class="controls">

          <button>🎤</button>
          <button>📹</button>
          <button class="leave-btn">Leave</button>

        </div>

      </div>

      <div class="bottom-section">

        <div class="participants-card">

          <h2>Participants</h2>

          <div class="participant">
            <span>👨‍🎓 Saiteja</span>
            <p>Online</p>
          </div>

          <div class="participant">
            <span>👩‍🎓 Rahul</span>
            <p>Online</p>
          </div>

          <div class="participant">
            <span>👨‍🏫 Mentor</span>
            <p>Teaching</p>
          </div>

        </div>

        <div class="chat-card">

          <h2>Class Chat</h2>

          <div class="messages" id="messages">

            <div class="message">
              Mentor: Please submit the assignment today.
            </div>

            <div class="message student">
              Rahul: Okay sir!
            </div>

          </div>

          <div class="chat-input">

            <input
              type="text"
              id="chatInput"
              placeholder="Type message..."
            >

            <button id="sendBtn">
              Send
            </button>

          </div>

        </div>

      </div>

    </main>

  </div>

  <script src="vc.js"></script>
</body>
</html>
