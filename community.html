<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes' sha256-WRwMUNUFgezG/no8vI5B6RAi35dCpvtRZ4VtHjCAsh0=; script-src-attr 'unsafe-hashes' sha256-WRwMUNUFgezG/no8vI5B6RAi35dCpvtRZ4VtHjCAsh0=; style-src 'self' https: 'unsafe-hashes' sha256-ROfcBSW6Oc6VZVNXEe2EAvcfyVgsEHSWt+rv8dOT2aY=; style-src-attr 'unsafe-hashes' sha256-ROfcBSW6Oc6VZVNXEe2EAvcfyVgsEHSWt+rv8dOT2aY=">
  <meta http-equiv="refresh" content="2; url=community/community.html">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Community | Redirecting...</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #cbd5e1;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, #1e293b, #0f172a);
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      padding: 1.5rem;
    }

    .card {
      width: min(500px, 100%);
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    h1 {
      margin-bottom: 0.75rem;
      font-size: 2rem;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    .spinner {
      width: 52px;
      height: 52px;
      margin: 1.5rem auto;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .skip-link {
      position: absolute;
      left: -9999px;
    }

    .skip-link:focus {
      left: 1rem;
      top: 1rem;
      background: white;
      color: black;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      z-index: 1000;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    setTimeout(() => {
      window.location.replace("community/community.html");
    }, 2000);
  </script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content">
    <section class="card" aria-live="polite">
      <h1>Community Hub</h1>

      <div class="spinner" aria-hidden="true"></div>

      <p>
        Redirecting you to the Community page...
      </p>

      <br>

      <p>
        If the redirect doesn't happen automatically,
        <a href="community/community.html">click here</a>.
      </p>
    </section>
  </main>
</body>
</html>
