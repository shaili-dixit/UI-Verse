<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Review Platform UI</title>
  <link rel="stylesheet" href="mr.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="movie-dashboard">

    <header class="top-bar">

      <h1>Movie Reviews</h1>

      <input
        type="text"
        placeholder="Search movies..."
       data-a11y-remediation="label-needed">

    </header>

    <div class="filter-section">

      <button class="active">All</button>
      <button>Action</button>
      <button>Comedy</button>
      <button>Sci-Fi</button>
      <button>Drama</button>

    </div>

    <div class="movies-grid">

      <div class="movie-card">

        <img
          src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba"
          alt="Movie"
        >

        <div class="movie-content">

          <h2>Interstellar</h2>

          <p>
            A science fiction journey through space and time.
          </p>

          <div class="rating">
            ⭐ 4.8 / 5
          </div>

          <button class="review-btn">
            Add Review
          </button>

        </div>

      </div>

      <div class="movie-card">

        <img
          src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c"
          alt="Movie"
        >

        <div class="movie-content">

          <h2>Inception</h2>

          <p>
            A mind-bending thriller with dream-based action.
          </p>

          <div class="rating">
            ⭐ 4.7 / 5
          </div>

          <button class="review-btn">
            Add Review
          </button>

        </div>

      </div>

      <div class="movie-card">

        <img
          src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1"
          alt="Movie"
        >

        <div class="movie-content">

          <h2>Avengers Endgame</h2>

          <p>
            Superheroes unite for the final battle to save Earth.
          </p>

          <div class="rating">
            ⭐ 4.9 / 5
          </div>

          <button class="review-btn">
            Add Review
          </button>

        </div>

      </div>

    </div>

  </div>

  <script src="mr.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
