<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Network Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🧠 Neural Network Visualizer</h1>
  </header>

  <main class="container">

    <!-- Neural Network -->
    <section class="card">
      <h2>Neural Layers</h2>

      <div class="network">

        <div class="layer">
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
        </div>

        <div class="layer">
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
        </div>

        <div class="layer">
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
        </div>

      </div>
    </section>

    <!-- Training Progress -->
    <section class="card">
      <h2>Training Progress</h2>

      <p>Epoch Progress</p>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <p id="progressText">65%</p>
    </section>

    <!-- Accuracy & Loss -->
    <section class="card">
      <h2>Accuracy & Loss</h2>

      <div class="graph-section">

        <div>
          <p>Accuracy</p>
          <div class="graph accuracy"></div>
        </div>

        <div>
          <p>Loss</p>
          <div class="graph loss"></div>
        </div>

      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
