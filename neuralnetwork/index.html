<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Network Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🧠 Neural Network Visualizer</h1>
  </header>

  <main class="container">

    <!-- Neural Network -->
    <!-- Neural Network -->
<section class="card">
  <h2>Neural Layers</h2>

  <div class="network-wrapper">

    <!-- SVG Connections -->
    <svg class="connections" viewBox="0 0 600 200" preserveAspectRatio="none">

      <!-- Input → Hidden -->
      <line x1="80" y1="40" x2="280" y2="30" />
      <line x1="80" y1="40" x2="280" y2="80" />
      <line x1="80" y1="40" x2="280" y2="130" />

      <line x1="80" y1="100" x2="280" y2="30" />
      <line x1="80" y1="100" x2="280" y2="80" />
      <line x1="80" y1="100" x2="280" y2="130" />

      <line x1="80" y1="160" x2="280" y2="30" />
      <line x1="80" y1="160" x2="280" y2="80" />
      <line x1="80" y1="160" x2="280" y2="130" />

      <!-- Hidden → Output -->
      <line x1="280" y1="30" x2="520" y2="50" />
      <line x1="280" y1="80" x2="520" y2="100" />
      <line x1="280" y1="130" x2="520" y2="150" />

    </svg>

    <!-- Nodes -->
    <div class="network">
      
      <div class="layer input">
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
      </div>

      <div class="layer hidden">
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
      </div>

      <div class="layer output">
        <div class="node"></div>
        <div class="node"></div>
        <div class="node"></div>
      </div>

    </div>

  </div>
</section>
  
<!-- Training Progress -->
    <section class="card">
      <h2>Training Progress</h2>

      <p>Epoch Progress</p>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <p id="progressText">65%</p>
    </section>

    <!-- Accuracy & Loss -->
    <section class="card">
      <h2>Accuracy & Loss</h2>

      <div class="graph-section">

        <div>
          <p>Accuracy</p>
          <div class="graph accuracy"></div>
        </div>

        <div>
          <p>Loss</p>
          <div class="graph loss"></div>
        </div>

      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
