<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Notes Sidebar</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="app">

    <aside class="sidebar">

      <div class="sidebar-header">
        <h2>🗒 Smart Notes</h2>
        <p>Capture ideas instantly</p>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search notes..." data-a11y-remediation="label-needed">
      </div>

      <div class="add-box">
        <input type="text" id="noteInput" placeholder="Write a new note...">
        <button id="addBtn">＋</button>
      </div>

      <div id="notesContainer" class="notes-container"></div>

    </aside>

    <main class="preview">
      <h1>Welcome 👋</h1>
      <p>Select or add a note from the sidebar.</p>
    </main>

  </div>

        <script src="../dist/shared.js"></script>
</body>
</html>
