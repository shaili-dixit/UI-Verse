<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Forecast Dashboard UI</title>
  <link rel="stylesheet" href="ui.css">
</head>
<body>

  <div class="weather-dashboard">

    <div class="current-weather">

      <h1>Hyderabad</h1>

      <div class="weather-icon">
        ☀️
      </div>

      <h2>32°C</h2>

      <p>Sunny Weather</p>

    </div>

    <div class="weather-stats">

      <div class="stat-card">

        <h3>Humidity</h3>

        <p>60%</p>

      </div>

      <div class="stat-card">

        <h3>Wind Speed</h3>

        <p>14 km/h</p>

      </div>

      <div class="stat-card">

        <h3>Pressure</h3>

        <p>1012 hPa</p>

      </div>

    </div>

    <div class="weekly-forecast">

      <div class="forecast-card">

        <h4>Mon</h4>

        <span>☀️</span>

        <p>31°C</p>

      </div>

      <div class="forecast-card">

        <h4>Tue</h4>

        <span>🌧️</span>

        <p>28°C</p>

      </div>

      <div class="forecast-card">

        <h4>Wed</h4>

        <span>⛅</span>

        <p>30°C</p>

      </div>

      <div class="forecast-card">

        <h4>Thu</h4>

        <span>🌩️</span>

        <p>27°C</p>

      </div>

      <div class="forecast-card">

        <h4>Fri</h4>

        <span>☀️</span>

        <p>33°C</p>

      </div>

    </div>

  </div>

  <script src="ui.js"></script>
</body>
</html>
