<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Keyboard</title>
  <link rel="stylesheet" href="vk.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


<div class="container">

  <h1>⌨ Advanced Virtual Keyboard</h1>

  <div class="top-bar">
    <button id="themeBtn">🌙 Theme</button>
    <button id="soundBtn">🔊 Sound</button>
    <button id="clearBtn">🗑 Clear</button>
  </div>

  <textarea id="display" placeholder="Start typing..." readonly></textarea>

  <div class="keyboard">

    <!-- Numbers -->
    <div class="row">
      <button class="key">1</button>
      <button class="key">2</button>
      <button class="key">3</button>
      <button class="key">4</button>
      <button class="key">5</button>
      <button class="key">6</button>
      <button class="key">7</button>
      <button class="key">8</button>
      <button class="key">9</button>
      <button class="key">0</button>
    </div>

    <!-- Row 1 -->
    <div class="row">
      <button class="key">Q</button>
      <button class="key">W</button>
      <button class="key">E</button>
      <button class="key">R</button>
      <button class="key">T</button>
      <button class="key">Y</button>
      <button class="key">U</button>
      <button class="key">I</button>
      <button class="key">O</button>
      <button class="key">P</button>
    </div>

    <!-- Row 2 -->
    <div class="row">
      <button class="key caps">Caps</button>
      <button class="key">A</button>
      <button class="key">S</button>
      <button class="key">D</button>
      <button class="key">F</button>
      <button class="key">G</button>
      <button class="key">H</button>
      <button class="key">J</button>
      <button class="key">K</button>
      <button class="key">L</button>
      <button class="key enter">Enter</button>
    </div>

    <!-- Row 3 -->
    <div class="row">
      <button class="key shift">Shift</button>
      <button class="key">Z</button>
      <button class="key">X</button>
      <button class="key">C</button>
      <button class="key">V</button>
      <button class="key">B</button>
      <button class="key">N</button>
      <button class="key">M</button>
      <button class="key">,</button>
      <button class="key">.</button>
      <button class="key backspace">⌫</button>
    </div>

    <!-- Bottom -->
    <div class="row">
      <button class="key emoji">😊</button>
      <button class="key space">Space</button>
      <button class="key">?</button>
      <button class="key">!</button>
    </div>

  </div>

</div>

<script src="vk.js"></script>
  <script src="dist/shared.js"></script>
</body>
</html>
