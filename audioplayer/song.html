<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player UI</title>
  <link rel="stylesheet" href="song.css">
</head>
<body>

  <div class="player-container">

    <div class="album-image">
      IMAGE
    </div>

    <h2>Dream Music</h2>

    <p>Artist Name</p>

    <audio id="audio">
      <source src="" type="audio/mp3">
    </audio>

    <input type="range" id="progressBar" value="0">

    <div class="controls">

      <button id="playBtn">Play</button>

      <button id="pauseBtn">Pause</button>

    </div>

    <div class="volume-section">

      <span>Volume</span>

      <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="1">

    </div>

  </div>

  <script src="song.js"></script>
</body>
</html>
