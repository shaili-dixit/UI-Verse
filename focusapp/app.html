<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode Dashboard UI</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <div class="dashboard-container">

    <h1>Focus Mode Dashboard</h1>

    <div class="timer-card">

      <h2>Focus Timer</h2>

      <div class="timer" id="timer">
        25:00
      </div>

      <div class="timer-buttons">

        <button id="startBtn">
          Start
        </button>

        <button id="resetBtn">
          Reset
        </button>

      </div>

    </div>

    <div class="stats-grid">

      <div class="stat-card">

        <h3>Tasks Completed</h3>

        <p>12</p>

      </div>

      <div class="stat-card">

        <h3>Focus Hours</h3>

        <p>18h</p>

      </div>

      <div class="stat-card">

        <h3>Productivity</h3>

        <p>92%</p>

      </div>

    </div>

    <div class="progress-section">

      <h2>Task Progress</h2>

      <div class="progress-bar">

        <div class="progress-fill"></div>

      </div>

    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
