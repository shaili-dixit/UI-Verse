<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Login Card</title>

  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="background">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
  </div>

  <div class="login-card">

    <h2>Login</h2>

    <form>

      <div class="input-box">
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
      </div>

      <button type="submit">Sign In</button>

      <p class="signup-text">
        Don't have an account?
        <a href="#">Register</a>
      </p>

    </form>

  </div>

</body>
</html>
