<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Floating Action Buttons</title>

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="action.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <!-- =========================
       DEFAULT FAB
  ========================== -->
  <div class="fab-container bottom-right">

    <div class="fab-options" id="fabOptions1">
      <button data-a11y-remediation="button-label-needed"><i class="fa-solid fa-house"></i></button>
      <button><i class="fa-solid fa-comment"></i></button>
      <button><i class="fa-solid fa-phone"></i></button>
    </div>

    <button class="fab blue" id="fab1">
      <i class="fa-solid fa-plus"></i>
    </button>

  </div>


  <!-- =========================
       LEFT FAB
  ========================== -->
  <div class="fab-container bottom-left">

    <div class="fab-options horizontal" id="fabOptions2">
      <button><i class="fa-brands fa-instagram"></i></button>
      <button><i class="fa-brands fa-facebook-f"></i></button>
      <button><i class="fa-brands fa-x-twitter"></i></button>
      <button><i class="fa-brands fa-linkedin-in"></i></button>
    </div>

    <button class="fab pink" id="fab2">
      <i class="fa-solid fa-share-nodes"></i>
    </button>

  </div>


  <!-- =========================
       TOP RIGHT FAB
  ========================== -->
  <div class="fab-container top-right">

    <div class="fab-options" id="fabOptions3">
      <button><i class="fa-solid fa-camera"></i></button>
      <button><i class="fa-solid fa-image"></i></button>
      <button><i class="fa-solid fa-video"></i></button>
    </div>

    <button class="fab purple" id="fab3">
      <i class="fa-solid fa-camera-retro"></i>
    </button>

  </div>


  <!-- NOTIFICATION FAB -->
<div class="fab-container top-left">

  <div class="fab-options" id="fabOptions5">
    <button><i class="fa-solid fa-bell"></i></button>
    <button><i class="fa-solid fa-envelope"></i></button>
    <button><i class="fa-solid fa-calendar"></i></button>
  </div>

  <button class="fab red" id="fab5">
    <i class="fa-solid fa-bell"></i>
    <span class="badge">3</span>
  </button>

</div>

<!-- WHATSAPP FAB -->
<div class="fab-container center-left">

  <div class="fab-options horizontal" id="fabOptions6">
    <button><i class="fa-solid fa-phone"></i></button>
    <button><i class="fa-solid fa-video"></i></button>
    <button><i class="fa-solid fa-message"></i></button>
  </div>

  <button class="fab green" id="fab6">
    <i class="fa-brands fa-whatsapp"></i>
  </button>

</div>

<!-- THEME FAB -->
<div class="fab-container center-bottom">

  <div class="fab-options" id="fabOptions7">
    <button><i class="fa-solid fa-sun"></i></button>
    <button><i class="fa-solid fa-moon"></i></button>
    <button><i class="fa-solid fa-desktop"></i></button>
  </div>

  <button class="fab dark" id="fab7">
    <i class="fa-solid fa-palette"></i>
  </button>

</div>

<!-- MUSIC FAB -->
<div class="fab-container top-center">

  <div class="fab-options horizontal" id="fabOptions8">
    <button><i class="fa-solid fa-backward"></i></button>
    <button><i class="fa-solid fa-play"></i></button>
    <button><i class="fa-solid fa-forward"></i></button>
  </div>

  <button class="fab cyan" id="fab8">
    <i class="fa-solid fa-music"></i>
  </button>

</div>


<!-- AI ASSISTANT FAB -->
<div class="fab-container bottom-center">

  <div class="fab-options" id="fabOptions9">
    <button><i class="fa-solid fa-brain"></i></button>
    <button><i class="fa-solid fa-language"></i></button>
    <button><i class="fa-solid fa-code"></i></button>
    <button><i class="fa-solid fa-wand-magic-sparkles"></i></button>
  </div>

  <button class="fab gradient" id="fab9">
    <i class="fa-solid fa-robot"></i>
  </button>

</div>

  <!-- =========================
       SPEED DIAL FAB
  ========================== -->
  <div class="fab-container center-right">

    <div class="fab-options speed-dial" id="fabOptions4">
      <button>
        <i class="fa-solid fa-pen"></i>
        <span>Edit</span>
      </button>

      <button>
        <i class="fa-solid fa-trash"></i>
        <span>Delete</span>
      </button>

      <button>
        <i class="fa-solid fa-download"></i>
        <span>Download</span>
      </button>
    </div>

    <button class="fab orange" id="fab4">
      <i class="fa-solid fa-bolt"></i>
    </button>

  </div>

  <script src="action.js"></script>

<script src="action.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
