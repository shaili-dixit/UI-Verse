<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoCode Editor</title>

  <!-- CSP -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none';
    connect-src 'self' https:;
    img-src 'self' data: https:;
    font-src 'self' data: https:;
    script-src 'self' https:;
    style-src 'self' https: 'unsafe-inline';">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="code.css">
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="editor-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="logo">
        <div class="logo-icon">
          <i class="fa-solid fa-code"></i>
        </div>
        <div>
          <h1>NeoCode</h1>
          <div class="workspace">Workspace Studio</div>
        </div>
      </div>

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search files..." / data-a11y-remediation="label-needed">
      </div>

      <div class="section-title">
        <h2>Explorer</h2>
        <button class="add-btn" data-a11y-remediation="button-label-needed">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>

      <ul class="file-list">
        <li class="active-file"><i class="fa-brands fa-html5"></i> index.html</li>
        <li><i class="fa-brands fa-css3-alt"></i> style.css</li>
        <li><i class="fa-brands fa-js"></i> script.js</li>
        <li><i class="fa-solid fa-image"></i> assets</li>
      </ul>

      <div class="bottom-card">
        <h3>AI Workspace</h3>
        <p>Generate code snippets, improve UI layouts, and build faster.</p>
        <button class="upgrade-btn">Upgrade Workspace</button>
      </div>

    </aside>

    <!-- MAIN EDITOR -->
    <main class="editor-section">

      <!-- TOPBAR -->
      <div class="topbar">

        <div class="tabs">
          <div class="tab active"><i class="fa-brands fa-html5"></i> index.html</div>
          <div class="tab"><i class="fa-brands fa-css3-alt"></i> style.css</div>
          <div class="tab"><i class="fa-brands fa-js"></i> script.js</div>
        </div>

        <div class="editor-actions">
          <button class="action-btn"><i class="fa-solid fa-gear"></i></button>
          <button class="action-btn"><i class="fa-solid fa-share-nodes"></i></button>
          <button class="run-btn" id="runBtn">
            <i class="fa-solid fa-play"></i> Run Project
          </button>
        </div>

      </div>

      <!-- STATUS BAR -->
      <div class="editor-info">
        <div class="status">
          <div class="dot"></div>
          Live Server Running
        </div>
        <div>HTML • UTF-8 • Ln 12, Col 5</div>
      </div>

      <!-- CODE AREA -->
      <div class="code-wrapper">
        <textarea id="codeArea">
<!DOCTYPE html>
<html>
<head>
  <title>NeoCode Editor</title>
</head>
<body>
  <h1>Hello World 🚀</h1>
  <p>Modern code editor UI.</p>
      <script src="../dist/shared.js"></script>
</body>
</html>
        </textarea>

        <div class="floating">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
        </div>
      </div>

    </main>

  </div>

  <script src="code.js"></script>
</body>

</html>
