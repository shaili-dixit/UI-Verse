<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Inventory Dashboard</title>
  <link rel="stylesheet" href="inventory.css">
</head>
<body>

  <div class="inventory-dashboard">

    <header class="top-bar">

      <h1>Smart Inventory Dashboard</h1>

      <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
      >

    </header>

    <div class="stats-section">

      <div class="stat-card">
        <h3>Total Products</h3>
        <h2>245</h2>
      </div>

      <div class="stat-card">
        <h3>Low Stock</h3>
        <h2 class="warning">12</h2>
      </div>

      <div class="stat-card">
        <h3>Categories</h3>
        <h2>18</h2>
      </div>

    </div>

    <div class="products-grid" id="productsGrid">

      <div class="product-card">

        <h2>Laptop</h2>

        <p>Category: Electronics</p>

        <div class="stock">
          Stock: 25
        </div>

        <button class="manage-btn">
          Manage
        </button>

      </div>

      <div class="product-card low-stock">

        <h2>Wireless Mouse</h2>

        <p>Category: Accessories</p>

        <div class="stock warning-text">
          Stock: 3
        </div>

        <button class="manage-btn">
          Manage
        </button>

      </div>

      <div class="product-card">

        <h2>Keyboard</h2>

        <p>Category: Accessories</p>

        <div class="stock">
          Stock: 15
        </div>

        <button class="manage-btn">
          Manage
        </button>

      </div>

    </div>

  </div>

  <script src="inventory.js"></script>
</body>
</html>
