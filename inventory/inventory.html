<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Inventory Dashboard</title>
  <link rel="stylesheet" href="inventory.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="inventory-dashboard">

    <header class="top-bar">

      <h1>Smart Inventory Dashboard</h1>

      <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
       data-a11y-remediation="label-needed">

    </header>

    <div class="stats-section">

      <div class="stat-card">
        <h3>Total Products</h3>
        <h2>245</h2>
      </div>

      <div class="stat-card">
        <h3>Low Stock</h3>
        <h2 class="warning">12</h2>
      </div>

      <div class="stat-card">
        <h3>Categories</h3>
        <h2>18</h2>
      </div>

    </div>

    <div class="products-grid" id="productsGrid">

      <div class="product-card">

        <h2>Laptop</h2>

        <p>Category: Electronics</p>

        <div class="stock">
          Stock: 25
        </div>

        <button class="manage-btn">
          Manage
        </button>

      </div>

      <div class="product-card low-stock">

        <h2>Wireless Mouse</h2>

        <p>Category: Accessories</p>

        <div class="stock warning-text">
          Stock: 3
        </div>

        <button class="manage-btn">
          Manage
        </button>

      </div>

      <div class="product-card">

        <h2>Keyboard</h2>

        <p>Category: Accessories</p>

        <div class="stock">
          Stock: 15
        </div>

        <button class="manage-btn">
          Manage
        </button>

      </div>

    </div>

  </div>

  <script src="inventory.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
