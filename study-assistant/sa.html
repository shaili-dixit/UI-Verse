<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study Assistant UI</title>
  <link rel="stylesheet" href="sa.css">
</head>
<body>

  <div class="assistant-dashboard">

    <aside class="sidebar">

      <h2>StudyAI</h2>

      <ul>
        <li class="active">Dashboard</li>
        <li>Tasks</li>
        <li>Notes</li>
        <li>Reminders</li>
        <li>Settings</li>
      </ul>

    </aside>

    <main class="main-content">

      <div class="top-section">

        <div class="recommendation-card">

          <h2>Study Recommendation</h2>

          <p>
            Focus on JavaScript DOM concepts for 2 hours today.
          </p>

        </div>

        <div class="task-card">

          <h2>Today's Tasks</h2>

          <ul>
            <li>Complete HTML practice</li>
            <li>Revise CSS Grid</li>
            <li>Solve JavaScript problems</li>
          </ul>

        </div>

      </div>

      <div class="chat-section">

        <h2>AI Study Chat</h2>

        <div class="messages" id="messages">

          <div class="message ai">
            AI: What topic do you want to study today?
          </div>

        </div>

        <div class="chat-input">

          <input
            type="text"
            id="userInput"
            placeholder="Ask your study question..."
          >

          <button id="sendBtn">
            Send
          </button>

        </div>

      </div>

    </main>

  </div>

  <script src="sa.js"></script>
</body>
</html>
