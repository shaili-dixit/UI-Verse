<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background-glow"></div>

  <main class="weather-container">

    <!-- Current Weather -->
    <section class="card current-weather">

      <h1>🌆 Neo Tokyo Weather</h1>

      <div class="weather-icon">
        ☀
      </div>

      <h2 id="temperature">28°C</h2>

      <p>Clear Sky</p>

    </section>

    <!-- Weather Details -->
    <section class="card details">

      <h2>Weather Details</h2>

      <div class="detail-grid">

        <div class="detail-box">
          <h3>Humidity</h3>
          <p>68%</p>
        </div>

        <div class="detail-box">
          <h3>Wind</h3>
          <p>12 km/h</p>
        </div>

        <div class="detail-box">
          <h3>Pressure</h3>
          <p>1012 hPa</p>
        </div>

      </div>

    </section>

    <!-- Hourly Forecast -->
    <section class="card forecast">

      <h2>Hourly Forecast</h2>

      <div class="forecast-list">

        <div class="forecast-item">
          <p>1 PM</p>
          <span>☀</span>
          <p>29°C</p>
        </div>

        <div class="forecast-item">
          <p>3 PM</p>
          <span>⛅</span>
          <p>27°C</p>
        </div>

        <div class="forecast-item">
          <p>6 PM</p>
          <span>🌧</span>
          <p>24°C</p>
        </div>

        <div class="forecast-item">
          <p>9 PM</p>
          <span>🌙</span>
          <p>22°C</p>
        </div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
