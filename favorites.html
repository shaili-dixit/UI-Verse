<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites | UIverse</title>
  <meta name="description" content="Saved UIverse favorite components from your personal collection.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="shared-sidebar.css">
  <style>
    :root {
      --bg: #0e1015;
      --panel: #181c25;
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #f4f4f4;
      --muted: #b8beca;
      --accent: #eb6835;
      --accent-2: #5ab0ff;
      --card: #151924;
      --card-border: rgba(255, 255, 255, 0.18);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(880px 420px at 10% -8%, rgba(90, 176, 255, 0.2), transparent 62%),
        radial-gradient(760px 400px at 95% -14%, rgba(235, 104, 53, 0.18), transparent 58%),
        var(--bg);
      min-height: 100vh;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(10, 11, 15, 0.75);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .menu-toggle {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      width: 40px;
      height: 40px;
      cursor: pointer;
    }

    .main {
      margin-left: 280px;
      padding: 24px;
      transition: margin-left 0.25s ease;
    }

    body.sidebar-hidden .main {
      margin-left: 0;
    }

    .hero {
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      background: linear-gradient(140deg, rgba(235, 104, 53, 0.14), rgba(90, 176, 255, 0.12));
      padding: 20px;
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0;
      font-family: "Syne", sans-serif;
      font-size: clamp(1.5rem, 3vw, 2.1rem);
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .hero-meta {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 6px 12px;
      font-size: 0.85rem;
      color: #dde5f4;
      background: rgba(14, 16, 21, 0.5);
    }

    .favorites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }

    .favorites-actions {
      display: flex;
      justify-content: flex-end;
      margin: 10px 0 16px;
    }

    .clear-btn {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .main {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-text">UIverse</span>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a></li>
        <li><a href="components/index.html"><i class="fa-solid fa-table-cells-large"></i><span>Components Index</span></a></li>
        <li class="active"><a href="favorites.html"><i class="fa-solid fa-star"></i><span>Favorites</span></a></li>
        <li><a href="button.html"><i class="fa-solid fa-hand-pointer"></i><span>Buttons</span></a></li>
        <li><a href="cards.html"><i class="fa-solid fa-id-card"></i><span>Cards</span></a></li>
        <li><a href="forms.html"><i class="fa-solid fa-rectangle-list"></i><span>Forms</span></a></li>
      </ul>
    </nav>
  </aside>

  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

  <header class="navbar" id="navbar">
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
      <i class="fa-solid fa-bars"></i>
    </button>
    <strong>My Favorites</strong>
  </header>

  <main class="main">
    <section class="hero">
      <h1>Favorites Collection</h1>
      <p>Components you bookmarked appear here. Saved locally in your browser under localStorage.uiVerseFavorites.</p>
      <div class="hero-meta" id="favoritesMeta">0 saved</div>
    </section>

    <div class="favorites-actions">
      <button type="button" class="clear-btn" id="clearFavoritesBtn">
        <i class="fa-solid fa-trash"></i>
        Clear Favorites
      </button>
    </div>

    <section class="favorites-grid" id="favoritesList" aria-live="polite"></section>
  </main>

  <script src="script.js"></script>
  <script src="js/features/favorites.js"></script>
  <script>
    (function initFavoritesPage() {
      if (window.Favorites && typeof window.Favorites.init === 'function') {
        window.Favorites.init();
      }

      const meta = document.getElementById('favoritesMeta');
      const clearButton = document.getElementById('clearFavoritesBtn');

      const readFavorites = () => {
        try {
          const raw = localStorage.getItem('uiVerseFavorites');
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      };

      const syncMeta = () => {
        const count = readFavorites().length;
        meta.textContent = count + ' saved';
      };

      clearButton.addEventListener('click', () => {
        localStorage.setItem('uiVerseFavorites', '[]');
        document.dispatchEvent(new CustomEvent('uiverse:favorites:changed', { detail: { count: 0 } }));
        if (window.Favorites && typeof window.Favorites.init === 'function') {
          window.Favorites.init();
        }
        location.reload();
      });

      document.addEventListener('uiverse:favorites:changed', syncMeta);
      syncMeta();
    })();
  </script>
</body>
</html>
