<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker UI</title>
  <link rel="stylesheet" href="expense.css">
</head>
<body>

  <div class="dashboard">

    <div class="top-section">

      <div class="card balance-card">
        <h3>Total Balance</h3>
        <h1 id="balance">₹45,000</h1>
      </div>

      <div class="card income-card">
        <h3>Income</h3>
        <h2>₹60,000</h2>
      </div>

      <div class="card expense-card">
        <h3>Expenses</h3>
        <h2>₹15,000</h2>
      </div>

    </div>

    <div class="bottom-section">

      <div class="transactions">

        <h2>Recent Transactions</h2>

        <div class="transaction">
          <span>Groceries</span>
          <p>- ₹2,000</p>
        </div>

        <div class="transaction">
          <span>Freelance Payment</span>
          <p class="income">+ ₹12,000</p>
        </div>

        <div class="transaction">
          <span>Electricity Bill</span>
          <p>- ₹1,500</p>
        </div>

        <div class="transaction">
          <span>Movie Tickets</span>
          <p>- ₹800</p>
        </div>

      </div>

      <div class="add-expense">

        <h2>Add Expense</h2>

        <input type="text" id="expenseName" placeholder="Expense Name">

        <input type="number" id="expenseAmount" placeholder="Amount">

        <button id="addBtn">
          Add Transaction
        </button>

      </div>

    </div>

  </div>

  <script src="expense.js"></script>
</body>
</html>
