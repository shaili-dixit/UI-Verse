<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessibility Score Dashboard — UIverse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    
    /* Header */
    .header { margin-bottom: 32px; }
    .header h1 { font-size: 28px; color: #fff; margin-bottom: 8px; }
    .header p { color: #888; font-size: 14px; }
    
    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #fff;
    }
    .stat-card .label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card.pass .value { color: #22c55e; }
    .stat-card.warn .value { color: #eab308; }
    .stat-card.fail .value { color: #ef4444; }
    
    /* Category bars */
    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 18px;
      color: #fff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      padding: 12px 16px;
      background: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
    }
    .cat-name { width: 140px; font-size: 13px; color: #aaa; flex-shrink: 0; }
    .cat-track { flex: 1; height: 8px; background: #2a2a4a; border-radius: 4px; overflow: hidden; }
    .cat-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .cat-fill.pass { background: #22c55e; }
    .cat-fill.warn { background: #eab308; }
    .cat-fill.fail { background: #ef4444; }
    .cat-score { width: 50px; text-align: right; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .cat-count { width: 80px; text-align: right; font-size: 12px; color: #666; flex-shrink: 0; }
    
    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #aaa;
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: #6c5ce7;
      color: #fff;
      border-color: #6c5ce7;
    }
    .search-input {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #fff;
      font-size: 13px;
      outline: none;
      width: 240px;
    }
    .search-input:focus { border-color: #6c5ce7; }
    
    /* Table */
    .table-wrap {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      background: #252545;
      color: #888;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: #fff; }
    td {
      padding: 12px 16px;
      border-top: 1px solid #2a2a4a;
      vertical-align: top;
    }
    tr:hover td { background: #252545; }
    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .score-badge.pass { background: rgba(34,197,94,0.15); color: #22c55e; }
    .score-badge.warn { background: rgba(234,179,8,0.15); color: #eab308; }
    .score-badge.fail { background: rgba(239,68,68,0.15); color: #ef4444; }
    .score-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
    .score-badge.pass .dot { background: #22c55e; }
    .score-badge.warn .dot { background: #eab308; }
    .score-badge.fail .dot { background: #ef4444; }
    
    .violations-preview {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .violations-preview .v-item {
      display: inline-block;
      padding: 2px 6px;
      background: #2a2a4a;
      border-radius: 4px;
      margin-right: 4px;
      margin-bottom: 2px;
    }
    .violations-preview .v-item.error { color: #ff7675; }
    .violations-preview .v-item.warning { color: #fdcb6e; }
    
    /* Detail panel */
    .detail-panel {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 420px;
      height: 100vh;
      background: #1a1a2e;
      border-left: 1px solid #2a2a4a;
      z-index: 100;
      overflow-y: auto;
      padding: 24px;
    }
    .detail-panel.open { display: block; }
    .detail-panel .close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 24px;
      cursor: pointer;
    }
    .detail-panel h2 { font-size: 18px; margin-bottom: 8px; color: #fff; }
    .detail-panel .meta { color: #888; font-size: 12px; margin-bottom: 20px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .violation-card {
      background: #252545;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      border-left: 3px solid;
    }
    .violation-card.error { border-left-color: #ef4444; }
    .violation-card.warning { border-left-color: #eab308; }
    .violation-card .v-rule { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .violation-card .v-msg { font-size: 11px; color: #aaa; margin-bottom: 6px; }
    .violation-card .v-selector { font-size: 11px; color: #6c5ce7; font-family: monospace; margin-bottom: 6px; }
    .violation-card .v-fix {
      font-size: 11px;
      color: #888;
      background: #1a1a2e;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #2a2a4a;
    }
    .violation-card .v-criterion {
      font-size: 10px;
      color: #666;
      margin-top: 6px;
    }
    
    /* Export */
    .export-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #252545;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: #2a2a4a; color: #fff; }
    .btn-primary {
      background: #6c5ce7;
      color: #fff;
      border-color: #6c5ce7;
    }
    .btn-primary:hover { background: #5b4cc4; }
    
    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .overlay.visible { display: block; }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2a4a;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Responsive */
    @media (max-width: 768px) {
      .detail-panel { width: 100%; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>♿ Accessibility Score Dashboard</h1>
      <p>WCAG 2.1 Level AA compliance audit results per component</p>
    </div>

    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p>Loading audit report...</p>
    </div>

    <div id="content" style="display:none">
      <div class="stats-row" id="statsRow"></div>

      <div class="section">
        <h2 class="section-title">📊 Category Scores</h2>
        <div id="categoryBars"></div>
      </div>

      <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h2 class="section-title">📋 Component Audit Results</h2>
          <div class="export-bar">
            <button class="btn btn-primary" onclick="exportJSON()">⬇ Export JSON</button>
            <button class="btn" onclick="exportCSV()">⬇ Export CSV</button>
          </div>
        </div>
        <div class="filters">
          <span class="filter-chip active" data-filter="all">All</span>
          <span class="filter-chip" data-filter="pass">Pass</span>
          <span class="filter-chip" data-filter="warning">Warning</span>
          <span class="filter-chip" data-filter="fail">Fail</span>
          <span class="filter-chip" data-filter="badge">🏅 Badge Eligible</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Search component...">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th onclick="sortBy('title')">Component ↕</th>
                <th onclick="sortBy('category')">Category ↕</th>
                <th onclick="sortBy('score')">Score ↕</th>
                <th onclick="sortBy('status')">Status ↕</th>
                <th onclick="sortBy('errors')">Errors ↕</th>
                <th onclick="sortBy('warnings')">Warnings ↕</th>
                <th>Violations</th>
              </tr>
            </thead>
            <tbody id="resultsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detailPanel">
    <button class="close" onclick="closeDetail()">×</button>
    <div id="detailContent"></div>
  </div>

  <script>
    let reportData = null;
    let sortField = 'score';
    let sortAsc = true;
    let activeFilter = 'all';
    let searchQuery = '';

    async function loadReport() {
      try {
        const res = await fetch('./reports/a11y/aggregated-report.json');
        if (!res.ok) throw new Error('aggregated-report.json not found');
        reportData = await res.json();
        render();
      } catch (e) {
        document.getElementById('loading').innerHTML = `<p style="color:#ef4444">Error: ${e.message}<br>Run: npm run a11y:audit && npm run a11y:report</p>`;
      }
    }

    function render() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      renderStats();
      renderCategories();
      renderTable();
      setupFilters();
    }

    function renderStats() {
      const s = reportData.summary;
      const el = document.getElementById('statsRow');
      el.innerHTML = `
        <div class="stat-card"><div class="value">${s.totalFiles}</div><div class="label">Components</div></div>
        <div class="stat-card"><div class="value">${s.averageScore}%</div><div class="label">Avg Score</div></div>
        <div class="stat-card pass"><div class="value">${s.passCount}</div><div class="label">Pass</div></div>
        <div class="stat-card warn"><div class="value">${s.warningCount}</div><div class="label">Warning</div></div>
        <div class="stat-card fail"><div class="value">${s.failCount}</div><div class="label">Fail</div></div>
        <div class="stat-card pass"><div class="value">${reportData.badgeEligibleCount}</div><div class="label">Badge Eligible</div></div>
      `;
    }

    function renderCategories() {
      const el = document.getElementById('categoryBars');
      el.innerHTML = reportData.categorySummary.map(cat => {
        const statusClass = cat.averageScore >= 85 ? 'pass' : cat.averageScore >= 50 ? 'warn' : 'fail';
        return `
          <div class="cat-bar">
            <div class="cat-name">${cat.name}</div>
            <div class="cat-track"><div class="cat-fill ${statusClass}" style="width:${cat.averageScore}%"></div></div>
            <div class="cat-score">${cat.averageScore}%</div>
            <div class="cat-count">${cat.componentCount} comps</div>
          </div>
        `;
      }).join('');
    }

    function getFilteredResults() {
      let results = [...reportData.allResults];
      if (activeFilter !== 'all') {
        if (activeFilter === 'badge') {
          const badgeFiles = new Set(reportData.badgeEligible.map(b => b.file));
          results = results.filter(r => badgeFiles.has(r.file));
        } else {
          results = results.filter(r => r.status === activeFilter);
        }
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        results = results.filter(r => r.title.toLowerCase().includes(q) || r.file.toLowerCase().includes(q));
      }
      results.sort((a, b) => {
        let av = a[sortField], bv = b[sortField];
        if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
        return sortAsc ? (av > bv ? 1 : -1) : (av > bv ? -1 : 1);
      });
      return results;
    }

    function renderTable() {
      const results = getFilteredResults();
      const tbody = document.getElementById('resultsTable');
      tbody.innerHTML = results.map(r => {
        const statusClass = r.status;
        const violationsPreview = r.violations.slice(0, 3).map(v =>
          `<span class="v-item ${v.severity}">${v.rule}</span>`
        ).join('');
        const moreCount = r.violations.length > 3 ? ` +${r.violations.length - 3} more` : '';
        return `
          <tr onclick="showDetail('${r.file}')" style="cursor:pointer">
            <td><strong>${r.title}</strong><br><span style="color:#666;font-size:11px">${r.file}</span></td>
            <td>${r.category}</td>
            <td><span class="score-badge ${statusClass}"><span class="dot"></span> ${r.score}%</span></td>
            <td>${r.status}</td>
            <td>${r.errors}</td>
            <td>${r.warnings}</td>
            <td>
              <div class="violations-preview">${violationsPreview}${moreCount}</div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function showDetail(file) {
      const r = reportData.allResults.find(x => x.file === file);
      if (!r) return;
      
      const violationsHtml = r.violations.map(v => `
        <div class="violation-card ${v.severity}">
          <div class="v-rule">${v.rule}</div>
          <div class="v-msg">${v.message}</div>
          <div class="v-selector">${v.selector}</div>
          <div class="v-fix">${v.fix}</div>
          <div class="v-criterion">WCAG ${v.criterion} · Level ${v.level}</div>
        </div>
      `).join('') || '<p style="color:#666;font-size:12px">No violations</p>';

      const warningsHtml = r.warnings.map(w => `
        <div class="violation-card warning">
          <div class="v-rule">${w.rule}</div>
          <div class="v-msg">${w.message}</div>
          <div class="v-selector">${w.selector}</div>
          <div class="v-fix">${w.fix}</div>
          <div class="v-criterion">WCAG ${w.criterion} · Level ${w.level}</div>
        </div>
      `).join('') || '';

      document.getElementById('detailContent').innerHTML = `
        <h2>${r.title}</h2>
        <div class="meta">${r.file} · ${r.category} · Score: ${r.score}%</div>
        
        <div class="detail-section">
          <h3>Score Breakdown</h3>
          <div class="score-badge ${r.status}" style="margin-bottom:10px"><span class="dot"></span> ${r.score}% — ${r.status}</div>
          <p style="font-size:12px;color:#888">Passed: ${r.totalChecks - r.errors - r.warnings} · Errors: ${r.errors} · Warnings: ${r.warnings}</p>
        </div>

        <div class="detail-section">
          <h3>Violations (${r.violations.length})</h3>
          ${violationsHtml}
        </div>

        ${warningsHtml ? `
        <div class="detail-section">
          <h3>Warnings (${r.warnings.length})</h3>
          ${warningsHtml}
        </div>` : ''}
      `;
      
      document.getElementById('detailPanel').classList.add('open');
      document.getElementById('overlay').classList.add('visible');
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('overlay').classList.remove('visible');
    }

    function setupFilters() {
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeFilter = chip.dataset.filter;
          renderTable();
        });
      });
      document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderTable();
      });
    }

    function sortBy(field) {
      if (sortField === field) sortAsc = !sortAsc;
      else { sortField = field; sortAsc = true; }
      renderTable();
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(reportData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `uiverse-a11y-report-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportCSV() {
      const headers = ['Component', 'File', 'Category', 'Score', 'Status', 'Errors', 'Warnings'];
      const rows = reportData.allResults.map(r => [
        r.title, r.file, r.category, r.score, r.status, r.errors, r.warnings
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `uiverse-a11y-report-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    loadReport();
  </script>
</body>
</html>
