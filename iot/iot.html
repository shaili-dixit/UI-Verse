<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internet Speed Test UI</title>
  <link rel="stylesheet" href="iot.css">
</head>
<body>

  <div class="speed-container">

    <div class="speed-card">

      <h1>Internet Speed Test</h1>

      <div class="speed-meter">

        <div class="circle">
          <span id="speedValue">0</span>
          <small>Mbps</small>
        </div>

      </div>

      <button id="startBtn">
        Start Test
      </button>

      <div class="stats">

        <div class="stat-box">
          <h3>Download</h3>
          <p id="download">0 Mbps</p>
        </div>

        <div class="stat-box">
          <h3>Upload</h3>
          <p id="upload">0 Mbps</p>
        </div>

        <div class="stat-box">
          <h3>Ping</h3>
          <p id="ping">0 ms</p>
        </div>

      </div>

    </div>

  </div>

  <script src="iot.js"></script>
</body>
</html>
