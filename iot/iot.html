<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internet Speed Test Pro UI</title>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <main class="app">

    <section class="card">

      <header class="header">
        <h1>⚡ Internet Speed Test</h1>
        <p>Check your download, upload & ping instantly</p>
      </header>

      <section class="meter-section">

        <div class="meter">
          <div class="meter-circle">
            <div class="meter-value">
              <span id="speedValue">0</span>
              <small>Mbps</small>
            </div>
          </div>
        </div>

      </section>

      <section class="actions">
        <button id="startBtn">Start Test</button>
      </section>

      <section class="results">

        <div class="result-card">
          <h3>Download</h3>
          <p id="download">0 Mbps</p>
        </div>

        <div class="result-card">
          <h3>Upload</h3>
          <p id="upload">0 Mbps</p>
        </div>

        <div class="result-card">
          <h3>Ping</h3>
          <p id="ping">0 ms</p>
        </div>

      </section>

      <footer class="footer">
        <p>Real-time network performance dashboard</p>
      </footer>

    </section>

  </main>

      <script src="../dist/shared.js"></script>
</body>
</html>
