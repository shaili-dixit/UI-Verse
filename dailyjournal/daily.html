<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GlowJournal — Daily Journal</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- BACKGROUND LAYERS -->
  <div class="bg-gradient"></div>
  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>

  <main class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar glass">

      <div class="brand">
        <div class="icon">
          <i class="fa-solid fa-feather"></i>
        </div>
        <div>
          <h2>GlowJournal</h2>
          <small>Daily Reflection Space</small>
        </div>
      </div>

      <div class="stats">

        <div class="stat-card">
          <span>Total Entries</span>
          <h1 id="totalEntries">0</h1>
        </div>

        <div class="stat-card">
          <span>Current Mood</span>
          <h3 id="selectedMoodText">😊 Happy</h3>
        </div>

        <div class="stat-card quote">
          <span>Today's Quote</span>
          <p id="quoteText">“Every day is a fresh beginning.”</p>
        </div>

      </div>

    </aside>

    <!-- MAIN -->
    <section class="main">

      <!-- HEADER -->
      <header class="top glass">

        <div>
          <h1>Daily Journal ✨</h1>
          <p>Capture thoughts, moods & memories in a beautiful space.</p>
        </div>

        <div class="date-pill" id="currentDate"></div>

      </header>

      <!-- MOOD SELECTOR -->
      <section class="mood glass">

        <h3>How are you feeling today?</h3>

        <div class="mood-grid">

          <button class="mood-btn active">😊</button>
          <button class="mood-btn">😌</button>
          <button class="mood-btn">😔</button>
          <button class="mood-btn">😴</button>
          <button class="mood-btn">😎</button>
          <button class="mood-btn">🤩</button>
          <button class="mood-btn">😡</button>
          <button class="mood-btn">🥳</button>

        </div>

      </section>

      <!-- EDITOR -->
      <section class="editor glass">

        <textarea
          id="journalInput"
          placeholder="Write your thoughts freely... ✍️"
        ></textarea>

        <div class="editor-footer">

          <div class="meta">
            <i class="fa-solid fa-keyboard"></i>
            <span>Characters:</span>
            <strong id="charCount">0</strong>
          </div>

          <div class="actions">

            <button id="clearBtn" class="btn secondary">
              Clear
            </button>

            <button id="saveBtn" class="btn primary">
              <i class="fa-solid fa-book-open"></i>
              Save Entry
            </button>

          </div>

        </div>

      </section>

      <!-- SEARCH -->
      <section class="search glass">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          id="searchInput"
          placeholder="Search entries..."
        />

      </section>

      <!-- ENTRIES -->
      <section class="entries glass">

        <div class="entries-header">

          <h2>Saved Entries</h2>

          <button id="deleteAllBtn" class="danger">
            Delete All
          </button>

        </div>

        <div id="entriesList"></div>

      </section>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
