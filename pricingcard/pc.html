<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Card Toggle</title>
  <link rel="stylesheet" href="pc.css">
</head>
<body>

<div class="container">

  <h1>Pricing Plans</h1>

  <div class="toggle-container">
    <span>Monthly</span>

    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>

    <span>Yearly</span>
  </div>

  <div class="cards">

    <div class="card">
      <h2>Basic</h2>
      <h3 id="basic-price">$10/mo</h3>

      <ul>
        <li>1 Project</li>
        <li>Email Support</li>
        <li>Basic Features</li>
      </ul>

      <button>Choose Plan</button>
    </div>

    <div class="card featured">
      <h2>Pro</h2>
      <h3 id="pro-price">$20/mo</h3>

      <ul>
        <li>10 Projects</li>
        <li>Priority Support</li>
        <li>Advanced Features</li>
      </ul>

      <button>Choose Plan</button>
    </div>

    <div class="card">
      <h2>Enterprise</h2>
      <h3 id="enterprise-price">$40/mo</h3>

      <ul>
        <li>Unlimited Projects</li>
        <li>24/7 Support</li>
        <li>All Features</li>
      </ul>

      <button>Choose Plan</button>
    </div>

  </div>

</div>

<script src="pc.js"></script>
</body>
</html>
