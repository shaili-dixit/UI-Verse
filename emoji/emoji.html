<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reaction Emoji Picker</title>

  <link rel="stylesheet" href="emoji.css" />
</head>

<body>

  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>

  <div class="container">

    <div class="top-badge">
      ✨ Interactive Reaction Picker
    </div>

    <h1>Reaction Emoji Picker</h1>

    <p class="subtitle">
      Choose your mood and react instantly with animated emojis.
    </p>

    <div class="emoji-box">

      <button class="emoji active">
        <span>😀</span>
      </button>

      <button class="emoji">
        <span>😍</span>
      </button>

      <button class="emoji">
        <span>😂</span>
      </button>

      <button class="emoji">
        <span>😎</span>
      </button>

      <button class="emoji">
        <span>🔥</span>
      </button>

      <button class="emoji">
        <span>👍</span>
      </button>

      <button class="emoji">
        <span>🎉</span>
      </button>

      <button class="emoji">
        <span>🤯</span>
      </button>

    </div>

    <div class="preview-card">

      <div class="preview-label">
        Selected Reaction
      </div>

      <div class="emoji-preview" id="selectedEmoji">
        😀
      </div>

      <div class="reaction-text" id="reactionText">
        Happy Mood
      </div>

    </div>

  </div>

  <script src="emoji.js"></script>

</body>
</html>
