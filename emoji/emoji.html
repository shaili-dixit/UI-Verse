<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Emoji Picker</title>
  <link rel="stylesheet" href="emoji.css">
</head>
<body>

<div class="container">

  <h1>Reaction Emoji Picker</h1>

  <div class="emoji-box">
    <button class="emoji">😀</button>
    <button class="emoji">😍</button>
    <button class="emoji">😂</button>
    <button class="emoji">😎</button>
    <button class="emoji">🔥</button>
    <button class="emoji">👍</button>
  </div>

  <div class="preview">
    Selected Reaction:
    <span id="selectedEmoji">😀</span>
  </div>

</div>

<script src="emoji.js"></script>
</body>
</html>
