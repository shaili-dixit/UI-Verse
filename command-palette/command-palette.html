<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>Command Palette UI</title>

  <!-- Fonts -->

  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <!-- Icons -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- CSS -->

  <link rel="stylesheet"
    href="command-palette.css" />

</head>

<body>

  <!-- ================= HERO ================= -->

  <section class="hero">

    <div class="hero-content">

      <span class="hero-badge">
        ⌘ Smart Navigation System
      </span>

      <h1>
        Command Palette <br>
        Interface ⚡
      </h1>

      <p>
        Open the command palette using
        keyboard shortcuts and quickly
        navigate actions, pages and tools.
      </p>

      <button id="openPaletteBtn">

        Open Palette

        <span>
          ⌘K
        </span>

      </button>

    </div>

  </section>

  <!-- ================= COMMAND PALETTE ================= -->

  <div class="palette-overlay"
    id="paletteOverlay">

    <div class="command-palette">

      <!-- SEARCH -->

      <div class="palette-search">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          id="commandInput"
          placeholder="Search commands..." />

        <kbd>
          ESC
        </kbd>

      </div>

      <!-- COMMAND LIST -->

      <div class="command-list"
        id="commandList">

        <!-- GROUP -->

        <div class="command-group">

          <h4>
            Navigation
          </h4>

          <button class="command-item">

            <div class="command-left">

              <i class="fa-solid fa-house"></i>

              <span>
                Go to Dashboard
              </span>

            </div>

            <kbd>
              G D
            </kbd>

          </button>

          <button class="command-item">

            <div class="command-left">

              <i class="fa-solid fa-user"></i>

              <span>
                Open Profile
              </span>

            </div>

            <kbd>
              G P
            </kbd>

          </button>

        </div>

        <!-- GROUP -->

        <div class="command-group">

          <h4>
            Actions
          </h4>

          <button class="command-item">

            <div class="command-left">

              <i class="fa-solid fa-plus"></i>

              <span>
                Create New Project
              </span>

            </div>

            <kbd>
              N
            </kbd>

          </button>

          <button class="command-item">

            <div class="command-left">

              <i class="fa-solid fa-moon"></i>

              <span>
                Toggle Dark Mode
              </span>

            </div>

            <kbd>
              D
            </kbd>

          </button>

          <button class="command-item">

            <div class="command-left">

              <i class="fa-solid fa-arrow-right-from-bracket"></i>

              <span>
                Logout Account
              </span>

            </div>

            <kbd>
              L
            </kbd>

          </button>

        </div>

        <!-- GROUP -->

        <div class="command-group">

          <h4>
            Tools
          </h4>

          <button class="command-item">

            <div class="command-left">

              <i class="fa-solid fa-chart-line"></i>

              <span>
                Open Analytics
              </span>

            </div>

            <kbd>
              A
            </kbd>

          </button>

          <button class="command-item">

            <div class="command-left">

              <i class="fa-solid fa-gear"></i>

              <span>
                Settings
              </span>

            </div>

            <kbd>
              S
            </kbd>

          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- JS -->

  <script src="command-palette.js"></script>

</body>

</html>
