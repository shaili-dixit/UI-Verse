<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self' https:;
    base-uri 'self';
    frame-ancestors 'none';
    object-src 'none';
    connect-src 'self' https:;
    img-src 'self' data: https:;
    font-src 'self' data: https:;
    script-src 'self' https: 'unsafe-hashes';
    script-src-attr 'unsafe-hashes';
    style-src 'self' https: 'unsafe-inline';
    style-src-attr 'unsafe-inline'"
  />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NeoScan — QR Scanner</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="qr.css">
</head>

<body>

  <!-- Background Effects -->
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Main Container -->
  <main class="scanner-container">

    <!-- Header -->
    <section class="hero-section">

      <div class="logo-badge">
        <span>◉</span>
      </div>

      <h1>
        NeoScan
      </h1>

      <p>
        Fast • Secure • Smart QR Detection
      </p>

    </section>

    <!-- Scanner Card -->
    <section class="scanner-card">

      <!-- Scanner Box -->
      <div class="scanner-box">

        <!-- Camera Overlay -->
        <div class="scanner-overlay"></div>

        <!-- Corners -->
        <span class="corner top-left"></span>
        <span class="corner top-right"></span>
        <span class="corner bottom-left"></span>
        <span class="corner bottom-right"></span>

        <!-- Scan Line -->
        <div class="scan-line"></div>

        <!-- Floating Dots -->
        <div class="floating-dot dot1"></div>
        <div class="floating-dot dot2"></div>
        <div class="floating-dot dot3"></div>

        <!-- Status -->
        <div class="scan-status">
          Ready to Scan
        </div>

      </div>

      <!-- Info -->
      <div class="scanner-info">

        <div class="info-card">
          <h3>⚡ Instant Scan</h3>
          <p>Detect QR codes within milliseconds.</p>
        </div>

        <div class="info-card">
          <h3>🔒 Safe & Secure</h3>
          <p>All scans stay protected and private.</p>
        </div>

        <div class="info-card">
          <h3>📱 Mobile Friendly</h3>
          <p>Fully responsive futuristic experience.</p>
        </div>

      </div>

      <!-- Buttons -->
      <div class="btn-group">

        <button id="scanBtn" class="primary-btn">
          <span>Start Scan</span>
        </button>

        <button id="uploadBtn" class="secondary-btn">
          Upload QR
        </button>

      </div>

    </section>

  </main>

  <script src="qr.js"></script>

</body>
</html>
