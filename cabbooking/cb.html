<script>
const rides = [
  { name:"Mini", price:120 },
  { name:"Sedan", price:180 },
  { name:"SUV", price:260 }
];

let selected = 0;

const rideBox = document.getElementById("rides");
const fare = document.getElementById("fare");

function renderRides(){
  rideBox.innerHTML = "";
  rides.forEach((r,i)=>{
    const div = document.createElement("div");
    div.className = "ride" + (i===selected ? " active":"");
    div.innerHTML = `<span>${r.name}</span><b>₹${r.price}</b>`;
    div.onclick = () => {
      selected = i;
      fare.textContent = r.price;
      renderRides();
    };
    rideBox.appendChild(div);
  });

  fare.textContent = rides[selected].price;
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none",2000);
}

function bookRide(){
  const p = document.getElementById("pickup").value;
  const d = document.getElementById("drop").value;

  if(!p || !d){
    showToast("Enter pickup and destination");
    return;
  }

  showToast(`Ride booked: ${rides[selected].name}`);
}

renderRides();
</script>
