<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cab Booking App</title>
  <link rel="stylesheet" href="cb.css">
</head>
<body>

<div class="container">

  <h1>Cab Booking App</h1>

  <div class="booking-form">

    <input type="text" placeholder="Pickup Location">
    <input type="text" placeholder="Destination">

    <div class="ride-options">

      <div class="ride-card active">
        <h3>Mini</h3>
        <p>₹120</p>
      </div>

      <div class="ride-card">
        <h3>Sedan</h3>
        <p>₹220</p>
      </div>

      <div class="ride-card">
        <h3>SUV</h3>
        <p>₹350</p>
      </div>

    </div>

    <div class="driver-info">
      <h3>Driver Details</h3>
      <p>Name: Rahul Sharma</p>
      <p>Vehicle: TS09 AB 1234</p>
      <p>ETA: 5 mins</p>
    </div>

    <button onclick="bookRide()">Book Ride</button>

  </div>

</div>

<script src="cb.js"></script>
</body>
</html>
