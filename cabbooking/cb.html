<div class="card">

  <div class="input-box">
    <span>📍</span>
    <input id="pickup" type="text" placeholder="Pickup location">
  </div>

  <div class="input-box">
    <span>🏁</span>
    <input id="drop" type="text" placeholder="Destination">
  </div>

  <h3 class="title">Choose Ride</h3>

  <div class="rides" id="rides"></div>

  <div class="fare-box">
    Estimated Fare: <span id="fare">₹120</span>
  </div>

  <div class="driver">
    <div class="driver-left">
      <div class="avatar">👨‍✈️</div>
    </div>

    <div class="driver-right">
      <h4>Rahul Sharma</h4>
      <p>TS09 AB 1234 • ETA <span id="eta">5</span> min</p>
    </div>
  </div>

  <button onclick="bookRide()">Confirm Ride</button>

</div>

<div id="toast"></div>
