<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Form Dashboard UI</title>
  <link rel="stylesheet" href="form.css">
</head>
<body>

  <div class="survey-container">

    <h1>Survey Form</h1>

    <div class="progress-container">

      <div class="progress-bar" id="progressBar"></div>

    </div>

    <form id="surveyForm">

      <div class="question-card">

        <label>
          Full Name
        </label>

        <input
          type="text"
          placeholder="Enter your name"
        >

      </div>

      <div class="question-card">

        <label>
          Email Address
        </label>

        <input
          type="email"
          placeholder="Enter your email"
        >

      </div>

      <div class="question-card">

        <label>
          Which technology do you use most?
        </label>

        <select>

          <option>HTML</option>
          <option>CSS</option>
          <option>JavaScript</option>
          <option>React</option>

        </select>

      </div>

      <div class="question-card">

        <label>
          Additional Feedback
        </label>

        <textarea
          rows="5"
          placeholder="Write your feedback..."
        ></textarea>

      </div>

      <button type="submit">
        Submit Survey
      </button>

    </form>

  </div>

  <script src="form.js"></script>
</body>
</html>
