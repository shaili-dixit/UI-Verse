<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Page Not Found | UI-verse</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      /* ─── Reset ─────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ─── Tokens ─────────────────────────────────────────── */
      :root {
        --accent: #eb6835;
        --accent-focus: rgba(235, 104, 53, 0.42);
        --accent-bg: rgba(235, 104, 53, 0.11);
        --bg: #f5f5f3;
        --surface: #ffffff;
        --border: #e8e8e6;
        --text-1: #1a1a1a;
        --text-2: #555555;
        --text-3: #999999;
        --deep: #561800;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-pill: 999px;
        --transition-base: 150ms ease;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111110;
          --surface: #1e1e1c;
          --border: #2e2e2b;
          --text-1: #f0ede8;
          --text-2: #a8a49e;
          --text-3: #666660;
          --deep: #f5a882;
          --accent-bg: rgba(235, 104, 53, 0.09);
        }
      }

      /* ─── Accessibility utilities ────────────────────────── */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* Skip link — visible only on keyboard focus */
      .skip-link {
        position: fixed;
        top: -100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--accent);
        color: #fff;
        padding: 8px 20px;
        border-radius: 0 0 var(--radius-sm) var(--radius-sm);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        z-index: 200;
        transition: top var(--transition-base);
      }
      .skip-link:focus {
        top: 0;
        outline: none;
      }

      /* ─── Base ───────────────────────────────────────────── */
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text-1);
        text-align: center;
        padding: 2rem;
        overflow: hidden;
        position: relative;
      }

      /* ─── Decorative backgrounds ─────────────────────────── */
      .bg-dots {
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
          circle,
          var(--accent-bg) 1px,
          transparent 1px
        );
        background-size: 28px 28px;
        pointer-events: none;
        z-index: 0;
      }

      .bg-ghost {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Syne", sans-serif;
        font-size: clamp(160px, 38vw, 320px);
        font-weight: 800;
        color: rgba(235, 104, 53, 0.045);
        letter-spacing: -16px;
        pointer-events: none;
        user-select: none;
        z-index: 0;
        white-space: nowrap;
      }
      @media (prefers-color-scheme: dark) {
        .bg-ghost {
          color: rgba(235, 104, 53, 0.07);
        }
      }

      /* ─── Floating chips ─────────────────────────────────── */
      .floater {
        position: fixed;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 13px;
        font-size: 12px;
        color: var(--text-3);
        display: flex;
        align-items: center;
        gap: 6px;
        pointer-events: none;
        animation: bob linear infinite;
        z-index: 0;
      }
      .floater i {
        font-size: 14px;
        color: var(--accent);
        opacity: 0.75;
      }

      /* Position each chip */
      .f1 { top: 12%;    left: 4%;   animation-duration: 6s;   animation-delay:  0s; }
      .f2 { top: 16%;    right: 5%;  animation-duration: 7s;   animation-delay: -2s; }
      .f3 { bottom: 18%; left: 6%;   animation-duration: 8s;   animation-delay: -1s; }
      .f4 { bottom: 14%; right: 4%;  animation-duration: 6.5s; animation-delay: -3s; }
      .f5 { top: 48%;    left: 2%;   animation-duration: 9s;   animation-delay: -4s; }

      /* Hide floaters that would overlap content on small screens */
      @media (max-width: 640px) {
        .f1, .f3, .f5 { left: -200px; }
        .f2, .f4 { right: -200px; }
      }

      /* ─── Main container ─────────────────────────────────── */
      .container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 500px;
        width: 100%;
      }

      /* ─── Badge ──────────────────────────────────────────── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        padding: 5px 14px;
        font-size: 13px;
        color: var(--text-3);
        letter-spacing: 0.04em;
        margin-bottom: 1.5rem;
        animation: fade-up 0.45s 0.05s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .badge i {
        font-size: 14px;
        color: var(--accent);
      }

      /* ─── 404 display number ─────────────────────────────── */
      .big-404 {
        font-family: "Syne", sans-serif;
        font-size: clamp(72px, 18vw, 120px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -4px;
        margin-bottom: 1.25rem;
        animation: pop 0.55s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .big-404 .accent {
        color: var(--accent);
      }

      /* ─── Headings & body copy ───────────────────────────── */
      h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(20px, 4vw, 24px);
        font-weight: 700;
        color: var(--deep);
        margin-bottom: 0.6rem;
        animation: fade-up 0.45s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      p.description {
        font-size: clamp(14px, 2vw, 15px);
        color: var(--text-2);
        line-height: 1.75;
        margin-bottom: 2rem;
        max-width: 340px;
        animation: fade-up 0.45s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ─── Mini navigation cards ──────────────────────────── */
      .floating-cards {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 2rem;
        animation: fade-up 0.45s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
        list-style: none;
        padding: 0;
      }

      .mini-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 10px 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-2);
        text-decoration: none;
        animation: bob linear infinite;
        transition:
          border-color var(--transition-base),
          color var(--transition-base),
          transform var(--transition-base);
      }
      .mini-card:nth-child(1) { animation-duration: 5s;   animation-delay:  0s; }
      .mini-card:nth-child(2) { animation-duration: 6.5s; animation-delay: -1.5s; }
      .mini-card:nth-child(3) { animation-duration: 7s;   animation-delay: -3s; }
      .mini-card i {
        font-size: 15px;
        color: var(--accent);
      }
      .mini-card:hover,
      .mini-card:focus-visible {
        border-color: var(--accent);
        color: var(--accent);
      }
      .mini-card:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-focus);
      }
      .mini-card:active {
        transform: scale(0.96);
      }

      /* ─── CTA buttons ────────────────────────────────────── */
      .btn-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        animation: fade-up 0.45s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .btn-primary,
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: var(--radius-sm);
        padding: 11px 24px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        border: 1px solid transparent;
        transition:
          opacity var(--transition-base),
          background var(--transition-base),
          border-color var(--transition-base),
          box-shadow var(--transition-base),
          transform 120ms ease;
      }

      /* Shared focus ring */
      .btn-primary:focus-visible,
      .btn-ghost:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-focus);
      }

      /* Shared press state */
      .btn-primary:active,
      .btn-ghost:active {
        transform: scale(0.97);
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        opacity: 0.87;
      }

      .btn-ghost {
        background: var(--surface);
        color: var(--text-2);
        border-color: var(--border);
      }
      .btn-ghost:hover {
        background: var(--bg);
        border-color: #ccc;
      }
      @media (prefers-color-scheme: dark) {
        .btn-ghost:hover {
          background: #2a2a28;
          border-color: #444;
        }
      }

      /* Stack buttons full-width on very small screens */
      @media (max-width: 400px) {
        .btn-group {
          flex-direction: column;
          width: 100%;
        }
        .btn-primary,
        .btn-ghost {
          width: 100%;
          justify-content: center;
        }
      }

      /* ─── Keyframes ──────────────────────────────────────── */
      @keyframes bob {
        0%, 100% { transform: translateY(0);    }
        50%       { transform: translateY(-10px); }
      }

      @keyframes pop {
        from { transform: scale(0.8); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0);    }
      }

      /* ─── Reduced-motion: kill all decorative animation ──── */
      @media (prefers-reduced-motion: reduce) {
        .floater,
        .mini-card,
        .big-404,
        .badge,
        h1,
        .description,
        .floating-cards,
        .btn-group {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Skip nav for keyboard / AT users -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Decorative backgrounds (hidden from AT) -->
    <div class="bg-dots" aria-hidden="true"></div>
    <div class="bg-ghost" aria-hidden="true">404</div>

    <!-- Floating filename chips (purely decorative) -->
    <div class="floater f1" aria-hidden="true"><i class="ti ti-layout-grid"></i> button.html</div>
    <div class="floater f2" aria-hidden="true"><i class="ti ti-palette"></i> theme.css</div>
    <div class="floater f3" aria-hidden="true"><i class="ti ti-box"></i> modal.html</div>
    <div class="floater f4" aria-hidden="true"><i class="ti ti-code"></i> card.html</div>
    <div class="floater f5" aria-hidden="true"><i class="ti ti-photo"></i> avatar.svg</div>

    <!-- ── Main content ──────────────────────────────────── -->
    <main id="main-content" class="container">

      <!-- Status badge -->
      <div class="badge" role="status" aria-label="Navigation status: lost in UIverse">
        <i class="ti ti-compass-off" aria-hidden="true"></i>
        lost in UIverse
      </div>

      <!-- Error code — labelled for screen readers -->
      <p class="big-404" role="img" aria-label="Error 404">
        4<span class="accent">0</span>4
      </p>

      <h1>Page not found</h1>

      <p class="description">
        Looks like this component got deleted. The page you're looking for
        doesn't exist or may have been moved.
      </p>

      <!-- Quick-explore nav (real links, keyboard-reachable) -->
      <nav aria-label="Explore UIverse sections">
        <ul class="floating-cards">
          <li>
            <a href="/components" class="mini-card">
              <i class="ti ti-layout-grid" aria-hidden="true"></i>
              components
            </a>
          </li>
          <li>
            <a href="/themes" class="mini-card">
              <i class="ti ti-palette" aria-hidden="true"></i>
              themes
            </a>
          </li>
          <li>
            <a href="/templates" class="mini-card">
              <i class="ti ti-box" aria-hidden="true"></i>
              templates
            </a>
          </li>
        </ul>
      </nav>

      <!-- Recovery CTAs -->
      <div class="btn-group" role="group" aria-label="Page recovery options">
        <a class="btn-primary" href="/">
          <i class="ti ti-home" aria-hidden="true"></i>
          Back to home
        </a>
        <a class="btn-ghost" href="/components">
          <i class="ti ti-layout-grid" aria-hidden="true"></i>
          Browse components
        </a>
      </div>

    </main>
  </body>
</html>
