<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Empty States</title>
  <link rel="stylesheet" href="empty-state.css">
</head>
<body>
  <div class="empty-state-showcase">
    <header class="showcase-header">
      <h2>Empty State Component</h2>
      <p>Clean, semantic, and highly custom placeholders for empty results or search views.</p>
    </header>

    <div class="empty-state-card" role="region" aria-label="No results found message">
      <div class="empty-state-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <h3 class="empty-state-title">No search results found</h3>
      <p class="empty-state-description">We couldn't find any components matching your criteria. Try adjusting your filters or search query.</p>
      <div class="empty-state-actions">
        <button class="empty-state-btn primary" type="button">Clear Search</button>
        <button class="empty-state-btn secondary" type="button">Browse Categories</button>
      </div>
    </div>
  </div>
</body>
</html>
