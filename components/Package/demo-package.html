<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../dist/shared.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI-Verse Package Demo</title>
  <link rel="stylesheet" href="/design-tokens.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      background: linear-gradient(180deg, var(--bg-primary), var(--bg-secondary));
      color: var(--text-primary);
      padding: 40px 20px;
    }

    .panel {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(16px);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
  </style>
  <script type="module">
    import '/dist/index.js';
    window.addEventListener('DOMContentLoaded', () => {
      window.DesignTokens.init();
    });
  </script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main class="panel">
    <div class="row">
      <div>
        <p class="eyebrow">npm package demo</p>
        <h1>UI-Verse components</h1>
      </div>
      <uv-theme-switcher></uv-theme-switcher>
    </div>

    <p>These components are ready to import from the package entry or subpath exports.</p>

    <div class="actions">
      <uv-button>Primary Button</uv-button>
      <uv-tooltip>Hover demo</uv-tooltip>
      <uv-language-switcher></uv-language-switcher>
      <uv-modal>Modal shell</uv-modal>
    </div>
  </main>
      <script src="../../dist/shared.js"></script>
</body>
</html>
