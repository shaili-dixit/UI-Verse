<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Skeleton Loaders</title>
  <link rel="stylesheet" href="skeleton-loader.css">
</head>
<body>
  <div class="skeleton-demo-wrapper">
    <header class="skeleton-header">
      <h2>Premium Skeleton Loader Variants</h2>
      <p>Beautiful, performance-optimized, Tailwind-free skeleton loaders featuring hardware-accelerated shimmer effects.</p>
    </header>

    <div class="skeleton-grid">
      <!-- Media Card Variant -->
      <section class="skeleton-showcase-card" aria-label="Media Card Skeleton">
        <h3>Media Card</h3>
        <div class="card-skeleton" aria-hidden="true">
          <div class="skeleton skeleton-media"></div>
          <div class="skeleton-content-wrapper">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text skeleton-half"></div>
            <div class="skeleton-meta">
              <div class="skeleton skeleton-avatar"></div>
              <div class="skeleton skeleton-author"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Profile Card Variant -->
      <section class="skeleton-showcase-card" aria-label="Profile Card Skeleton">
        <h3>Profile Card</h3>
        <div class="profile-skeleton" aria-hidden="true">
          <div class="skeleton skeleton-avatar-large"></div>
          <div class="skeleton skeleton-title-center"></div>
          <div class="skeleton skeleton-text-center"></div>
          <div class="skeleton-actions">
            <div class="skeleton skeleton-button"></div>
            <div class="skeleton skeleton-button"></div>
          </div>
        </div>
      </section>

      <!-- Table Rows Variant -->
      <section class="skeleton-showcase-card" aria-label="Table Row Skeleton">
        <h3>Table Rows</h3>
        <div class="table-skeleton" aria-hidden="true">
          <div class="table-skeleton-row">
            <div class="skeleton skeleton-cell-small"></div>
            <div class="skeleton skeleton-cell-medium"></div>
            <div class="skeleton skeleton-cell-large"></div>
          </div>
          <div class="table-skeleton-row">
            <div class="skeleton skeleton-cell-small"></div>
            <div class="skeleton skeleton-cell-medium"></div>
            <div class="skeleton skeleton-cell-large"></div>
          </div>
          <div class="table-skeleton-row">
            <div class="skeleton skeleton-cell-small"></div>
            <div class="skeleton skeleton-cell-medium"></div>
            <div class="skeleton skeleton-cell-large"></div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
