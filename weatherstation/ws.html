<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Weather Station Dashboard</title>
  <link rel="stylesheet" href="ws.css">
</head>
<body>

  <div class="weather-dashboard">

    <div class="top-section">

      <div class="weather-card main-weather">

        <h1>28°C</h1>

        <h2>Cloudy</h2>

        <p>Hyderabad, India</p>

        <div class="weather-icon">
          ☁️
        </div>

      </div>

      <div class="weather-card stats-card">

        <div class="stat">
          <h3>Humidity</h3>
          <p>72%</p>
        </div>

        <div class="stat">
          <h3>Wind Speed</h3>
          <p>12 km/h</p>
        </div>

        <div class="stat">
          <h3>Pressure</h3>
          <p>1012 hPa</p>
        </div>

      </div>

    </div>

    <div class="forecast-section">

      <h2>Weekly Forecast</h2>

      <div class="forecast-grid">

        <div class="forecast-card">
          <h3>Mon</h3>
          <span>☀️</span>
          <p>31°C</p>
        </div>

        <div class="forecast-card">
          <h3>Tue</h3>
          <span>🌧️</span>
          <p>25°C</p>
        </div>

        <div class="forecast-card">
          <h3>Wed</h3>
          <span>⛅</span>
          <p>29°C</p>
        </div>

        <div class="forecast-card">
          <h3>Thu</h3>
          <span>☁️</span>
          <p>27°C</p>
        </div>

        <div class="forecast-card">
          <h3>Fri</h3>
          <span>🌩️</span>
          <p>24°C</p>
        </div>

      </div>

    </div>

  </div>

  <script src="ws.js"></script>
</body>
</html>
