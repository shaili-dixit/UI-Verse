<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' http://127.0.0.1:5000 http://localhost:5000 https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-inline'; style-src 'self' https: 'unsafe-inline'">
  <title>Notifications — IoT Alerts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="notifications.css">
</head>
<body>
  <main class="notifications-shell">
    <section class="hero">
      <div>
        <span class="eyebrow">Notification center</span>
        <h1>Sensor alerts and field notifications</h1>
        <p>Low-moisture events from the IoT hub show up here with delivery status and timestamps.</p>
      </div>
      <div class="hero-actions">
        <a href="farm_dashboard.html" class="hero-link">Open dashboard</a>
        <a href="index.html" class="hero-link secondary">Back to UIverse</a>
      </div>
    </section>

    <section class="controls-card">
      <div class="controls-row">
        <div>
          <label for="deviceSelect">Filter by device</label>
          <select id="deviceSelect"></select>
        </div>
        <div class="controls-buttons">
          <button id="refreshBtn" type="button">Refresh alerts</button>
          <span id="syncState">Loading notifications…</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <h2>Recent alerts</h2>
        <p>Moisture-based notifications created by the background worker.</p>
      </div>
      <div id="alertsList" class="alerts-list"></div>
    </section>
  </main>

  <script src="js/features/iot-notifications.js"></script>
</body>
</html>
