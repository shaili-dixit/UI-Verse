<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Planner Dashboard</title>
  <link rel="stylesheet" href="wp.css">
</head>
<body>

  <div class="dashboard">

    <aside class="sidebar">

      <h2>FitZone</h2>

      <ul>
        <li class="active">Dashboard</li>
        <li>Workout Plans</li>
        <li>Progress</li>
        <li>Nutrition</li>
        <li>Settings</li>
      </ul>

    </aside>

    <main class="main-content">

      <div class="stats-section">

        <div class="stat-card">
          <h3>Calories Burned</h3>
          <h1>820</h1>
        </div>

        <div class="stat-card">
          <h3>Workout Time</h3>
          <h1>1h 45m</h1>
        </div>

        <div class="stat-card">
          <h3>Exercises Done</h3>
          <h1>14</h1>
        </div>

      </div>

      <div class="planner-section">

        <div class="workout-card">

          <h2>Today's Workout Plan</h2>

          <div class="exercise">
            <span>Push Ups</span>
            <p>3 Sets × 15 Reps</p>
          </div>

          <div class="exercise">
            <span>Squats</span>
            <p>4 Sets × 20 Reps</p>
          </div>

          <div class="exercise">
            <span>Plank</span>
            <p>3 Sets × 60 Sec</p>
          </div>

          <div class="exercise">
            <span>Jump Rope</span>
            <p>15 Minutes</p>
          </div>

        </div>

        <div class="progress-card">

          <h2>Weekly Progress</h2>

          <div class="progress-bar">
            <div class="progress" style="width: 78%;">
              78%
            </div>
          </div>

          <button id="completeBtn">
            Mark Workout Complete
          </button>

          <div id="message"></div>

        </div>

      </div>

    </main>

  </div>

  <script src="wp.js"></script>
</body>
</html>
