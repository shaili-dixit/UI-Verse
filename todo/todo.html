<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="todo.css">
</head>
<body>
  <div class="td-wrap">
    <div class="td-header">
      <h1 class="td-title">My tasks</h1>
      <span class="td-count" id="td-count">0 tasks</span>
    </div>

    <div class="td-input-row">
      <label for="td-input" class="sr-only">New task</label>
      <input class="td-input" id="td-input" placeholder="What needs to be done?" autocomplete="off" />
      <button class="td-add" id="td-btn" aria-label="Add task">
        <i class="ti ti-plus" aria-hidden="true"></i> Add
      </button>
    </div>

    <div class="td-filters" role="group" aria-label="Filter tasks">
      <button class="td-filter active" data-filter="all">All</button>
      <button class="td-filter" data-filter="active">Active</button>
      <button class="td-filter" data-filter="done">Done</button>
    </div>

    <div class="td-bulk" id="td-bulk">
      <button class="td-clear" id="td-clear">Clear completed</button>
    </div>

    <ul class="td-list" id="td-list" aria-label="Task list"></ul>

    <div class="td-empty" id="td-empty" aria-live="polite">
      <div class="td-empty-icon"><i class="ti ti-clipboard-list" aria-hidden="true"></i></div>
      <div>No tasks yet. Add one above!</div>
    </div>
  </div>

  <script src="todo.js"></script>
</body>
</html>
