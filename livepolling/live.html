<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes' sha256-64mcSQVXen0ozr47xSkKV1HYsyhyGdqiyaDRzn1HIW4= sha256-hKDoxLDb3OpE3Af4HZ+uqErJUCA/tlXaF4zFm9txGb8= sha256-uLaZ3ayv/oDn4JTmHdKhen+4PapnFDDCI0LCgdp69XY=; style-src-attr 'unsafe-hashes' sha256-64mcSQVXen0ozr47xSkKV1HYsyhyGdqiyaDRzn1HIW4= sha256-hKDoxLDb3OpE3Af4HZ+uqErJUCA/tlXaF4zFm9txGb8= sha256-uLaZ3ayv/oDn4JTmHdKhen+4PapnFDDCI0LCgdp69XY=">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Poll Voting UI</title>
  </head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


<main class="poll-wrapper">

  <section class="poll-card" role="region" aria-labelledby="poll-title">

    <header class="poll-header">
      <h1 id="poll-title">Live Poll</h1>
      <p class="subtitle">Vote and see real-time results</p>
    </header>

    <section class="question-box">
      <h2 class="question">
        Which frontend technology do you prefer the most?
      </h2>
    </section>

    <!-- Voting Options -->
    <section class="options" role="group" aria-label="Poll options">

      <button class="vote-btn" data-option="html" aria-pressed="false">
        HTML & CSS
      </button>

      <button class="vote-btn" data-option="react" aria-pressed="false">
        React JS
      </button>

      <button class="vote-btn" data-option="vue" aria-pressed="false">
        Vue JS
      </button>

    </section>

    <!-- Results -->
    <section class="results" aria-live="polite">

      <div class="result-item" data-result="html">
        <div class="result-label">
          <span>HTML & CSS</span>
          <span class="percent" id="html-count">40%</span>
        </div>
        <div class="progress-bar">
          <div class="progress" id="html-progress" style="width: 40%;"></div>
        </div>
      </div>

      <div class="result-item" data-result="react">
        <div class="result-label">
          <span>React JS</span>
          <span class="percent" id="react-count">35%</span>
        </div>
        <div class="progress-bar">
          <div class="progress" id="react-progress" style="width: 35%;"></div>
        </div>
      </div>

      <div class="result-item" data-result="vue">
        <div class="result-label">
          <span>Vue JS</span>
          <span class="percent" id="vue-count">25%</span>
        </div>
        <div class="progress-bar">
          <div class="progress" id="vue-progress" style="width: 25%;"></div>
        </div>
      </div>

    </section>

    <!-- Footer -->
    <footer class="poll-footer">
      <small>Results update automatically after voting</small>
    </footer>

  </section>

</main>

      <script src="../dist/shared.js"></script>
</body>
</html>
