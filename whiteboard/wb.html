<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Whiteboard UI</title>
  <link rel="stylesheet" href="wb.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="whiteboard-container">

    <div class="toolbar">

      <h2>Digital Whiteboard</h2>

      <div class="tools">

        <input type="color" id="colorPicker" data-a11y-remediation="label-needed">

        <input
          type="range"
          id="brushSize"
          min="1"
          max="20"
          value="4"
        >

        <div class="tool-toggle" id="toolToggle">
          <button type="button" class="tool-btn active" id="brushBtn" title="Brush" aria-pressed="true">
            <i class="fa-solid fa-paintbrush"></i>
          </button>
          <button type="button" class="tool-btn" id="eraserBtn" title="Eraser" aria-pressed="false">
            <i class="fa-solid fa-eraser"></i>
          </button>
          <button type="button" class="tool-btn" id="fillBtn" title="Fill" aria-pressed="false">
            <i class="fa-solid fa-fill-drip"></i>
          </button>
        </div>
        <button id="clearBtn">
          Clear
        </button>

        <button type="button" id="undoBtn" title="Undo (Ctrl+Z)" aria-label="Undo last action">
          <i class="fa-solid fa-rotate-left"></i>
        </button>
        <button type="button" id="redoBtn" title="Redo (Ctrl+Y)" aria-label="Redo last action">
          <i class="fa-solid fa-rotate-right"></i>
        </button>

      </div>

    </div>

    <canvas id="canvas"></canvas>

  </div>

  <script src="wb.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
