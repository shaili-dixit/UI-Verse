<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Whiteboard UI</title>
  <link rel="stylesheet" href="wb.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="whiteboard-container">

    <div class="toolbar">

      <h2>Digital Whiteboard</h2>

      <div class="tools">

        <input type="color" id="colorPicker" data-a11y-remediation="label-needed">

        <input
          type="range"
          id="brushSize"
          min="1"
          max="20"
          value="4"
        >

        <button id="eraserBtn">
          Eraser
        </button>

        <button id="clearBtn">
          Clear
        </button>

      </div>

    </div>

    <canvas id="canvas"></canvas>

  </div>

  <script src="wb.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
