<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Attendance Tracker</title>
  <link rel="stylesheet" href="sa.css">
</head>
<body>

  <div class="attendance-dashboard">

    <div class="top-bar">

      <h1>Student Attendance Tracker</h1>

      <input
        type="text"
        id="searchInput"
        placeholder="Search student..."
      >

    </div>

    <div class="stats-section">

      <div class="stat-card">
        <h3>Total Students</h3>
        <h2>40</h2>
      </div>

      <div class="stat-card">
        <h3>Present</h3>
        <h2 id="presentCount">32</h2>
      </div>

      <div class="stat-card">
        <h3>Absent</h3>
        <h2 id="absentCount">8</h2>
      </div>

    </div>

    <div class="table-container">

      <table>

        <thead>

          <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Status</th>
          </tr>

        </thead>

        <tbody id="studentTable">

          <tr>
            <td>Rahul Sharma</td>
            <td>101</td>
            <td>
              <button class="status-btn present">
                Present
              </button>
            </td>
          </tr>

          <tr>
            <td>Anjali Verma</td>
            <td>102</td>
            <td>
              <button class="status-btn absent">
                Absent
              </button>
            </td>
          </tr>

          <tr>
            <td>Saiteja</td>
            <td>103</td>
            <td>
              <button class="status-btn present">
                Present
              </button>
            </td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

  <script src="sa.js"></script>
</body>
</html>
