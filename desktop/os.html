<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop OS Mockup UI</title>
  <link rel="stylesheet" href="os.css">
</head>
<body>

  <div class="desktop">

    <div class="desktop-icons">

      <div class="icon">
        <div class="icon-box">📁</div>
        <span>Files</span>
      </div>

      <div class="icon">
        <div class="icon-box">🌐</div>
        <span>Browser</span>
      </div>

      <div class="icon">
        <div class="icon-box">🎵</div>
        <span>Music</span>
      </div>

      <div class="icon">
        <div class="icon-box">⚙️</div>
        <span>Settings</span>
      </div>

    </div>

    <div class="window">

      <div class="window-header">

        <div class="window-controls">

          <span class="red"></span>
          <span class="yellow"></span>
          <span class="green"></span>

        </div>

        <p>Welcome Window</p>

      </div>

      <div class="window-content">

        <h2>Desktop OS Mockup</h2>

        <p>
          This is a responsive desktop operating system UI built using HTML, CSS, and JavaScript.
        </p>

      </div>

    </div>

    <div class="taskbar">

      <div class="taskbar-left">

        <button class="start-btn">
          Start
        </button>

      </div>

      <div class="taskbar-center">

        <span>📁</span>
        <span>🌐</span>
        <span>🎵</span>

      </div>

      <div class="taskbar-right">

        <span id="clock">
          00:00
        </span>

      </div>

    </div>

  </div>

  <script src="os.js"></script>
</body>
</html>
