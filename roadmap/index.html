<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Roadmap Timeline</title>
  <link rel="stylesheet" href="stye.css">
</head>
<body>

  <section class="timeline">

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-content">
        <h2>Phase 1</h2>
        <p>Project planning and requirement analysis.</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-content">
        <h2>Phase 2</h2>
        <p>UI/UX design and wireframe creation.</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-content">
        <h2>Phase 3</h2>
        <p>Frontend and backend development process.</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-content">
        <h2>Phase 4</h2>
        <p>Testing, optimization, and deployment.</p>
      </div>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
