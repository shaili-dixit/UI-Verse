<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Habit Tracker Pro</title>

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins",sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left,#4f46e5 0%,transparent 35%),
        radial-gradient(circle at bottom right,#06b6d4 0%,transparent 30%),
        #0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
      color:#fff;
    }

    .container{
      width:100%;
      max-width:950px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(16px);
      border-radius:28px;
      padding:35px;
      box-shadow:0 20px 40px rgba(0,0,0,0.35);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    h1{
      font-size:2.3rem;
      font-weight:700;
      letter-spacing:1px;
    }

    .stats{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .card{
      background:rgba(255,255,255,0.08);
      padding:14px 20px;
      border-radius:18px;
      min-width:120px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
    }

    .card h2{
      font-size:1.5rem;
      margin-bottom:4px;
    }

    .card p{
      font-size:0.9rem;
      opacity:0.8;
    }

    .habit-input{
      display:flex;
      gap:15px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .habit-input input{
      flex:1;
      min-width:220px;
      padding:16px 18px;
      border:none;
      border-radius:16px;
      outline:none;
      background:rgba(255,255,255,0.12);
      color:#fff;
      font-size:1rem;
    }

    .habit-input input::placeholder{
      color:#cbd5e1;
    }

    .habit-input button{
      border:none;
      outline:none;
      padding:15px 24px;
      border-radius:16px;
      background:linear-gradient(135deg,#6366f1,#06b6d4);
      color:white;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .habit-input button:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 10px 20px rgba(99,102,241,0.35);
    }

    .habit-list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .habit{
      background:rgba(255,255,255,0.08);
      border-radius:22px;
      padding:22px;
      border:1px solid rgba(255,255,255,0.08);
      position:relative;
      overflow:hidden;
      transition:0.3s;
    }

    .habit:hover{
      transform:translateY(-4px);
      box-shadow:0 15px 25px rgba(0,0,0,0.25);
    }

    .habit.completed{
      border:1px solid rgba(34,197,94,0.5);
    }

    .habit.completed::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(
        135deg,
        rgba(34,197,94,0.15),
        transparent
      );
    }

    .habit-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:15px;
      margin-bottom:18px;
    }

    .habit-title{
      font-size:1.15rem;
      font-weight:600;
      word-break:break-word;
    }

    .badge{
      padding:7px 12px;
      border-radius:50px;
      font-size:0.75rem;
      font-weight:600;
      background:rgba(255,255,255,0.12);
      white-space:nowrap;
    }

    .habit.completed .badge{
      background:#22c55e;
      color:white;
    }

    .progress-bar{
      width:100%;
      height:10px;
      background:rgba(255,255,255,0.12);
      border-radius:50px;
      overflow:hidden;
      margin-bottom:18px;
    }

    .progress{
      height:100%;
      width:0%;
      border-radius:50px;
      background:linear-gradient(90deg,#6366f1,#06b6d4);
      transition:0.4s;
    }

    .habit-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .habit-actions button{
      flex:1;
      min-width:100px;
      border:none;
      padding:12px;
      border-radius:14px;
      cursor:pointer;
      color:white;
      font-weight:600;
      transition:0.3s;
    }

    .done-btn{
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    .delete-btn{
      background:linear-gradient(135deg,#ef4444,#dc2626);
    }

    .habit-actions button:hover{
      transform:translateY(-2px);
      opacity:0.92;
    }

    .empty{
      text-align:center;
      padding:50px 20px;
      opacity:0.8;
      grid-column:1/-1;
    }

    @media(max-width:650px){
      .container{
        padding:22px;
      }

      h1{
        font-size:1.8rem;
      }

      .top{
        flex-direction:column;
        align-items:flex-start;
      }

      .habit-input{
        flex-direction:column;
      }

      .habit-input button{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="top">
      <h1>✨ Habit Tracker</h1>

      <div class="stats">
        <div class="card">
          <h2 id="totalHabits">0</h2>
          <p>Total</p>
        </div>

        <div class="card">
          <h2 id="completedHabits">0</h2>
          <p>Completed</p>
        </div>
      </div>
    </div>

    <div class="habit-input">
      <input
        type="text"
        id="habitInput"
        placeholder="Enter a new habit..."
      />

      <button onclick="addHabit()">
        + Add Habit
      </button>
    </div>

    <div class="habit-list" id="habitList">
      <div class="empty">
        No habits added yet 🚀
      </div>
    </div>

  </div>

  <script>
    const habitInput = document.getElementById("habitInput");
    const habitList = document.getElementById("habitList");
    const totalHabits = document.getElementById("totalHabits");
    const completedHabits =
      document.getElementById("completedHabits");

    let habits = JSON.parse(
      localStorage.getItem("habits")
    ) || [];

    function saveHabits() {
      localStorage.setItem(
        "habits",
        JSON.stringify(habits)
      );
    }

    function updateStats() {
      totalHabits.textContent = habits.length;

      const completed =
        habits.filter(h => h.completed).length;

      completedHabits.textContent = completed;
    }

    function renderHabits() {
      habitList.innerHTML = "";

      if (habits.length === 0) {
        habitList.innerHTML = `
          <div class="empty">
            No habits added yet 🚀
          </div>
        `;
      }

      habits.forEach((habit, index) => {

        const habitCard = document.createElement("div");

        habitCard.className =
          habit.completed
            ? "habit completed"
            : "habit";

        habitCard.innerHTML = `
          <div class="habit-top">
            <div class="habit-title">
              ${habit.name}
            </div>

            <div class="badge">
              ${habit.completed
                ? "Completed"
                : "In Progress"}
            </div>
          </div>

          <div class="progress-bar">
            <div
              class="progress"
              style="width:${
                habit.completed ? "100%" : "45%"
              }"
            ></div>
          </div>

          <div class="habit-actions">

            <button
              class="done-btn"
              onclick="toggleHabit(${index})"
            >
              ${
                habit.completed
                  ? "Undo"
                  : "Done"
              }
            </button>

            <button
              class="delete-btn"
              onclick="deleteHabit(${index})"
            >
              Delete
            </button>

          </div>
        `;

        habitList.appendChild(habitCard);
      });

      updateStats();
      saveHabits();
    }

    function addHabit() {
      const value = habitInput.value.trim();

      if (value === "") {
        alert("Please enter a habit!");
        return;
      }

      habits.push({
        name: value,
        completed: false
      });

      habitInput.value = "";

      renderHabits();
    }

    function toggleHabit(index) {
      habits[index].completed =
        !habits[index].completed;

      renderHabits();
    }

    function deleteHabit(index) {
      habits.splice(index, 1);

      renderHabits();
    }

    habitInput.addEventListener("keypress", e => {
      if (e.key === "Enter") {
        addHabit();
      }
    });

    renderHabits();
  </script>

</body>
</html>
