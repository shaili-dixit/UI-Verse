<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Chat UI</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="ui.css">
</head>
<body>

  <div class="background-glow"></div>

  <div class="chat-container">

    <!-- Header -->
    <div class="chat-header">

      <div class="header-left">
        <div class="avatar">
          U
        </div>

        <div class="header-info">
          <h2>UIverse Assistant</h2>
          <p>Online now</p>
        </div>
      </div>

      <div class="header-icons">
        <button>📞</button>
        <button>⋮</button>
      </div>

    </div>

    <!-- Chat Messages -->
    <div class="chat-box" id="chatBox">

      <div class="message received">
        <div class="message-content">
          👋 Hello! How can I help you today?
        </div>
        <span class="time">09:41 AM</span>
      </div>

      <div class="message sent">
        <div class="message-content">
          I need information about UI components.
        </div>
        <span class="time">09:42 AM</span>
      </div>

      <div class="message received">
        <div class="message-content">
          Sure! Buttons, cards, forms, sliders, modals and navbars are some popular UI components.
        </div>
        <span class="time">09:42 AM</span>
      </div>

    </div>

    <!-- Input Area -->
    <div class="chat-input">

      <button class="emoji-btn">😊</button>

      <input
        type="text"
        id="messageInput"
        placeholder="Write your message..."
      >

      <button class="attach-btn">📎</button>

      <button id="sendBtn">
        ➤
      </button>

    </div>

  </div>

  <script src="ui.js"></script>

  
</body>
</html>
