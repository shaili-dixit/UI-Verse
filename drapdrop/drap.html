<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drag & Drop File Upload</title>
  <link rel="stylesheet" href="drag.css">
</head>
<body>

  <div class="upload-container">
    <h2>Upload Files</h2>

    <div class="upload-box" id="drop-area">
      <input type="file" id="fileElem" multiple hidden>
      <p>Drag & Drop files here</p>
      <span>or</span>
      <button id="browseBtn">Browse Files</button>
    </div>

    <div id="preview"></div>
  </div>

  <script src="drag.js"></script>
</body>
</html>
