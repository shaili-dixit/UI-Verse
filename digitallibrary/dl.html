<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Library Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">

    <aside class="sidebar">

      <h2>BookVerse</h2>

      <ul>
        <li class="active">Library</li>
        <li>Categories</li>
        <li>Favorites</li>
        <li>Reading List</li>
        <li>Settings</li>
      </ul>

    </aside>

    <main class="main-content">

      <div class="top-bar">

        <h1>Digital Library</h1>

        <input
          type="text"
          placeholder="Search books..."
        >

      </div>

      <div class="progress-card">

        <h2>Reading Progress</h2>

        <div class="progress-bar">

          <div class="progress">
            68%
          </div>

        </div>

      </div>

      <div class="books-grid">

        <div class="book-card">

          <img
            src="https://images.unsplash.com/photo-1512820790803-83ca734da794"
            alt="Book"
          >

          <h2>Atomic Habits</h2>

          <p>James Clear</p>

          <button class="read-btn">
            Read Now
          </button>

        </div>

        <div class="book-card">

          <img
            src="https://images.unsplash.com/photo-1521587760476-6c12a4b040da"
            alt="Book"
          >

          <h2>Deep Work</h2>

          <p>Cal Newport</p>

          <button class="read-btn">
            Read Now
          </button>

        </div>

        <div class="book-card">

          <img
            src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d"
            alt="Book"
          >

          <h2>The Psychology of Money</h2>

          <p>Morgan Housel</p>

          <button class="read-btn">
            Read Now
          </button>

        </div>

      </div>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
