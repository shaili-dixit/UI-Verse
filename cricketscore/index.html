<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Cricket Score UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🏏 Live Cricket Score</h1>
  </header>

  <main class="container">

    <!-- Live Score Card -->
    <section class="card live-score">
      <h2>India vs Australia</h2>

      <div class="score-box">
        <div>
          <h3>IND</h3>
          <p id="indiaScore">182/4</p>
        </div>

        <div>
          <h3>AUS</h3>
          <p>178/8</p>
        </div>
      </div>

      <p class="status">India need 7 runs in 12 balls</p>
    </section>

    <!-- Match Statistics -->
    <section class="card">
      <h2>Match Statistics</h2>

      <div class="stats">
        <div class="stat-box">
          <h3>Overs</h3>
          <p>18.0</p>
        </div>

        <div class="stat-box">
          <h3>Run Rate</h3>
          <p>10.1</p>
        </div>

        <div class="stat-box">
          <h3>Boundaries</h3>
          <p>24</p>
        </div>
      </div>
    </section>

    <!-- Team Comparison -->
    <section class="card">
      <h2>Team Comparison</h2>

      <div class="comparison">
        <div>
          <h3>India</h3>
          <div class="bar india"></div>
        </div>

        <div>
          <h3>Australia</h3>
          <div class="bar aus"></div>
        </div>
      </div>
    </section>

    <!-- Recent Matches -->
    <section class="card">
      <h2>Recent Matches</h2>

      <div class="matches">
        <div class="match-card">IND beat ENG by 5 wickets</div>
        <div class="match-card">AUS beat NZ by 12 runs</div>
        <div class="match-card">PAK beat SA by 3 wickets</div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
