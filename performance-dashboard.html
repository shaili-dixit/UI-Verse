<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI-Verse Performance Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-unit {
            color: #999;
            font-size: 0.9em;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 10px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bar-item {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .bar-label {
            min-width: 200px;
            font-size: 0.9em;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar {
            flex: 1;
            height: 30px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
            min-width: 50px;
        }

        .violations-list {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .violation-item {
            padding: 15px;
            border-left: 4px solid #f8d7da;
            background: #fff9fa;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .violation-item.critical {
            border-left-color: #dc3545;
            background: #ffe5e7;
        }

        .violation-component {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .violation-details {
            font-size: 0.9em;
            color: #666;
        }

        .metric-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .timestamp {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 30px;
            padding: 20px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }

        .button:hover {
            background: #764ba2;
        }

        .refresh-section {
            text-align: center;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 2em;
            }

            .bar-label {
                min-width: 120px;
                font-size: 0.8em;
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading {
            animation: spin 1s linear infinite;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 UI-Verse Performance Dashboard</h1>
            <p class="subtitle">Real-time component performance monitoring and analysis</p>
        </header>

        <div class="refresh-section">
            <button class="button" onclick="loadPerformanceData()">🔄 Refresh Data</button>
        </div>

        <!-- Statistics Grid -->
        <div class="grid" id="statsGrid">
            <div class="card stat-card">
                <h3>Total Components</h3>
                <div class="stat-value" id="totalComponents">-</div>
            </div>
            <div class="card stat-card">
                <h3>Tests Passed</h3>
                <div class="stat-value" id="passedTests" style="color: #28a745;">-</div>
                <span class="status success">✓</span>
            </div>
            <div class="card stat-card">
                <h3>Tests Failed</h3>
                <div class="stat-value" id="failedTests" style="color: #dc3545;">-</div>
                <span class="status error">✗</span>
            </div>
            <div class="card stat-card">
                <h3>Budget Violations</h3>
                <div class="stat-value" id="violations" style="color: #ffc107;">-</div>
                <span class="status warning">⚠️</span>
            </div>
            <div class="card stat-card">
                <h3>Average Load Time</h3>
                <div class="stat-value" id="avgLoadTime">-</div>
                <div class="stat-unit">milliseconds</div>
            </div>
            <div class="card stat-card">
                <h3>Slowest Component</h3>
                <div class="stat-value" id="maxLoadTime">-</div>
                <div class="stat-unit">milliseconds</div>
            </div>
        </div>

        <!-- Slowest Components Chart -->
        <div class="chart-container">
            <div class="chart-title">🐢 Top 10 Slowest Components</div>
            <div class="bar-chart" id="slowestChart"></div>
        </div>

        <!-- Violations List -->
        <div class="violations-list">
            <div class="chart-title">⚠️ Performance Violations</div>
            <div id="violationsList"></div>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        async function loadPerformanceData() {
            try {
                // Try to load from generated report
                const response = await fetch('./reports/performance-analysis/performance-report.json');
                
                if (!response.ok) {
                    showNoData('Performance report not found. Run `npm run perf` to generate data.');
                    return;
                }

                const data = await response.json();
                displayPerformanceData(data);
            } catch (error) {
                showNoData('Unable to load performance data. Please run `npm run perf` first.');
            }
        }

        function displayPerformanceData(data) {
            const { stats, components, violations, timestamp } = data;

            // Update statistics
            document.getElementById('totalComponents').textContent = stats.totalComponents;
            document.getElementById('passedTests').textContent = stats.successfulTests;
            document.getElementById('failedTests').textContent = stats.failedTests;
            document.getElementById('violations').textContent = stats.violations;
            document.getElementById('avgLoadTime').textContent = stats.avgLoadTime;
            document.getElementById('maxLoadTime').textContent = stats.maxLoadTime;
            document.getElementById('timestamp').textContent = `Last updated: ${new Date(timestamp).toLocaleString()}`;

            // Display slowest components
            displaySlowestComponents(components);

            // Display violations
            displayViolations(violations);
        }

        function displaySlowestComponents(components) {
            const chart = document.getElementById('slowestChart');
            const entries = Object.entries(components)
                .sort((a, b) => (b[1].metrics?.loadComplete || 0) - (a[1].metrics?.loadComplete || 0))
                .slice(0, 10);

            if (entries.length === 0) {
                chart.innerHTML = '<div class="no-data">No component data available</div>';
                return;
            }

            const maxTime = Math.max(...entries.map(e => e[1].metrics?.loadComplete || 0), 1);

            chart.innerHTML = entries.map(([path, data]) => {
                if (!data.metrics) return '';
                const time = data.metrics.loadComplete || 0;
                const percentage = (time / maxTime) * 100;
                const componentName = path.split('/').pop();
                
                return `
                    <div class="bar-item">
                        <div class="bar-label" title="${path}">${componentName}</div>
                        <div class="bar" style="width: ${percentage}%;">
                            ${time.toFixed(0)}ms
                        </div>
                    </div>
                `;
            }).join('');
        }

        function displayViolations(violations) {
            const list = document.getElementById('violationsList');

            if (!violations || violations.length === 0) {
                list.innerHTML = '<div class="no-data">✓ No performance violations detected!</div>';
                return;
            }

            list.innerHTML = violations.map(violation => `
                <div class="violation-item ${violation.metric === 'Load Time' ? 'critical' : ''}">
                    <div class="violation-component">${violation.component}</div>
                    <div class="violation-details">
                        <strong>${violation.metric}:</strong> ${violation.actual.toFixed(2)} ${violation.unit || ''} 
                        (Budget: ${violation.budget.toFixed(2)} ${violation.unit || ''})
                    </div>
                </div>
            `).join('');
        }

        function showNoData(message) {
            document.getElementById('statsGrid').innerHTML = `<div class="card full-width no-data">${message}</div>`;
            document.getElementById('slowestChart').innerHTML = '';
            document.getElementById('violationsList').innerHTML = '';
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadPerformanceData);
    </script>
</body>
</html>
