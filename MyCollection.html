<!DOCTYPE html>
<html lang="en">
<head>
  <title>My Collection — UIverse</title>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes';"
  >

  <!-- Fonts -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- Icons -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  >

  <!-- Main CSS -->

  <link
    rel="stylesheet"
    href="css/main.css"
  >

  <script src="js/core/sanitize.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Inter",sans-serif;
      min-height:100vh;
      background:
        radial-gradient(circle at top left,#7c3aed22,transparent 30%),
        radial-gradient(circle at bottom right,#06b6d422,transparent 30%),
        #050816;
      color:#fff;
      overflow-x:hidden;
      padding:30px;
    }

    a{
      text-decoration:none;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    /* =====================================================
       TOP NAV
    ===================================================== */

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:40px;
      flex-wrap:wrap;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:14px 20px;
      border-radius:16px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
      color:#fff;
      backdrop-filter:blur(12px);
      transition:.3s ease;
    }

    .back-link:hover{
      transform:translateY(-3px);
      background:rgba(255,255,255,0.12);
    }

    .header-content h1{
      font-size:3rem;
      font-weight:800;
      line-height:1;
      margin-bottom:10px;
      background:linear-gradient(to right,#fff,#a855f7,#06b6d4);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .header-content p{
      color:#b6bdd1;
      font-size:1rem;
    }

    /* =====================================================
       STATS
    ===================================================== */

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .stat-card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border-radius:24px;
      padding:28px;
      position:relative;
      overflow:hidden;
    }

    .stat-card::before{
      content:"";
      position:absolute;
      width:140px;
      height:140px;
      background:#7c3aed22;
      border-radius:50%;
      top:-70px;
      right:-70px;
    }

    .stat-icon{
      width:55px;
      height:55px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
      margin-bottom:18px;
      font-size:1.2rem;
    }

    .stat-card h2{
      font-size:2rem;
      margin-bottom:5px;
    }

    .stat-card span{
      color:#c9d1e8;
      font-size:.95rem;
    }

    /* =====================================================
       SEARCH
    ===================================================== */

    .toolbar{
      display:flex;
      gap:20px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .search-box{
      flex:1;
      min-width:260px;
      position:relative;
    }

    .search-box i{
      position:absolute;
      left:18px;
      top:50%;
      transform:translateY(-50%);
      color:#8f96aa;
    }

    .search-box input{
      width:100%;
      padding:16px 20px 16px 50px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.06);
      color:#fff;
      outline:none;
      font-size:1rem;
      backdrop-filter:blur(12px);
    }

    .search-box input::placeholder{
      color:#8f96aa;
    }

    /* =====================================================
       COLLECTION GRID
    ===================================================== */

    .collection-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
      gap:28px;
    }

    .collection-item{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(16px);
      transition:.4s ease;
    }

    .collection-item:hover{
      transform:translateY(-10px);
      box-shadow:0 25px 50px rgba(0,0,0,.35);
    }

    .item-top{
      padding:22px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .item-top h3{
      font-size:1.1rem;
      font-weight:700;
      color:#fff;
    }

    .badge{
      padding:8px 14px;
      border-radius:999px;
      background:#7c3aed22;
      color:#c4b5fd;
      font-size:.75rem;
      border:1px solid #7c3aed44;
    }

    .item-preview{
      min-height:220px;
      padding:25px;
      background:#ffffff08;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .item-actions{
      display:flex;
      gap:14px;
      padding:22px;
      border-top:1px solid rgba(255,255,255,0.06);
    }

    .item-actions button{
      flex:1;
      border:none;
      cursor:pointer;
      padding:14px;
      border-radius:16px;
      font-weight:600;
      font-size:.95rem;
      transition:.3s ease;
    }

    .btn-copy{
      background:linear-gradient(135deg,#7c3aed,#9333ea);
      color:#fff;
    }

    .btn-copy:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 25px rgba(124,58,237,.35);
    }

    .btn-remove{
      background:#ffffff10;
      color:#ffb4b4;
      border:1px solid #ff4d4d33 !important;
    }

    .btn-remove:hover{
      background:#ff4d4d;
      color:#fff;
    }

    /* =====================================================
       EMPTY STATE
    ===================================================== */

    .empty-state{
      text-align:center;
      padding:80px 30px;
      border-radius:32px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
    }

    .empty-icon{
      width:120px;
      height:120px;
      margin:auto auto 25px;
      border-radius:50%;
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:3rem;
      box-shadow:0 20px 40px rgba(124,58,237,.35);
    }

    .empty-state h2{
      font-size:2rem;
      margin-bottom:12px;
    }

    .empty-state p{
      color:#b8c0d4;
      margin-bottom:30px;
      line-height:1.7;
    }

    .browse-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:16px 26px;
      border-radius:18px;
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
      color:#fff;
      font-weight:600;
      transition:.3s ease;
    }

    .browse-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 20px 35px rgba(124,58,237,.35);
    }

    /* =====================================================
       TOAST
    ===================================================== */

    .toast{
      position:fixed;
      bottom:30px;
      right:30px;
      background:#111827;
      border:1px solid rgba(255,255,255,0.08);
      color:#fff;
      padding:16px 24px;
      border-radius:18px;
      opacity:0;
      transform:translateY(20px);
      transition:.3s ease;
      z-index:9999;
      backdrop-filter:blur(12px);
    }

    .toast-visible{
      opacity:1;
      transform:translateY(0);
    }

    /* =====================================================
       RESPONSIVE
    ===================================================== */

    @media(max-width:768px){

      body{
        padding:20px;
      }

      .header-content h1{
        font-size:2.3rem;
      }

      .collection-grid{
        grid-template-columns:1fr;
      }

      .item-actions{
        flex-direction:column;
      }

    }

  </style>
  <!-- UIverse Modular CSS Architecture -->
  <link rel="stylesheet" href="css/main.css">
  <script src="js/core/sanitize.js"></script>
  <link rel="stylesheet" href="shared-sidebar.css">
</head>
<body>

<div class="container">

  <!-- =====================================================
       TOPBAR
  ====================================================== -->

  <div class="topbar">

    <div class="header-content">

      <h1>
        My Collection
      </h1>

      <p>
        Save, organize and manage your favorite UIverse components.
      </p>

    </div>

    <a
      href="footer.html"
      class="back-link"
    >
      <i class="fa-solid fa-arrow-left"></i>
      Back
    </a>

  </div>

  <!-- =====================================================
       STATS
  ====================================================== -->

  <div class="stats-grid">

    <div class="stat-card">

      <div class="stat-icon">
        <i class="fa-solid fa-layer-group"></i>
      </div>

      <h2 id="totalItems">
        0
      </h2>

      <span>
        Saved Components
      </span>

    </div>

    <div class="stat-card">

      <div class="stat-icon">
        <i class="fa-solid fa-code"></i>
      </div>

      <h2>
        HTML
      </h2>

      <span>
        Frontend Collection
      </span>

    </div>

    <div class="stat-card">

      <div class="stat-icon">
        <i class="fa-solid fa-bolt"></i>
      </div>

      <h2>
        UIverse
      </h2>

      <span>
        Modern Components
      </span>

    </div>

  </div>

  <!-- =====================================================
       SEARCH
  ====================================================== -->

  <div class="toolbar">

    <div class="search-box">

      <i class="fa-solid fa-magnifying-glass"></i>

      <input
        type="text"
        id="searchInput"
        placeholder="Search saved components..."
      >

    </div>

  </div>

  <!-- =====================================================
       COLLECTION
  ====================================================== -->

  <div id="collection"></div>

</div>

<script>

function showToast(message){

  const existing =
    document.getElementById("toast-notification");

  if(existing){
    existing.remove();
  }

  const toast =
    document.createElement("div");

  toast.id = "toast-notification";

  toast.className = "toast";

  toast.textContent = message;

  document.body.appendChild(toast);

  requestAnimationFrame(() => {

    requestAnimationFrame(() => {

      toast.classList.add("toast-visible");

    });

  });

  setTimeout(() => {

    toast.classList.remove("toast-visible");

    setTimeout(() => toast.remove(),300);

  },2000);

}

function escapeHtml(str){

  if(str == null){
    return '';
  }

  return String(str)

    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');

}

function removeFromCollection(id){

  let items =
    JSON.parse(
      localStorage.getItem("collection")
    ) || [];

  items =
    items.filter(item => item.id !== id);

  localStorage.setItem(
    "collection",
    JSON.stringify(items)
  );

  showToast("Component removed");

  renderCollection();

}

function copyCode(id,event){

  let items =
    JSON.parse(
      localStorage.getItem("collection")
    ) || [];

  let item =
    items.find(i => i.id === id);

  if(item){

    navigator.clipboard.writeText(
      item.content
    );

    event.target.innerHTML =
      '<i class="fa-solid fa-check"></i> Copied';

    showToast("Code copied successfully");

    setTimeout(() => {

      event.target.innerHTML =
        '<i class="fa-solid fa-copy"></i> Copy Code';

    },1500);

  }

}

function renderCollection(filter = ""){

  let items =
    JSON.parse(
      localStorage.getItem("collection")
    ) || [];

  const collection =
    document.getElementById("collection");

  document.getElementById(
    "totalItems"
  ).textContent = items.length;

  if(filter){

    items = items.filter(item =>
      item.title
      .toLowerCase()
      .includes(
        filter.toLowerCase()
      )
    );

  }

  if(items.length === 0){

    collection.innerHTML = `

      <div class="empty-state">

        <div class="empty-icon">
          ✨
        </div>

        <h2>
          Your collection is empty
        </h2>

        <p>
          Save beautiful UI components
          and build your personal design library.
        </p>

        <a
          href="footer.html"
          class="browse-btn"
        >
          <i class="fa-solid fa-compass"></i>
          Browse Components
        </a>

      </div>

    `;

    return;

  }

  let html =
    '<div class="collection-grid">';

  items.forEach(item => {

    const safeContent =
      (typeof sanitizeHTML === 'function')

      ? sanitizeHTML(item.content)

      : '';

    html += `

      <div class="collection-item">

        <div class="item-top">

          <h3>
            ${escapeHtml(item.title)}
          </h3>

          <div class="badge">
            Saved
          </div>

        </div>

        <div class="item-preview">

          ${safeContent}

        </div>

        <div class="item-actions">

          <button
            class="btn-copy"
            onclick="copyCode(${item.id},event)"
          >

            <i class="fa-solid fa-copy"></i>

            Copy Code

          </button>

          <button
            class="btn-remove"
            onclick="removeFromCollection(${item.id})"
          >

            <i class="fa-solid fa-trash"></i>

            Remove

          </button>

        </div>

      </div>

    `;

  });

  html += '</div>';

  collection.innerHTML = html;

}

document
  .getElementById("searchInput")
  .addEventListener("input",(e) => {

    renderCollection(e.target.value);

  });

renderCollection();

</script>

</body>
</html>
