<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Interface UI</title>
  <link rel="stylesheet" href="ui.css">
</head>
<body>

  <div class="chat-container">

    <div class="chat-header">
      Chat Interface
    </div>

    <div class="chat-box" id="chatBox">

      <div class="message received">
        Hello! How can I help you?
      </div>

      <div class="message sent">
        I need information about UI components.
      </div>

    </div>

    <div class="chat-input">

      <input type="text" id="messageInput" placeholder="Type a message...">

      <button id="sendBtn">Send</button>

    </div>

  </div>

  <script src="ui.js"></script>
</body>
</html>
