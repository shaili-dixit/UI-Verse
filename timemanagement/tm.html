<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Management Dashboard</title>
  <link rel="stylesheet" href="tm.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="dashboard">

    <aside class="sidebar">

      <h2>TimeFlow</h2>

      <ul>
        <li class="active">Dashboard</li>
        <li>Tasks</li>
        <li>Planner</li>
        <li>Statistics</li>
        <li>Settings</li>
      </ul>

    </aside>

    <main class="main-content">

      <div class="top-section">

        <div class="card productivity-card">
          <h3>Today's Productivity</h3>
          <h1>78%</h1>
        </div>

        <div class="card time-card">
          <h3>Focus Time</h3>
          <h2>5h 20m</h2>
        </div>

        <div class="card task-card">
          <h3>Tasks Completed</h3>
          <h2>12</h2>
        </div>

      </div>

      <div class="planner-section">

        <div class="planner-card">

          <h2>Daily Planner</h2>

          <div class="task-item">
            <span>09:00 AM</span>
            <p>Frontend Project Work</p>
          </div>

          <div class="task-item">
            <span>12:00 PM</span>
            <p>DSA Practice</p>
          </div>

          <div class="task-item">
            <span>03:00 PM</span>
            <p>Team Meeting</p>
          </div>

          <div class="task-item">
            <span>06:00 PM</span>
            <p>Workout Session</p>
          </div>

        </div>

        <div class="add-task-card">

          <h2>Add Task</h2>

          <input type="text" id="taskInput" placeholder="Enter task" data-a11y-remediation="label-needed">

          <button id="addBtn">
            Add Task
          </button>

          <div class="task-list" id="taskList"></div>

        </div>

      </div>

    </main>

  </div>

  <script src="tm.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
