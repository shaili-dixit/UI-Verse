<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Toggle</title>

  <link rel="stylesheet" href="mode.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <div class="toggle-container">

    <input type="checkbox" id="toggle">

    <label for="toggle" class="toggle-label">

      <span class="icon moon">
        <i class="fa-solid fa-moon"></i>
      </span>

      <span class="icon sun">
        <i class="fa-solid fa-sun"></i>
      </span>

      <span class="toggle-ball"></span>

    </label>

  </div>

</body>
</html>
