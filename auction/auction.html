<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Auction Platform UI</title>
  <link rel="stylesheet" href="auction.css">
</head>
<body>

  <div class="auction-container">

    <div class="auction-card">

      <img
        src="https://images.unsplash.com/photo-1511379938547-c1f69419868d"
        alt="Auction Item"
      >

      <div class="auction-content">

        <h1>Vintage Camera</h1>

        <p>
          Rare vintage camera available for live bidding.
        </p>

        <div class="details">

          <div>
            <span>Current Bid</span>
            <h2 id="bidAmount">₹12,000</h2>
          </div>

          <div>
            <span>Time Left</span>
            <h2 id="timer">01:00</h2>
          </div>

        </div>

        <div class="bid-section">

          <input
            type="number"
            id="bidInput"
            placeholder="Enter your bid"
          >

          <button id="bidBtn">
            Place Bid
          </button>

        </div>

        <div class="history-section">

          <h3>Bid History</h3>

          <div id="bidHistory">

            <div class="history-item">
              Rahul bid ₹11,500
            </div>

            <div class="history-item">
              Ankit bid ₹12,000
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="auction.js"></script>
</body>
</html>
