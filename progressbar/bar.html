<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bar Component</title>

  <link rel="stylesheet" href="bar.css">
</head>

<body>

  <div class="container">

    <div class="progress-box">
      <h3>HTML</h3>

      <div class="progress-bar">
        <div class="progress html">90%</div>
      </div>
    </div>

    <div class="progress-box">
      <h3>CSS</h3>

      <div class="progress-bar">
        <div class="progress css">80%</div>
      </div>
    </div>

    <div class="progress-box">
      <h3>JavaScript</h3>

      <div class="progress-bar">
        <div class="progress js">70%</div>
      </div>
    </div>

  </div>

</body>
</html>
