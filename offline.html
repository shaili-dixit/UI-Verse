<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes' sha256-Mb94LslJUmT8r5LCR4mQbZS+zBUbJx6lUZa9ipNCPSU=; script-src-attr 'unsafe-hashes' sha256-Mb94LslJUmT8r5LCR4mQbZS+zBUbJx6lUZa9ipNCPSU=; style-src 'self' https: 'unsafe-hashes' sha256-QYfHa0Xgtlftb//YaMA5mKdkYVxNeZKzRJamZaIFc7o=; style-src-attr 'unsafe-hashes' sha256-QYfHa0Xgtlftb//YaMA5mKdkYVxNeZKzRJamZaIFc7o=">

<title>Offline — UIverse</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --green:#22c55e;
  --bg1:#020617;
  --bg2:#0f172a;
  --card:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.12);
}

body{
  min-height:100vh;
  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;

  font-family:
    Inter,
    system-ui,
    sans-serif;

  background:
    radial-gradient(circle at top left,#1e293b,var(--bg1));

  color:white;
  position:relative;
}

/* Animated background blobs */

body::before,
body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(100px);
  opacity:.25;
  animation:blob 12s ease-in-out infinite;
}

body::before{
  background:var(--blue);
  top:-180px;
  left:-180px;
}

body::after{
  background:var(--purple);
  bottom:-180px;
  right:-180px;
  animation-delay:4s;
}

@keyframes blob{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(40px);
  }
}

/* Floating particles */

.particles{
  position:absolute;
  inset:0;
  overflow:hidden;
}

.particles span{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:rgba(255,255,255,.25);
  animation:particle 15s linear infinite;
}

.particles span:nth-child(1){
  left:10%;
  animation-delay:0s;
}

.particles span:nth-child(2){
  left:30%;
  animation-delay:2s;
}

.particles span:nth-child(3){
  left:50%;
  animation-delay:5s;
}

.particles span:nth-child(4){
  left:70%;
  animation-delay:7s;
}

.particles span:nth-child(5){
  left:90%;
  animation-delay:10s;
}

@keyframes particle{
  from{
    transform:translateY(100vh);
    opacity:0;
  }

  15%{
    opacity:1;
  }

  to{
    transform:translateY(-120px);
    opacity:0;
  }
}

/* Card */

.card{
  width:100%;
  max-width:560px;

  position:relative;
  z-index:10;

  padding:48px 36px;

  text-align:center;

  border-radius:32px;

  background:var(--card);

  backdrop-filter:blur(24px);

  border:1px solid var(--border);

  box-shadow:
    0 25px 60px rgba(0,0,0,.45);
}

.card::before{
  content:"";
  position:absolute;
  inset:0;

  border-radius:inherit;

  padding:1px;

  background:
    linear-gradient(
      135deg,
      rgba(59,130,246,.8),
      rgba(139,92,246,.8)
    );

  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

  -webkit-mask-composite:xor;

  mask-composite:exclude;
}

/* Icon */

.icon{
  width:100px;
  height:100px;

  margin:0 auto 24px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      var(--blue),
      var(--purple)
    );

  position:relative;

  box-shadow:
    0 10px 40px rgba(59,130,246,.4);
}

.icon::before,
.icon::after{
  content:"";
  position:absolute;
  inset:-10px;

  border-radius:50%;

  border:2px solid rgba(59,130,246,.3);

  animation:ping 3s infinite;
}

.icon::after{
  animation-delay:1.5s;
}

@keyframes ping{
  from{
    transform:scale(.9);
    opacity:1;
  }

  to{
    transform:scale(1.6);
    opacity:0;
  }
}

.icon svg{
  width:48px;
  height:48px;
}

/* Signal bars */

.signal-bars{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:6px;
  margin-bottom:24px;
}

.signal-bars span{
  width:8px;
  border-radius:999px;
}

.signal-bars span:nth-child(1){
  height:12px;
  background:var(--green);
}

.signal-bars span:nth-child(2){
  height:20px;
  background:var(--green);
}

.signal-bars span:nth-child(3){
  height:28px;
  background:var(--green);
}

.signal-bars span:nth-child(4){
  height:36px;
  background:#ef4444;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  50%{
    opacity:.3;
  }
}

h1{
  font-size:2.5rem;
  line-height:1.1;
  margin-bottom:18px;
  font-weight:800;
}

h1 span{
  display:block;

  background:
    linear-gradient(
      135deg,
      #60a5fa,
      #a78bfa
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  color:rgba(255,255,255,.8);
  line-height:1.8;
  margin-bottom:14px;
}

.offline-note{
  display:inline-flex;
  align-items:center;
  gap:10px;

  padding:12px 18px;
  margin-top:12px;

  border-radius:999px;

  background:rgba(255,255,255,.08);

  border:1px solid rgba(255,255,255,.08);

  color:#cbd5e1;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;

  background:var(--green);

  box-shadow:
    0 0 12px var(--green);
}

.reload-btn{
  margin-top:28px;

  border:none;

  cursor:pointer;

  color:white;

  font-size:1rem;
  font-weight:700;

  padding:14px 28px;

  border-radius:14px;

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #7c3aed
    );

  transition:
    transform .25s ease,
    box-shadow .25s ease;
}

.reload-btn:hover{
  transform:translateY(-3px);

  box-shadow:
    0 10px 30px rgba(59,130,246,.35);
}

.reload-btn:active{
  transform:scale(.98);
}

.status{
  margin-top:18px;
  font-size:.95rem;
  color:#94a3b8;
}

@media (max-width:600px){

  .card{
    padding:36px 24px;
  }

  h1{
    font-size:2rem;
  }

  p{
    font-size:.95rem;
  }
}
</style>
</head>

<body>

<div class="particles">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<main class="card">

  <div class="icon">

    <svg
      fill="none"
      stroke="white"
      stroke-width="1.8"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M2.25 12.75l2.25 2.25m0 0L6.75 12.75m-2.25 2.25V9a6 6 0 0111.456-2.472M21.75 11.25L19.5 9m0 0l-2.25 2.25M19.5 9v6a6 6 0 01-11.456 2.472"
      />
    </svg>

  </div>

  <div class="signal-bars">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <h1>
    Offline,
    <span>but not unavailable</span>
  </h1>

  <p>
    No internet connection detected.
    Cached content and essential resources
    remain available while offline.
  </p>

  <p>
    As soon as a connection is restored,
    UIverse can automatically reload and
    synchronize the latest content.
  </p>

  <div
    class="offline-note"
    id="statusBadge"
  >
    <span class="dot"></span>
    Offline mode active
  </div>

  <br>

  <button
    class="reload-btn"
    id="reloadBtn"
    type="button"
  >
    Reload Page
  </button>

  <div
    class="status"
    id="networkStatus"
  >
    Waiting for connection...
  </div>

</main>

<script>
const reloadBtn =
  document.getElementById("reloadBtn");

const badge =
  document.getElementById("statusBadge");

const statusText =
  document.getElementById("networkStatus");

reloadBtn.addEventListener(
  "click",
  () => location.reload()
);

window.addEventListener(
  "online",
  () => {
    badge.innerHTML =
      "<span class='dot'></span> Connection restored";

    statusText.textContent =
      "Network available. Reloading...";

    setTimeout(
      () => location.reload(),
      1500
    );
  }
);

window.addEventListener(
  "offline",
  () => {
    badge.innerHTML =
      "<span class='dot'></span> Offline mode active";

    statusText.textContent =
      "Waiting for internet connection...";
  }
);
</script>

</body>
</html>
