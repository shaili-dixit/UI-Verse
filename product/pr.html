<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Product Card</title>
  <link rel="stylesheet" href="pr.css"/>
</head>

<body>

  <div class="bg-glow"></div>

  <div class="container">
    <div class="product-card" id="card">

      <span class="badge">🔥 20% OFF</span>

      <div class="product-image">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80" />
      </div>

      <div class="product-details">

        <div class="top-row">
          <h2>Air Runner X</h2>
          <div class="rating">⭐ 4.8 <span>(2.1k)</span></div>
        </div>

        <p>
          Ultra-lightweight running sneakers engineered for speed, comfort, and daily performance.
        </p>

        <div class="price-row">
          <div class="price">$129</div>
          <div class="old-price">$159</div>
        </div>

        <button>Buy Now</button>

      </div>

    </div>
  </div>

  <script src="pr.js"></script>
</body>
</html>
