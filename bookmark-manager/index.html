<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Manager</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      min-height: 100vh;
      padding: 30px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    h2 {
      margin-bottom: 15px;
      font-size: 1.2rem;
      color: #e2e8f0;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    /* Bookmark Cards */
    .bookmark {
      background: rgba(255,255,255,0.10);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s;
    }

    .bookmark:hover {
      background: rgba(255,255,255,0.18);
    }

    .bookmark a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
    }

    .tag {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 8px;
      background: #334155;
      color: #cbd5e1;
      margin-left: 10px;
    }
  </style>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


<header>
  <h1>🔖 Bookmark Manager</h1>
</header>

<main class="container">

  <!-- Add Bookmark -->
  <section class="card">
    <h2>Add Bookmark</h2>

    <form id="bookmarkForm">
      <input type="text" id="siteName" placeholder="Website Name" required data-a11y-remediation="label-needed">
      <input type="url" id="siteURL" placeholder="https://example.com" required>

      <select id="category">
  <option>Development</option>
  <option>Frontend</option>
  <option>Backend</option>
  <option>DevOps</option>
  <option>Design</option>
  <option>UI/UX</option>
  <option>Education</option>
  <option>AI / ML</option>
  <option>Entertainment</option>
  <option>Productivity</option>
</select>

      <button type="submit">Add Bookmark</button>
    </form>
  </section>

  <!-- Search -->
  <section class="card">
    <h2>Search Bookmarks</h2>
    <input type="text" id="searchInput" placeholder="Search bookmarks...">
  </section>

  <!-- Bookmark List -->
  <section class="card">
    <h2>Saved Bookmarks</h2>
    <div id="bookmarkList"></div>
  </section>

</main>

      <script src="../dist/shared.js"></script>
</body>
</html>
