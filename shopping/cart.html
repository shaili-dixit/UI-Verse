<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart UI</title>
  <link rel="stylesheet" href="cart.css">
</head>
<body>

  <div class="cart-container">

    <h1>Shopping Cart</h1>

    <div class="cart-item">

      <div class="product-image">
        IMAGE
      </div>

      <div class="product-details">
        <h3>Running Shoes</h3>
        <p>$50</p>
      </div>

      <div class="quantity-controls">

        <button class="minus">-</button>

        <span class="quantity">1</span>

        <button class="plus">+</button>

      </div>

      <button class="remove-btn">Remove</button>

    </div>

    <div class="cart-item">

      <div class="product-image">
        IMAGE
      </div>

      <div class="product-details">
        <h3>Headphones</h3>
        <p>$80</p>
      </div>

      <div class="quantity-controls">

        <button class="minus">-</button>

        <span class="quantity">1</span>

        <button class="plus">+</button>

      </div>

      <button class="remove-btn">Remove</button>

    </div>

    <div class="total-section">
      Total: $<span id="totalPrice">130</span>
    </div>

  </div>

  <script src="cart.js"></script>
</body>
</html>
