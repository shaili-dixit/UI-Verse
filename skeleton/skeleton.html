<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Modern Skeleton Loading UI</title>

  <meta name="description"
        content="Animated skeleton loading cards with shimmer effects and accessibility support.">

  <link rel="stylesheet" href="skeleton.css">
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content">

    <section
      class="skeleton-section"
      aria-labelledby="loading-heading">

      <h1 id="loading-heading" class="visually-hidden">
        Loading content
      </h1>

      <div
        class="loading-status visually-hidden"
        role="status"
        aria-live="polite">
        Content is loading.
      </div>

      <div class="skeleton-container">

        <!-- Card 1 -->
        <article class="skeleton-card" aria-hidden="true">
          <div class="skeleton image"></div>

          <div class="card-content">
            <div class="skeleton badge"></div>

            <div class="skeleton title"></div>

            <div class="skeleton text"></div>
            <div class="skeleton text"></div>
            <div class="skeleton text short"></div>

            <div class="skeleton footer">
              <div class="skeleton avatar"></div>
              <div class="skeleton author"></div>
            </div>
          </div>
        </article>

        <!-- Card 2 -->
        <article class="skeleton-card" aria-hidden="true">
          <div class="skeleton image"></div>

          <div class="card-content">
            <div class="skeleton badge"></div>

            <div class="skeleton title"></div>

            <div class="skeleton text"></div>
            <div class="skeleton text"></div>
            <div class="skeleton text short"></div>

            <div class="skeleton footer">
              <div class="skeleton avatar"></div>
              <div class="skeleton author"></div>
            </div>
          </div>
        </article>

        <!-- Card 3 -->
        <article class="skeleton-card" aria-hidden="true">
          <div class="skeleton image"></div>

          <div class="card-content">
            <div class="skeleton badge"></div>

            <div class="skeleton title"></div>

            <div class="skeleton text"></div>
            <div class="skeleton text"></div>
            <div class="skeleton text short"></div>

            <div class="skeleton footer">
              <div class="skeleton avatar"></div>
              <div class="skeleton author"></div>
            </div>
          </div>
        </article>

      </div>

    </section>

  </main>

  <script src="../dist/shared.js"></script>
</body>
</html>
