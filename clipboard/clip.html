<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipboard Manager UI</title>
  <link rel="stylesheet" href="clip.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="clipboard-container">

    <h1>Clipboard Manager</h1>

    <div class="input-section">

      <input
        type="text"
        id="clipboardInput"
        placeholder="Enter text to save..."
       data-a11y-remediation="label-needed">

      <button id="saveBtn">
        Save
      </button>

    </div>

    <div class="clipboard-list" id="clipboardList">

      <div class="clipboard-card">

        <p>
          Example clipboard text
        </p>

        <div class="card-buttons">

          <button class="copy-btn">
            Copy
          </button>

          <button class="delete-btn">
            Delete
          </button>

        </div>

      </div>

    </div>

  </div>
  

  <script src="clip.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
