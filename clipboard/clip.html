<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes' sha256-W2jDuT+a4hej8eOy1PmIzaPl4HmzD4fVOYYbboMDBJc=; style-src-attr 'unsafe-hashes' sha256-W2jDuT+a4hej8eOy1PmIzaPl4HmzD4fVOYYbboMDBJc=">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipboard Manager UI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        radial-gradient(circle at top left,#6d5dfc 0%,transparent 35%),
        radial-gradient(circle at bottom right,#00c2ff 0%,transparent 30%),
        #0f172a;
      padding:30px;
      color:#fff;
    }

    .clipboard-container{
      width:100%;
      max-width:850px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:28px;
      padding:32px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:28px;
      flex-wrap:wrap;
    }

    .title-area h1{
      font-size:2.2rem;
      font-weight:700;
      margin-bottom:8px;
    }

    .title-area p{
      color:#cbd5e1;
      font-size:0.95rem;
    }

    .stats{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .stat-card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
      padding:14px 18px;
      border-radius:18px;
      min-width:120px;
    }

    .stat-card h2{
      font-size:1.5rem;
      margin-bottom:4px;
    }

    .stat-card span{
      font-size:0.82rem;
      color:#cbd5e1;
    }

    .input-section{
      display:flex;
      gap:14px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }

    .input-wrapper{
      flex:1;
      position:relative;
    }

    .input-wrapper input{
      width:100%;
      padding:18px 20px;
      border:none;
      outline:none;
      border-radius:18px;
      background:rgba(255,255,255,0.1);
      color:#fff;
      font-size:1rem;
      border:1px solid transparent;
      transition:0.3s;
    }

    .input-wrapper input:focus{
      border-color:#60a5fa;
      background:rgba(255,255,255,0.14);
      box-shadow:0 0 0 4px rgba(96,165,250,0.2);
    }

    .input-wrapper input::placeholder{
      color:#94a3b8;
    }

    #saveBtn{
      border:none;
      outline:none;
      padding:16px 26px;
      border-radius:18px;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      color:#fff;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 10px 30px rgba(59,130,246,0.35);
    }

    #saveBtn:hover{
      transform:translateY(-3px);
      box-shadow:0 16px 35px rgba(59,130,246,0.45);
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:15px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }

    .search-box{
      flex:1;
      min-width:240px;
    }

    .search-box input{
      width:100%;
      padding:14px 18px;
      border:none;
      outline:none;
      border-radius:16px;
      background:rgba(255,255,255,0.08);
      color:#fff;
      font-size:0.95rem;
    }

    .search-box input::placeholder{
      color:#94a3b8;
    }

    .clear-btn{
      padding:13px 18px;
      border:none;
      border-radius:14px;
      background:rgba(239,68,68,0.18);
      color:#fca5a5;
      cursor:pointer;
      font-weight:600;
      transition:0.3s;
    }

    .clear-btn:hover{
      background:rgba(239,68,68,0.28);
    }

    .clipboard-list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
    }

    .clipboard-card{
      position:relative;
      padding:22px;
      border-radius:22px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
      transition:0.3s;
      overflow:hidden;
    }

    .clipboard-card:hover{
      transform:translateY(-5px);
      background:rgba(255,255,255,0.12);
      box-shadow:0 16px 30px rgba(0,0,0,0.25);
    }

    .clipboard-card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:4px;
      background:linear-gradient(90deg,#3b82f6,#8b5cf6,#06b6d4);
    }

    .clipboard-card p{
      line-height:1.7;
      color:#e2e8f0;
      margin-bottom:18px;
      word-break:break-word;
    }

    .card-footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .time{
      font-size:0.8rem;
      color:#94a3b8;
    }

    .card-buttons{
      display:flex;
      gap:10px;
    }

    .copy-btn,
    .delete-btn{
      border:none;
      outline:none;
      padding:10px 16px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
      transition:0.3s;
    }

    .copy-btn{
      background:rgba(59,130,246,0.18);
      color:#93c5fd;
    }

    .copy-btn:hover{
      background:rgba(59,130,246,0.32);
    }

    .delete-btn{
      background:rgba(239,68,68,0.18);
      color:#fca5a5;
    }

    .delete-btn:hover{
      background:rgba(239,68,68,0.3);
    }

    .empty-state{
      text-align:center;
      padding:50px 20px;
      color:#cbd5e1;
      border:2px dashed rgba(255,255,255,0.1);
      border-radius:22px;
    }

    @media(max-width:700px){

      .clipboard-container{
        padding:24px;
      }

      .top-bar{
        flex-direction:column;
        align-items:flex-start;
      }

      .input-section{
        flex-direction:column;
      }

      #saveBtn{
        width:100%;
      }

    }

  </style>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <div class="clipboard-container">

    <div class="top-bar">

      <div class="title-area">
        <h1>📋 Clipboard Manager</h1>
        <p>Save, copy, search and manage your snippets easily.</p>
      </div>

      <div class="stats">

        <div class="stat-card">
          <h2 id="totalCount">1</h2>
          <span>Total Saved</span>
        </div>

        <div class="stat-card">
          <h2>∞</h2>
          <span>Quick Access</span>
        </div>

      </div>

    </div>

    <div class="input-section">

      <div class="input-wrapper">

        <input
          type="text"
          id="clipboardInput"
          placeholder="Type or paste anything here..."
        />

      </div>
      <input
        type="text"
        id="clipboardInput"
        placeholder="Enter text to save..."
       data-a11y-remediation="label-needed">

      <button id="saveBtn">
        + Save Note
      </button>

    </div>

    <div class="toolbar">

      <div class="search-box">

        <input
          type="text"
          id="searchInput"
          placeholder="Search clipboard items..."
        />

      </div>

      <button class="clear-btn" id="clearAllBtn">
        Clear All
      </button>

    </div>

    <div class="clipboard-list" id="clipboardList">

      <div class="clipboard-card">

        <p>
          Example clipboard text with a beautiful modern UI design.
        </p>

        <div class="card-footer">

          <span class="time">
            Just now
          </span>

          <div class="card-buttons">

            <button class="copy-btn">
              Copy
            </button>

            <button class="delete-btn">
              Delete
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="clip.js"></script>
      <script src="../dist/shared.js"></script>
</body>
</html>
