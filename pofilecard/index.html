<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Flip Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card-container">
    <div class="profile-card">

      <div class="card-front">
        <img src="https://i.pravatar.cc/200" alt="Profile Image">
        <h2>Alex Johnson</h2>
        <p>Frontend Developer</p>
      </div>

      <div class="card-back">
        <h2>About Me</h2>
        <p>
          Passionate developer who loves creating modern and interactive web experiences.
        </p>

        <div class="social-icons">
          <a href="#">🌐</a>
          <a href="#">🐦</a>
          <a href="#">💼</a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
