<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Form UI</title>
  <link rel="stylesheet" href="form.css">
</head>
<body>

  <div class="form-container">

    <div class="progress-bar">

      <div class="step active">1</div>
      <div class="step">2</div>
      <div class="step">3</div>

    </div>

    <form id="multiStepForm">

      <div class="form-step active">

        <h2>Personal Info</h2>

        <input type="text" placeholder="Full Name">

        <input type="email" placeholder="Email Address">

      </div>

      <div class="form-step">

        <h2>Address Info</h2>

        <input type="text" placeholder="City">

        <input type="text" placeholder="Country">

      </div>

      <div class="form-step">

        <h2>Account Setup</h2>

        <input type="password" placeholder="Password">

        <input type="password" placeholder="Confirm Password">

      </div>

      <div class="buttons">

        <button type="button" id="prevBtn">Previous</button>

        <button type="button" id="nextBtn">Next</button>

      </div>

    </form>

  </div>

  <script src="form.js"></script>
</body>
</html>
