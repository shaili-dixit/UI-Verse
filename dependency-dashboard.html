<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="dist/shared.css">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes' sha256-nCHzN9ffvHZE4IvGxBCHudSEH4QA/u3An58DpuzP81Y=; script-src-attr 'unsafe-hashes' sha256-nCHzN9ffvHZE4IvGxBCHudSEH4QA/u3An58DpuzP81Y=; style-src 'self' https: 'unsafe-hashes' sha256-+yTrqiyYMGYs1fOSfRbbQvYbMePB0OrKV0icFMoyBFI= sha256-L9VmKmbglQ6QMnT0NS+ITkUhMstvYcLQAvl1VvJLAlU= sha256-Uh7r210jez63d4cj1yL5rYjmm/HMR7lstLoUwmGG7io= sha256-ZBTj5RHLnrF+IxdRZM2RuLfjTJQXNSi7fLQHr09onfY= sha256-biLFinpqYMtWHmXfkA1BPeCY0/fNt46SAZ+BBk5YUog=; style-src-attr 'unsafe-hashes' sha256-+yTrqiyYMGYs1fOSfRbbQvYbMePB0OrKV0icFMoyBFI= sha256-L9VmKmbglQ6QMnT0NS+ITkUhMstvYcLQAvl1VvJLAlU= sha256-Uh7r210jez63d4cj1yL5rYjmm/HMR7lstLoUwmGG7io= sha256-ZBTj5RHLnrF+IxdRZM2RuLfjTJQXNSi7fLQHr09onfY= sha256-biLFinpqYMtWHmXfkA1BPeCY0/fNt46SAZ+BBk5YUog=">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Dependency Visualizer — UIverse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Layout */
    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #1a1a2e;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #2a2a4a;
    }
    .sidebar-header h1 {
      font-size: 18px;
      color: #fff;
      margin-bottom: 4px;
    }
    .sidebar-header p {
      font-size: 12px;
      color: #888;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #2a2a4a;
    }
    .stat {
      background: #252545;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    .stat .value {
      font-size: 22px;
      font-weight: bold;
      color: #fff;
    }
    .stat .label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .stat.warn .value { color: #ff7675; }

    /* Search */
    .search-box {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: #252545;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .search-box input:focus { border-color: #6c5ce7; }

    /* Filters */
    .filters {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }
    .filters h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .filter-chip {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid #2a2a4a;
      background: #252545;
      color: #aaa;
      transition: all 0.2s;
      user-select: none;
    }
    .filter-chip.active {
      background: #6c5ce7;
      color: #fff;
      border-color: #6c5ce7;
    }
    .filter-chip:hover:not(.active) {
      border-color: #444;
      color: #fff;
    }

    /* Legend */
    .legend {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }
    .legend h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 6px;
      color: #aaa;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-line {
      width: 20px;
      height: 2px;
      flex-shrink: 0;
    }

    /* Node info panel */
    .node-info {
      padding: 16px;
      border-bottom: 1px solid #2a2a4a;
      min-height: 120px;
    }
    .node-info h3 {
      font-size: 14px;
      color: #fff;
      margin-bottom: 8px;
    }
    .node-info .meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .node-info .dep-list {
      margin-top: 8px;
      max-height: 120px;
      overflow-y: auto;
    }
    .node-info .dep-list-item {
      font-size: 11px;
      padding: 4px 8px;
      background: #252545;
      border-radius: 4px;
      margin-bottom: 4px;
      color: #aaa;
      cursor: pointer;
    }
    .node-info .dep-list-item:hover {
      background: #2a2a4a;
      color: #fff;
    }

    /* Actions */
    .actions {
      padding: 16px;
      margin-top: auto;
      border-top: 1px solid #2a2a4a;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    .btn-primary {
      background: #6c5ce7;
      color: #fff;
    }
    .btn-secondary {
      background: #252545;
      color: #aaa;
      border: 1px solid #2a2a4a;
    }
    .btn:hover { opacity: 0.85; }

    /* Graph canvas */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0f0f1a;
      cursor: grab;
    }
    .canvas-wrap:active { cursor: grabbing; }
    .canvas-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      max-width: 240px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .tooltip.visible { opacity: 1; }

    /* Zoom controls */
    .zoom-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .zoom-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .zoom-btn:hover { background: #2a2a4a; }

    /* Loading */
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 50;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a4a;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Orphan warning banner */
    .orphan-banner {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff767522;
      border: 1px solid #ff767544;
      color: #ff7675;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
      z-index: 40;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>🔮 Dependency Visualizer</h1>
        <p>Interactive component dependency graph</p>
      </div>

      <div class="stats" id="stats"></div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search component..." autocomplete="off">
      </div>

      <div class="filters">
        <h3>Filter by Type</h3>
        <div class="filter-group" id="typeFilters">
          <span class="filter-chip active" data-type="all">All</span>
          <span class="filter-chip" data-type="shared-css">Shared CSS</span>
          <span class="filter-chip" data-type="shared-js">Shared JS</span>
          <span class="filter-chip" data-type="css">CSS</span>
          <span class="filter-chip" data-type="js">JS</span>
        </div>
        <h3>Categories</h3>
        <div class="filter-group" id="catFilters"></div>
      </div>

      <div class="legend">
        <h3>Legend</h3>
        <div class="legend-item"><span class="legend-dot" style="background:#eb6835"></span> Component</div>
        <div class="legend-item"><span class="legend-dot" style="background:#b2bec3"></span> Resource</div>
        <div class="legend-item"><span class="legend-line" style="background:#eb6835"></span> Shared CSS</div>
        <div class="legend-item"><span class="legend-line" style="background:#6c5ce7"></span> Shared JS</div>
        <div class="legend-item"><span class="legend-line" style="background:#00b894"></span> CSS</div>
        <div class="legend-item"><span class="legend-line" style="background:#0984e3"></span> JS</div>
      </div>

      <div class="node-info" id="nodeInfo">
        <p style="color:#666; font-size:12px;">Click a node to inspect dependencies</p>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="exportSVG()">⬇ Export SVG</button>
        <button class="btn btn-secondary" onclick="resetView()">⟲ Reset View</button>
        <button class="btn btn-secondary" onclick="highlightOrphans()">⚠ Orphans</button>
        <button class="btn btn-secondary" onclick="highlightCircular()">↻ Circular</button>
      </div>
    </aside>

    <!-- Canvas -->
    <div class="canvas-wrap" id="canvasWrap">
      <div class="loading" id="loading"><div class="loading-spinner"></div></div>
      <div class="orphan-banner" id="orphanBanner">⚠ Showing orphaned components only</div>
      <svg id="graphSvg" xmlns="http://www.w3.org/2000/svg">
        <g id="viewport">
          <g id="edgesLayer"></g>
          <g id="nodesLayer"></g>
          <g id="labelsLayer"></g>
        </g>
      </svg>
      <div class="tooltip" id="tooltip"></div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">+</button>
        <button class="zoom-btn" onclick="zoomOut()">−</button>
        <button class="zoom-btn" onclick="fitGraph()">⌂</button>
      </div>
    </div>
  </div>

  <script>
    /* ---------- State ---------- */
    let graphData = null;
    let nodes = [];
    let edges = [];
    let transform = { x: 0, y: 0, k: 1 };
    let dragging = null;
    let dragOffset = { x: 0, y: 0 };
    let selectedNode = null;
    let activeTypeFilter = 'all';
    let activeCatFilter = 'all';
    let simulating = false;

    const svg = document.getElementById('graphSvg');
    const viewport = document.getElementById('viewport');
    const edgesLayer = document.getElementById('edgesLayer');
    const nodesLayer = document.getElementById('nodesLayer');
    const labelsLayer = document.getElementById('labelsLayer');
    const tooltip = document.getElementById('tooltip');
    const canvasWrap = document.getElementById('canvasWrap');

    /* ---------- Load Data ---------- */
    async function loadData() {
      try {
        const res = await fetch('./reports/dependencies/graph-data.json');
        if (!res.ok) throw new Error('graph-data.json not found');
        graphData = await res.json();
        initGraph();
      } catch (e) {
        // Fallback: try to generate from analysis-report.json inline
        try {
          const res2 = await fetch('./reports/dependencies/analysis-report.json');
          if (!res2.ok) throw new Error('No dependency data found. Run: npm run dependencies:analyze');
          const report = await res2.json();
          graphData = buildGraphDataFromReport(report);
          initGraph();
        } catch (e2) {
          document.getElementById('loading').innerHTML = `<p style="color:#ff7675">Error: ${e2.message}</p>`;
        }
      }
    }

    function buildGraphDataFromReport(report) {
      const categoryColors = {
        authentication:'#eb6835', buttons:'#6c5ce7', cards:'#00b894', commerce:'#fdcb6e',
        dashboards:'#74b9ff', 'data-display':'#a29bfe', feedback:'#ff7675',
        forms:'#fab1a0', layout:'#55efc4', navigation:'#0984e3', other:'#636e72', resource:'#b2bec3'
      };
      const nodes = report.nodes.map(n => {
        const detail = n.type === 'component'
          ? report.componentDetails.find(c => c.id === n.id)
          : report.resourceDetails.find(r => r.id === n.id);
        const depCount = detail ? (detail.directDeps || []).length : 0;
        const dependentCount = detail ? (detail.dependents || []).length : 0;
        return {
          id: n.id, label: n.title || n.id.split('/').pop(), type: n.type, category: n.category,
          color: categoryColors[n.category] || categoryColors.other,
          radius: n.type === 'component' ? 8 + Math.min(depCount * 2, 16) : 5 + Math.min(dependentCount, 10),
          x: Math.random() * 800, y: Math.random() * 600,
          isOrphan: report.orphans.includes(n.id),
          inCycle: report.circularDependencies.some(c => c.files.includes(n.id)),
          depCount, dependentCount
        };
      });
      const edges = report.edges.map((e, i) => ({
        id: `e${i}`, source: e.source, target: e.target, type: e.type,
        color: e.type === 'shared-css' ? '#eb6835' : e.type === 'shared-js' ? '#6c5ce7'
          : e.type === 'css' ? '#00b894' : e.type === 'js' ? '#0984e3' : '#b2bec3'
      }));
      return { meta: report.summary, nodes, edges, orphans: report.orphans, circularCycles: report.circularDependencies.map(c => c.files) };
    }

    /* ---------- Force Layout ---------- */
    function runForceLayout() {
      const width = 1200, height = 800;
      const k = Math.sqrt((width * height) / nodes.length);
      const iterations = 300;

      // Initialize positions
      nodes.forEach((n, i) => {
        if (!n.x) n.x = width / 2 + (Math.random() - 0.5) * 200;
        if (!n.y) n.y = height / 2 + (Math.random() - 0.5) * 200;
        n.vx = 0; n.vy = 0;
      });

      for (let iter = 0; iter < iterations; iter++) {
        // Repulsion
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            let dx = a.x - b.x, dy = a.y - b.y;
            let dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const force = (k * k) / dist;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            a.vx += fx; a.vy += fy;
            b.vx -= fx; b.vy -= fy;
          }
        }

        // Attraction (edges)
        for (const e of edges) {
          const a = nodes.find(n => n.id === e.source);
          const b = nodes.find(n => n.id === e.target);
          if (!a || !b) continue;
          let dx = b.x - a.x, dy = b.y - a.y;
          let dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const force = (dist * dist) / k;
          const fx = (dx / dist) * force * 0.05;
          const fy = (dy / dist) * force * 0.05;
          a.vx += fx; a.vy += fy;
          b.vx -= fx; b.vy -= fy;
        }

        // Center gravity
        for (const n of nodes) {
          n.vx += (width / 2 - n.x) * 0.01;
          n.vy += (height / 2 - n.y) * 0.01;
        }

        // Apply velocity
        for (const n of nodes) {
          n.vx *= 0.5; n.vy *= 0.5;
          n.x += n.vx; n.y += n.vy;
        }
      }

      // Center and scale
      const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const graphW = maxX - minX, graphH = maxY - minY;
      const pad = 60;
      const scale = Math.min((canvasWrap.clientWidth - pad * 2) / graphW, (canvasWrap.clientHeight - pad * 2) / graphH);
      transform.k = scale;
      transform.x = (canvasWrap.clientWidth - graphW * scale) / 2 - minX * scale;
      transform.y = (canvasWrap.clientHeight - graphH * scale) / 2 - minY * scale;
    }

    /* ---------- Rendering ---------- */
    function initGraph() {
      nodes = graphData.nodes;
      edges = graphData.edges;
      runForceLayout();
      renderStats();
      renderCategoryFilters();
      render();
      setupInteractions();
      document.getElementById('loading').style.display = 'none';
    }

    function render() {
      // Filter
      const visibleNodes = new Set();
      const visibleEdges = [];

      for (const n of nodes) {
        let show = true;
        if (activeTypeFilter !== 'all') {
          const hasEdge = edges.some(e => e.source === n.id && e.type === activeTypeFilter);
          show = show && hasEdge;
        }
        if (activeCatFilter !== 'all') {
          show = show && n.category === activeCatFilter;
        }
        if (show) visibleNodes.add(n.id);
      }

      for (const e of edges) {
        if (visibleNodes.has(e.source) && visibleNodes.has(e.target)) {
          if (activeTypeFilter === 'all' || e.type === activeTypeFilter) {
            visibleEdges.push(e);
          }
        }
      }

      // Edges
      edgesLayer.innerHTML = visibleEdges.map(e => {
        const a = nodes.find(n => n.id === e.source);
        const b = nodes.find(n => n.id === e.target);
        if (!a || !b) return '';
        const isHighlighted = selectedNode && (e.source === selectedNode || e.target === selectedNode);
        const opacity = selectedNode ? (isHighlighted ? 1 : 0.15) : 0.4;
        const width = isHighlighted ? 2.5 : 1;
        return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${e.color}" stroke-width="${width}" stroke-opacity="${opacity}" data-edge="${e.id}" />`;
      }).join('');

      // Nodes
      nodesLayer.innerHTML = [...visibleNodes].map(id => {
        const n = nodes.find(x => x.id === id);
        const isSelected = selectedNode === id;
        const isConnected = selectedNode && edges.some(e => (e.source === selectedNode && e.target === id) || (e.target === selectedNode && e.source === id));
        const opacity = selectedNode ? (isSelected || isConnected ? 1 : 0.25) : 1;
        const r = isSelected ? n.radius * 1.4 : n.radius;
        const stroke = isSelected ? '#fff' : (n.isOrphan ? '#ff7675' : 'none');
        const strokeWidth = isSelected ? 3 : (n.isOrphan ? 2 : 0);
        return `<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${n.color}" fill-opacity="${opacity}" stroke="${stroke}" stroke-width="${strokeWidth}" data-node="${n.id}" style="cursor:pointer" />`;
      }).join('');

      // Labels (only for components or selected nodes)
      labelsLayer.innerHTML = [...visibleNodes].map(id => {
        const n = nodes.find(x => x.id === id);
        if (n.type !== 'component' && selectedNode !== id) return '';
        const isSelected = selectedNode === id;
        const isConnected = selectedNode && edges.some(e => (e.source === selectedNode && e.target === id) || (e.target === selectedNode && e.source === id));
        const opacity = selectedNode ? (isSelected || isConnected ? 1 : 0) : (n.type === 'component' ? 0.85 : 0);
        if (opacity === 0) return '';
        return `<text x="${n.x}" y="${n.y + n.radius + 14}" text-anchor="middle" fill="#e0e0e0" font-size="10" font-family="sans-serif" opacity="${opacity}" pointer-events="none">${n.label}</text>`;
      }).join('');

      updateTransform();
    }

    function updateTransform() {
      viewport.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
    }

    /* ---------- Stats ---------- */
    function renderStats() {
      const m = graphData.meta;
      const el = document.getElementById('stats');
      el.innerHTML = `
        <div class="stat"><div class="value">${m.componentCount}</div><div class="label">Components</div></div>
        <div class="stat"><div class="value">${m.resourceCount}</div><div class="label">Resources</div></div>
        <div class="stat"><div class="value">${m.totalEdges}</div><div class="label">Edges</div></div>
        <div class="stat ${m.circularCount ? 'warn' : ''}"><div class="value">${m.circularCount}</div><div class="label">Circular</div></div>
      `;
    }

    function renderCategoryFilters() {
      const cats = [...new Set(nodes.map(n => n.category))].sort();
      const el = document.getElementById('catFilters');
      el.innerHTML = `<span class="filter-chip active" data-cat="all">All</span>` +
        cats.map(c => `<span class="filter-chip" data-cat="${c}">${c}</span>`).join('');
      el.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          el.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeCatFilter = chip.dataset.cat;
          render();
        });
      });
    }

    /* ---------- Interactions ---------- */
    function setupInteractions() {
      // Type filters
      document.getElementById('typeFilters').querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.getElementById('typeFilters').querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeTypeFilter = chip.dataset.type;
          render();
        });
      });

      // Search
      document.getElementById('searchInput').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        if (!q) { selectedNode = null; render(); return; }
        const match = nodes.find(n => n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q));
        if (match) {
          selectedNode = match.id;
          // Center on node
          transform.x = canvasWrap.clientWidth / 2 - match.x * transform.k;
          transform.y = canvasWrap.clientHeight / 2 - match.y * transform.k;
          render();
        }
      });

      // Pan / zoom
      let panning = false, panStart = { x: 0, y: 0 };
      canvasWrap.addEventListener('mousedown', e => {
        if (e.target.tagName === 'circle') return;
        panning = true;
        panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
      });
      window.addEventListener('mousemove', e => {
        if (panning) {
          transform.x = e.clientX - panStart.x;
          transform.y = e.clientY - panStart.y;
          updateTransform();
        }
        if (dragging) {
          const rect = svg.getBoundingClientRect();
          const mx = (e.clientX - rect.left - transform.x) / transform.k;
          const my = (e.clientY - rect.top - transform.y) / transform.k;
          dragging.x = mx - dragOffset.x;
          dragging.y = my - dragOffset.y;
          render();
        }
        // Tooltip
        if (e.target.tagName === 'circle') {
          const id = e.target.dataset.node;
          const n = nodes.find(x => x.id === id);
          tooltip.innerHTML = `<strong>${n.label}</strong><br><span style="color:#888">${n.category}</span><br>Deps: ${n.depCount} | Used by: ${n.dependentCount}`;
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY + 12) + 'px';
          tooltip.classList.add('visible');
        } else {
          tooltip.classList.remove('visible');
        }
      });
      window.addEventListener('mouseup', () => { panning = false; dragging = null; });

      canvasWrap.addEventListener('wheel', e => {
        e.preventDefault();
        const zoomIntensity = 0.1;
        const direction = e.deltaY < 0 ? 1 : -1;
        const factor = 1 + (zoomIntensity * direction);
        const rect = svg.getBoundingClientRect();
        const mx = (e.clientX - rect.left - transform.x) / transform.k;
        const my = (e.clientY - rect.top - transform.y) / transform.k;
        transform.k *= factor;
        transform.k = Math.max(0.1, Math.min(transform.k, 5));
        transform.x = e.clientX - rect.left - mx * transform.k;
        transform.y = e.clientY - rect.top - my * transform.k;
        updateTransform();
      }, { passive: false });

      // Node click / drag
      nodesLayer.addEventListener('mousedown', e => {
        if (e.target.tagName !== 'circle') return;
        const id = e.target.dataset.node;
        const n = nodes.find(x => x.id === id);
        dragging = n;
        const rect = svg.getBoundingClientRect();
        const mx = (e.clientX - rect.left - transform.x) / transform.k;
        const my = (e.clientY - rect.top - transform.y) / transform.k;
        dragOffset = { x: mx - n.x, y: my - n.y };
      });
      nodesLayer.addEventListener('click', e => {
        if (e.target.tagName !== 'circle') return;
        const id = e.target.dataset.node;
        selectedNode = selectedNode === id ? null : id;
        showNodeInfo(id);
        render();
      });
    }

    function showNodeInfo(id) {
      const n = nodes.find(x => x.id === id);
      const directDeps = edges.filter(e => e.source === id).map(e => {
        const t = nodes.find(x => x.id === e.target);
        return { id: e.target, label: t ? t.label : e.target, type: e.type };
      });
      const dependents = edges.filter(e => e.target === id).map(e => {
        const s = nodes.find(x => x.id === e.source);
        return { id: e.source, label: s ? s.label : e.source, type: e.type };
      });

      const depHtml = directDeps.length ? directDeps.map(d =>
        `<div class="dep-list-item" onclick="selectNode('${d.id}')">${d.label} <span style="color:#888">(${d.type})</span></div>`
      ).join('') : '<p style="color:#666; font-size:11px">No outgoing dependencies</p>';

      const depOnHtml = dependents.length ? dependents.map(d =>
        `<div class="dep-list-item" onclick="selectNode('${d.id}')">${d.label} <span style="color:#888">(${d.type})</span></div>`
      ).join('') : '<p style="color:#666; font-size:11px">No incoming dependencies</p>';

      document.getElementById('nodeInfo').innerHTML = `
        <h3>${n.label}</h3>
        <div class="meta">${n.id} · ${n.category}</div>
        <div class="meta">${n.isOrphan ? '<span style="color:#ff7675">⚠ Orphaned</span> · ' : ''}${n.inCycle ? '<span style="color:#fdcb6e">↻ In cycle</span> · ' : ''}Deps: ${n.depCount} · Used by: ${n.dependentCount}</div>
        <div style="margin-top:10px; font-size:11px; color:#888; margin-bottom:4px;">Depends on:</div>
        <div class="dep-list">${depHtml}</div>
        <div style="margin-top:10px; font-size:11px; color:#888; margin-bottom:4px;">Used by:</div>
        <div class="dep-list">${depOnHtml}</div>
      `;
    }

    window.selectNode = function(id) {
      selectedNode = id;
      showNodeInfo(id);
      render();
    };

    /* ---------- Actions ---------- */
    window.zoomIn = () => { transform.k = Math.min(transform.k * 1.3, 5); updateTransform(); };
    window.zoomOut = () => { transform.k = Math.max(transform.k / 1.3, 0.1); updateTransform(); };
    window.fitGraph = () => {
      const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const graphW = maxX - minX, graphH = maxY - minY;
      const pad = 60;
      transform.k = Math.min((canvasWrap.clientWidth - pad * 2) / graphW, (canvasWrap.clientHeight - pad * 2) / graphH);
      transform.x = (canvasWrap.clientWidth - graphW * transform.k) / 2 - minX * transform.k;
      transform.y = (canvasWrap.clientHeight - graphH * transform.k) / 2 - minY * transform.k;
      updateTransform();
    };
    window.resetView = () => { selectedNode = null; activeTypeFilter = 'all'; activeCatFilter = 'all'; fitGraph(); render(); };
    window.highlightOrphans = () => {
      const orphanIds = new Set(nodes.filter(n => n.isOrphan).map(n => n.id));
      if (orphanIds.size === 0) return;
      // Show only orphans and their direct connections
      selectedNode = null;
      document.getElementById('orphanBanner').style.display = 'block';
      setTimeout(() => document.getElementById('orphanBanner').style.display = 'none', 3000);
    };
    window.highlightCircular = () => {
      const cycleNodes = new Set();
      for (const cycle of (graphData.circularCycles || [])) {
        for (const id of cycle) cycleNodes.add(id);
      }
      if (cycleNodes.size === 0) return;
      // Select first cycle node to highlight
      selectedNode = [...cycleNodes][0];
      showNodeInfo(selectedNode);
      render();
    };
    window.exportSVG = () => {
      const svgData = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `uiverse-dependency-graph-${new Date().toISOString().slice(0,10)}.svg`;
      a.click();
      URL.revokeObjectURL(url);
    };

    /* ---------- Start ---------- */
    loadData();
  </script>
    <script src="dist/shared.js"></script>
</body>
