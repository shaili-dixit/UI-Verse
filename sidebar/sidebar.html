<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self' https:; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' https: 'unsafe-hashes'; script-src-attr 'unsafe-hashes'; style-src 'self' https: 'unsafe-hashes'; style-src-attr 'unsafe-hashes'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Dashboard UI</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>

  <div class="dashboard">

    <aside class="sidebar" id="sidebar">

      <div class="logo">
        Dashboard
      </div>

      <ul class="menu">

        <li class="active">🏠 Home</li>
        <li>📊 Analytics</li>
        <li>📁 Projects</li>
        <li>📨 Messages</li>
        <li>⚙ Settings</li>

      </ul>

    </aside>

    <main class="main-content">

      <button id="toggleBtn">☰</button>

      <h1>Responsive Sidebar Dashboard</h1>

      <div class="cards">

        <div class="card">
          <h2>Users</h2>
          <p>1,250</p>
        </div>

        <div class="card">
          <h2>Revenue</h2>
          <p>$8,400</p>
        </div>

        <div class="card">
          <h2>Orders</h2>
          <p>320</p>
        </div>

      </div>

    </main>

  </div>

  <script src="sidebar.js"></script>
</body>
</html>
