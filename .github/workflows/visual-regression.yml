name: Visual Regression Testing

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run visual regression tests
        run: npm run test:visual
        env:
          CI: true
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

      - name: Upload visual test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-report
          path: |
            playwright-report/
            tests/visual/visual-regression.spec.ts-snapshots/
          retention-days: 30

  percy-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Percy CLI
        run: npm install -g @percy/cli

      - name: Run Percy visual tests
        run: |
          npx percy exec --parallel -- \
          npx playwright test tests/visual/visual-regression.spec.ts
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          PERCY_BRANCH: ${{ github.head_ref }}
          PERCY_TARGET_BRANCH: ${{ github.base_ref }}
        if: secrets.PERCY_TOKEN != ''

      - name: Comment on PR if no Percy token
        run: |
          echo "Percy visual testing requires PERCY_TOKEN secret to be set."
          echo "Add PERCY_TOKEN to your repository secrets to enable visual comparisons."
        if: secrets.PERCY_TOKEN == ''

  chromatic-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          branchName: ${{ github.head_ref }}
          baseBranch: ${{ github.base_ref }}
          exitZeroChanges: true
        if: secrets.CHROMATIC_PROJECT_TOKEN != ''