name: Quality Gate — HTML/CSS/JS Lint + Link Validation + Visual Regression

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: HTML validation
        run: |
          npm run lint:html

      - name: CSS lint (stylelint)
        run: |
          npm run lint:css

      - name: JavaScript lint (eslint)
        run: |
          npm run lint:js

      - name: Link validation (linkinator)
        run: |
          npm run link-check

      - name: Accessibility audit (WCAG baseline)
        run: |
          npm run audit:a11y

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Visual regression tests
        run: |
          npm run test:visual

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
