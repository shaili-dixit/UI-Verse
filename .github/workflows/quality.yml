name: Quality Gate — HTML/CSS/JS Lint + Link Validation + Visual Regression

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: HTML validation
        run: |
          npm run lint:html

      - name: CSS lint (stylelint)
        run: |
          npm run lint:css

      - name: JavaScript lint (eslint)
        run: |
          npm run lint:js

      - name: Dependency graph check
        run: |
          npm run dependencies:check

      - name: Dependency graph regression tests
        run: |
          npm run test:dependencies:graph

      - name: Component versioning metadata check
        run: |
          npm run components:version:check

      - name: Component versioning regression tests
        run: |
          npm run test:versioning:check

      - name: Component registry consistency check
        run: |
          npm run components:registry:check

      - name: Component registry validator unit tests
        run: |
          npm run test:registry:check

      - name: i18n locale validation
        run: |
          npm run i18n:validate

      - name: i18n dist sync check
        run: |
          npm run i18n:sync:check

      - name: Snippet pipeline sync check
        run: |
          npm run snippets:check

      - name: Snippet pipeline regression tests
        run: |
          npm run test:snippets:pipeline

      - name: Component discovery ranking tests
        run: |
          npm run test:search:rank

      - name: Link validation (linkinator)
        run: |
          npm run link-check

      - name: Accessibility audit (WCAG baseline)
        run: |
          npm run audit:a11y

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Visual regression tests
        run: |
          npm run test:visual

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
