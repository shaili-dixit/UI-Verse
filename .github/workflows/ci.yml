name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security assets verification
        run: npm run security:assets:verify

      - name: HTML lint
        run: npm run lint:html

      - name: CSS lint
        run: npm run lint:css

      - name: JavaScript lint
        run: npm run lint:js

      - name: Dependency graph check
        run: npm run dependencies:check

      - name: Dependency graph regression tests
        run: npm run test:dependencies:graph

      - name: Component metadata check
        run: npm run components:version:check

      - name: Component versioning regression tests
        run: npm run test:versioning:check

      - name: Component registry consistency check
        run: npm run components:registry:check

      - name: Component registry validator unit tests
        run: npm run test:registry:check

      - name: i18n locale validation
        run: npm run i18n:validate

      - name: i18n dist sync check
        run: npm run i18n:sync:check

      - name: Snippet pipeline sync check
        run: npm run snippets:check

      - name: Snippet pipeline regression tests
        run: npm run test:snippets:pipeline

      - name: Component discovery ranking tests
        run: npm run test:search:rank

      - name: Package smoke test
        run: npm run package:check

      - name: Accessibility audit
        run: npm run audit:a11y

      - name: Accessibility remediation baseline gate
        run: npm run a11y:remediation:check

      - name: Accessibility remediation check tests
        run: npm run test:a11y:remediation:check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Visual regression tests
        run: npm run test:visual

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Deploy preview to Netlify
        if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
        run: npx netlify deploy --dir=. --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --message="Preview for PR #${{ github.event.pull_request.number }}" --json
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
