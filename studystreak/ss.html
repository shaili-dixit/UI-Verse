<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Streak Tracker</title>
  <link rel="stylesheet" href="ss.css">
</head>
<body>

  <div class="dashboard">

    <div class="top-section">

      <div class="card streak-card">
        <h3>Current Streak</h3>
        <h1>18 Days 🔥</h1>
      </div>

      <div class="card hours-card">
        <h3>Study Hours</h3>
        <h2>42 Hours</h2>
      </div>

      <div class="card goals-card">
        <h3>Goals Completed</h3>
        <h2>9 / 12</h2>
      </div>

    </div>

    <div class="bottom-section">

      <div class="calendar-card">

        <h2>Study Progress Calendar</h2>

        <div class="calendar-grid">

          <div class="day active">1</div>
          <div class="day active">2</div>
          <div class="day active">3</div>
          <div class="day active">4</div>
          <div class="day active">5</div>
          <div class="day">6</div>
          <div class="day active">7</div>
          <div class="day active">8</div>
          <div class="day active">9</div>
          <div class="day">10</div>
          <div class="day active">11</div>
          <div class="day active">12</div>
          <div class="day active">13</div>
          <div class="day active">14</div>

        </div>

      </div>

      <div class="insights-card">

        <h2>Productivity Insights</h2>

        <div class="insight">
          <span>Best Study Time</span>
          <p>7:00 PM - 9:00 PM</p>
        </div>

        <div class="insight">
          <span>Average Session</span>
          <p>2h 15m</p>
        </div>

        <div class="insight">
          <span>Weekly Goal</span>
          <p>85% Completed</p>
        </div>

        <button id="markBtn">
          Mark Today's Study
        </button>

        <div id="message"></div>

      </div>

    </div>

  </div>

  <script src="ss.js"></script>
</body>
</html>
