<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call To Action Section</title>

  <link rel="stylesheet" href="call-to-action.css" />
</head>
<body>

  <section class="cta-section">

    <div class="cta-content">

      <span class="tag">🚀 Get Started Today</span>

      <h1>
        Build Modern Websites Faster
      </h1>

      <p>
        Create stunning and responsive UI components with clean HTML, CSS,
        and JavaScript. Boost your productivity and launch beautiful web
        experiences effortlessly.
      </p>

      <div class="cta-buttons">
        <button class="primary-btn" id="startBtn">
          Start Now
        </button>

        <button class="secondary-btn">
          Learn More
        </button>
      </div>

    </div>

    <div class="cta-image">
      <img
        src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop"
        alt="Coding Workspace"
      />
    </div>

  </section>

  <script src="call-to-action.js"></script>
</body>
</html>
